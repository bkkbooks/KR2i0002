body:
  text: 越絕書佚文名門者車船並入昌門今見在銅柱石填地文選吳都賦注夫差小女字幼玉見父無道輕士重色其國必危遂願與書生韓重為偶不果結怨而死夫差思痛之金棺銅槨葬閶門外其女化形而歌曰南山有鳥北山張羅鳥既高飛羅當柰何志願從君讒言孔多悲怨成疾沒身黃坡吳地記闔廬葬女於邽西名為三女墳吳先主發掘无得鑿分為三呼為三女墳也書鈔卷九四美山大雷山小雷山有西岑冢越王孫開所立以備春申君使其子守之子死遂葬城中後漢書郡國志注北城泰伯所築咸淳毗陵志伍員取利浦黃瀆土築此城咸淳毗陵志引吳人於硯石置館娃宮寰宇記卷九一秦始皇至會稽徙越之人於烏程寰宇記卷九十四東甌越王所立元王四年范蠡築路史國名紀宋大夫華元冢在華原陳留小黃縣北太平御覽卷五五八闔閭惡王子慶忌問於伍子胥子胥曰臣有所厚於國其人細小也曰要離臣嘗見其辱壯士菑邱訢也王曰辱之柰何子胥曰菑邱訢者東海上人也為齊王使於吳過淮津欲飲馬水神出取菑邱訢大怒褊袒操劍入水與戰殺兩蛟一龍連日乃出眇其左目遂之吳會於友人之座訢恃其與神戰之勇輕士大夫要離與之對座即謂之曰吾聞勇士之戰也與日戰者不移表與神鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神戰於泉水之中亡馬失御又受眇目之病形殘名辱勇士所恥自驕於友人之旁何其忍負也於是菑邱訢卒於結恨勢怒未及有言座眾分解菑邱訢宿怒遺恨夜往攻要離要離戒其妻曰曩者吾辱壯士菑邱訢於大眾之座彼勇士有受不還報答之怒餘恨忿恚冥必來矣慎毋閉門菑邱訢果往入門不閉登堂不關入室不守放髮僵臥訢乃手拔劍而捽要離曰子有三當死之過子知之乎要離曰吾不知也菑邱訢曰子辱吾於大座之眾一死也歸不閉門二死也臥不守衛三死也子有三死之過雖欲勿怒其得乎哉要離曰吾無三死之過子有三不肖之媿子知之乎菑邱訢曰吾不知要離曰吾辱子於千人之眾子不報答是一不肖也入門不咳登堂無聲是二不肖也先拔劍手持頭乃敢有言是三不肖也子有三不肖之媿而欲滅我豈不鄙哉於是菑邱訢仰天歎曰吾之勇也人莫敢有訾吾者若斯要離乃加吾之上此天下壯士也御覽卷四三七屬鏤史記吳太伯世家無餘都會稽山南故越城是也史記越世家正義句踐遊臺上有龜公冢在寰宇記卷九六興平二年分立吳寧縣後漢書郡國志注餘暨西施之所出後漢書郡國志注棟猶鎮也水經漸江水注越王句踐既為吳辱常盡禮接士思以平吳一日出遊見蛙怒句踐揖之左右曰王揖怒蛙何也答曰蛙如是怒何敢不揖於是勇士聞之皆歸越而平吳太平廣記卷四七三闔閭既重莫耶乃復命國中作金鉤有人貪王賞之重殺其兩兒以血釁鉤遂成二鉤獻之闔閭詣官求賞王曰為鉤者眾多而子獨求賞何以異於眾人之鉤乎曰我之作鉤也殺二子成兩鉤王曰舉鉤以示之何者是也於是鉤師向鉤而哭呼其兩子之名吳鴻扈稽曰我在此王不知汝之神也聲未絕於口兩鉤俱飛著於父之背吳王大驚曰嗟乎寡人誠負子迺賞之百金遂服其鉤文選吳都賦注伍子胥水戰兵法內經曰大翼一艘廣一丈五尺二寸長十丈容戰士二十六人櫂五十人舳艫三人操長鉤矛斧者四吏僕射長各一人凡九十一人當用長鉤矛長斧各四弩各三十二矢三千三百甲兜鍪各三十二中翼一艘廣一丈三尺五寸長九丈六尺小翼一艘廣一丈二尺長九丈侍游曲阿後湖詩注闔閭見子胥敢問船軍之備何如對曰船名大翼小翼突冒樓船橋船令船軍之教比陵軍之法乃可用之大翼者當陵軍之重車小翼者當陵軍之輕車突冒者當陵軍之衝車樓船者當陵軍之行樓車橋船者當陵軍之輕足驃騎也御覽卷七七零吳王闔閭問伍子胥軍法子胥曰王身將即疑船旌麾兵戟與王船等者七艘將軍疑船兵戟與將軍船等三船皆居於大陣之左右有敵即出就陣吏卒皆銜枚敖歌擊鼓者斬御覽卷三五七在越為范蠡在齊為鴟夷子皮在陶為朱公史記越世家正義西施亡吳國後復歸范蠡同泛五湖而去吳地記蜀有花鴿狀如春花御覽卷九二三
