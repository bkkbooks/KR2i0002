body:
  text: 越絶計倪內經第五昔者越王句踐既得反國欲陰謀吳乃召計倪而問焉曰吾欲伐吳恐弗能取山林幽冥不知利害所在西則迫江東則薄海水屬蒼天下不知所止交錯相過波濤濬流沈而復起因復相還浩浩之水朝夕既有時動作若驚駭聲音若雷霆波濤援而起船失不能救未知命之所維念樓船之苦涕泣不可止非不欲為也時返不知所在謀不成而息恐為天下咎以敵攻敵未知誰負大邦既已備小邑既已保五穀既已收野無積庾廩糧則不屬無所安取恐津梁之不通勞軍紆吾糧道吾聞先生明於時交察於道理恐動而無功故問其道計倪對曰是固不可興師者必先蓄積食錢布帛不先蓄積士卒數飢飢則易傷重遲不可戰戰則耳目不聰明耳不能聽視不能見什部之不能使退之不能解進之不能行飢饉不可以動神氣去而萬里伏弩而乳郅頭而皇皇強弩不彀發不能當旁軍見弱走之如犬逐羊靡從部分伏地而死前頓後僵與人同時而戰獨受天之殃未必天之罪也亦在其將王興師以年數恐一旦而亡失邦無明筋骨為野越王曰善請問其方吾聞先生明於治歲萬物盡長欲聞其治術可以為教常子明以告我寡人弗敢忘計倪對曰人之生無幾必先憂積蓄以備妖祥凡人生或老或弱或強或怯不早備生不能相葬王其審之必先省賦斂勸農桑飢饉在問或水或塘因熟積以備四方師出無時未知所當應變而動隨物常羊卒然有師彼日以弱我日以強得世之和擅世之陽王無忽忘慎無如會稽之飢不可再更王其審之嘗言息貨王不聽臣故退而不言處於吳楚越之間以魚三邦之利乃知天下之易反也臣聞君自耕夫人自織此竭於庸力而不斷時與智也時斷則循智斷則備知此二者形於體萬物之情短長逆順可觀而已臣聞炎帝有天下以傳黃帝黃帝於是上事天下治地故少昊治西方蚩尤佐之使主金玄冥治北方白辨佐之使主水太皞治東方袁何佐之使主木祝融治南方僕程佐之使主火后土治中央后稷佐之使主土並有五方以為綱紀是以易地而輔萬物之常王審用臣之議大則可以王小則可以霸於何有哉越王曰請問其要計倪對曰太陰三歲處金則穰三歲處水則毀三歲處木則康三歲處火則旱故散有時積糴有時領則決萬物不過三歲而發矣以智論之以決斷之以道佐之斷長續短一歲再倍其次一倍其次而反水則資車旱則資舟物之理也天下六歲一穰六歲一康凡十二歲一飢是以民相離也故聖人早知天地之反為之預備故湯之時比七年旱而民不飢禹之時比九年水而民不流其主能通習源流以任賢使能則轉轂乎千里外貨可來也不習則百里之內不可致也人主所求其價十倍其所擇者則無價矣夫人主利源流非必身為之也視民所不足及其有餘為之命以利之而來諸侯守法度任賢使能償其成事傳其驗而已如此則邦富兵強而不衰矣群臣無恭之禮淫佚之行務有於道術不習源流又不任賢使能諫者則誅則邦貧兵弱刑繁則群臣多空恭之理淫佚之行矣夫諛者反有德忠者反有刑去刑就德人之情也邦貧兵弱致亂雖有聖臣亦不諫也務在諛主而已矣今夫萬民有明父母亦如邦有明主父母利源流明其法術以任賢子徼成其事而已則家富而不衰矣不能利源流又不任賢子賢子有諫者憎之如此者不習於道術也愈信其意而行其言後雖有敗不自過也夫父子之為親也非得不諫諫而不聽家貧致亂雖有聖子亦不治也務在於諛之而已父子不和兄弟不調雖欲富也必貧而日衰越王曰善子何年少於物之長也計倪對曰人固不同慧種生聖癡種生狂桂實生桂桐實生桐先生者未必能知後生者未必不能明是故聖主置臣不以少長有道者進無道者退愚者日以退聖者日以長人主無私賞者有功越王曰善論事若是其審也物有妖祥乎計倪對曰有陰陽萬物各有紀綱日月星辰刑德變為吉凶金木水火土更勝月朔更建莫主其常順之有德逆之有殃是故聖人能明其刑而處其鄉從其德而避其衡凡舉百事必順天地四時參以陰陽用之不審舉事有殃人生不如臥之頃也欲變天地之常數發無道故貧而命不長是聖人并苞而陰行之以感愚夫衆人容容盡欲富貴莫知其鄉越王曰善請問其方計倪對曰從寅至未陽也太陰在陽歲德在陰歲美在是聖人動而應之制其收發常以太陰在陰而發陰且盡之歲亟賣六畜貨財以益收五穀以應陽之至也陽且盡之歲亟發糴以收田宅牛馬積斂貨財聚棺木以應陰之至也此皆十倍者也其次五倍天有時而散是故聖人反其刑順其衡收聚而不散越王曰善今歲比熟尚有貧乞者何也計倪對曰是故不等猶同母之人異父之子動作不同術貧富故不等如此者積負於人不能救其前後志意侵下作務日給非有道術又無上賜貧乞故長久越王曰善大夫佚同若成嘗與孤議於會稽石室孤非其言也今大夫言獨與孤比請遂受教焉計倪曰糴石二十則傷農九十則病末農傷則草木不辟末病則貨不出故糴高不過八十下不過三十農末俱利矣故古之治邦者本之貨物官市開而至越王曰善計倪乃傳其教而圖之曰審金木水火別陰陽之明用此不患無功越王曰善從今以來傳之後世以為教乃著其法治牧江南七年而禽吳也甲貨之戶曰粢為上物賈七十乙貨之戶曰黍為中物石六十丙貨之戶曰赤豆為下物石五十丁貨之戶曰稻粟令為上種石四十戊貨之戶曰麥為中物石三十己貨之戶曰大豆為下物石二十庚貨之戶曰穬比疏食故無賈辛貨之戶曰果比疏食無賈壬癸無貨
