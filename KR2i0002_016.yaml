body:
  text: 越絕外傳枕中第十六昔者越王句踐問范子曰古之賢主聖王之治何左何右何去何取范子對曰臣聞聖主之治左道右術去末取實越王曰何謂道何謂術何謂末何謂實范子對曰道者天地先生不知老曲成萬物不名巧故謂之道道生氣氣生陰陰生陽陽生天地天地立然後有寒暑燥濕日月星辰四時而萬物備術者天意也盛夏之時萬物遂長聖人緣天心助天喜樂萬物之長故舜彈五弦之琴歌南風之詩而天下治言其樂與天下同也當是之時頌聲作所謂末者名也故名過實則百姓不附親賢士不為用而外諸侯聖主不為也所謂實者穀也得人心任賢士也凡此四者邦之寶也越王曰寡人躬行節儉下士求賢不使名過實此寡人所能行也多貯穀富百姓此乃天時水旱寧在一人耶何以備之范子曰百里之神千里之君湯執其中和舉伊尹收天下雄雋之士練卒兵率諸侯兵伐桀為天下除殘去賊萬民皆歌而歸之是所謂執其中和者越王曰善哉中和所致也寡人雖不及賢主聖王欲執其中和而行之今諸侯之地或多或少彊弱不相當兵革㬥起何以應之范子曰知保人之身者可以王天下不知保人之身失天下者也越王曰何謂保人之身范子曰天生萬物而教之而生人得穀即不死穀能生人能殺人故謂人身越王曰善哉今寡人欲保穀為之柰何范子曰欲保穀必親於野覩諸侯所多少為備越王曰所少可得為因其貴賤亦有應乎范子曰夫知八穀貴賤之法必察天之三表即決矣越王曰請問三表范子曰水之勢勝金陰氣蓄積大盛水據金而死故金中有水如此者歲大敗八穀皆貴金之勢勝木陽氣蓄積大盛金據木而死故木中有火如此者歲大美八穀皆賤金木水火更相勝此天之三表者也不可不察能知三表可以為邦寶不知三表之君千里之神萬里之君故天下之君發號施令必順於四時四時不正則陰陽不調寒暑失常如此則歲惡五穀不登聖主施令必審於四時此至禁也越王曰此寡人所能行也願欲知圖穀上下貴賤欲與他貨之內以自實為之柰何范子曰夫八穀之賤也如宿穀之登其明也諦審察陰陽消息觀市之反覆雌雄之相逐天道乃畢越王問范子曰何執而昌何行而亡范子曰執其中則昌行奢侈則亡越王曰寡人欲聞其說范子曰臣聞古之賢主聖君執中和而原其終始即位安而萬物定矣不執其中和不原其終始即尊位傾萬物散文武之業桀紂之跡可知矣古者天子及至諸侯自滅至亡漸漬乎滋味之費沒溺於聲色之類牽攣於珍怪貴重之器故其邦空虛困其士民以為須臾之樂百姓皆有悲心瓦解而倍畔者桀紂是也身死邦亡為天下笑此謂行奢侈而亡也湯有七十里地務執三表可謂邦寶不知三表身死棄道越王問范子曰春肅夏寒秋榮冬泄人治使然乎將道也范子曰天道三千五百歲一治一亂終而復始如環之無端此天之常道也四時易次寒暑失常治民然也故天生萬物之時聖人命之曰春春不生遂者故天不重為春春者夏之父也故春生之夏長之秋成而殺之冬受而藏之春肅而不生者王德不究也夏寒而不長者臣下不奉主命也秋順而復榮者百官刑不斷也冬溫而泄者發府庫賞無功也此所謂四時者邦之禁也越王曰寒暑不時治在於人可知也願聞歲之美惡穀之貴賤何以紀之范子曰夫陰陽錯繆即為惡歲人生失治即為亂世夫一亂一治天道自然八穀亦一賤一貴極而復反言亂三千歲必有聖王也八穀貴賤更相勝故死凌生者逆大貴生凌死者順大賤越王曰善越王問於范子曰寡人聞人失其魂魄者死得其魂魄者生物皆有之將人也范子曰人有之萬物亦然天地之間人最為貴物之生穀為貴以生人與魂魄無異可得豫知也越王曰其善惡可得聞乎范子曰欲知八穀之貴賤上下衰極必察其魂魄視其動靜觀其所舍萬不失一問曰何謂魂魄對曰魂者橐也魄者生氣之源也故神生者出入無門上下無根見所而功自存故名之曰神神主生氣之精魂主死氣之舍也魄者主賤魂者主貴故當安靜而不動魂者方盛夏而行故萬物得以自昌神者主氣之精主貴而雲行故方盛夏之時不行即神氣槁而不成物矣故死凌生者歲大敗生凌死者歲大美故觀其魂魄即知歲之善惡矣越王問於范子曰寡人聞陰陽之治不同力而功成不同氣而物生可得而知乎願聞其說范子曰臣聞陰陽氣不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之下藏伏壯於內使陰陽得成功於外夏三月盛暑之時萬物遂長陰氣避之下藏伏壯於內然而萬物親而信之是所謂也陽者主生萬物方夏三月之時大熱不至則萬物不能成陰氣主殺方冬三月之時地不內藏則根荄不成即春無生故一時失度即四序為不行越王曰善寡人已聞陰陽之事穀之貴賤可得而知乎范子曰陽者主貴陰者主賤故當寒而不寒者穀為之㬥貴當溫而不溫者穀為之㬥賤譬猶形影聲響相聞豈得不復哉故曰秋冬貴陽氣施於陰陰極而復貴春夏賤陰氣施於陽陽極而不復賤越王曰善哉以丹書帛置之枕中以為國寶越五日困於吳請於范子曰寡人守國無術負於萬物幾亡邦危社稷為旁邦所議無定足而立欲捐軀出死以報吳仇為之柰何范子曰臣聞聖主為不可為之行不惡人之謗己為足舉之德不德人之稱己舜循之歷山而天下從風使舜釋其所循而求天下之利則恐不全其身昔者神農之治天下務利之而已矣不望其報不貪天下之財而天下共富之所以其智能自貴於人而天下共尊之故曰富貴者天下所置不可奪也今王利地貪財接兵血刃僵尸流血欲以顯於世不亦繆乎越王曰上不逮於神農下不及於堯舜今子以至聖之道以說寡人誠非吾所及也且吾聞之也父辱則子死君辱則臣死今寡人親已辱於吳矣欲行一切之變以復吳仇願子更為寡人圖之范子曰君辱則死固其義也立死下士人而求成邦者上聖之計也且夫廣天下尊萬乘之主使百姓安其居樂其業者唯兵兵之要在於人人之要在於穀故民眾則主安穀多則兵彊王而備此二者然後可以圖之也越王曰吾欲富邦彊兵地狹民少柰何為之范子曰夫陽動於上以成天文陰動於下以成地理審察開置之要可以為富凡欲先知天門開及地戶閉其術天高五寸減天寸六分以成地謹司八穀初見出於天者是謂天門開地戶閉陽氣不得下入地戶故氣轉動而上下陰陽俱絕八穀不成大貴必應其歲而起此天變見符也謹司八穀初見入於地者是謂地戶閉陰陽俱會八穀大成其歲大賤來年大饑此地變見瑞也謹司八穀初見半於人者糴平熟無災害故天倡而見符地應而見瑞聖人上知天下知地中知人此之謂天平地平以此為天圖越王既已勝吳三日反邦未至息自雄問大夫種曰夫聖人之術何以加於此乎大夫種曰不然王德范子之所言故天地之符應邦以藏聖人之心矣然而范子豫見之策未肯為王言者也越王愀然而恐面有憂色請於范子稱曰寡人用夫子之計幸得勝吳盡夫子之力也寡人聞夫子明於陰陽進退豫知未形推往引前後知千歲可得聞乎寡人虛心垂意聽於下風范子曰夫陰陽進退前後幽冥未見未形此持殺生之柄而王制於四海此邦之重寶也王而毋泄此事臣請為王言之越王曰夫子幸教寡人願與之自藏至死不敢忘范子曰陰陽進退者固天道自然不足怪也夫陰入淺者即歲善陽入深者則歲惡幽幽冥冥豫知未形故聖人見物不疑是謂知時固聖人所不傳也夫堯舜禹湯皆有豫見之勞雖有凶年而民不窮越王曰善以丹書帛置之枕中以為邦寶范子已告越王立志入海此謂天地之圖也
