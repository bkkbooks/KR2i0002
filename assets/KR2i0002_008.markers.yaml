  - {type: variant, offset: 5, length: 1, content: 范, SBCK: 地}
  - {type: variant, offset: 5, length: 3, content: 范伯第, WYG: 地傳昔者越之先君無餘乃禹之世别封於越以守禹冡問天地之道萬物之紀莫失其本神農嘗百草水土甘苦黄帝造衣裳后稷産穡制器械人事備矣疇糞桑麻播種五榖必以手足大越海濵之民獨以鳥田小大有差進退有行莫將自使其故何也曰禹始也憂民救水到大越上茅山大㑹計爵有德封有功更名茅山曰㑹稽及其王也巡狩大越見耆老納詩書審銓衡平斗斛因病亡死葬會稽葦槨桐棺穿壙七尺上無漏泄下無即水壇髙三尺土階三等延袤一畝尚以為居之者樂為之者苦無以報民功教民鳥田一盛一衰當禹之時舜死蒼梧象為民田也禹至此者亦有因矣亦覆釡也覆釡者州土也填德也禹美而告至焉禹知時晏嵗暮年加申酉求書其下祠白馬禹井井者法也以為禹葬以法度不煩人衆無餘初封大越都秦餘望南千有餘嵗而至句踐句踐徙治山北引屬東海内外越别封削焉句踐伐吳霸闗東從瑯琊起觀臺臺周七里以望東海死士}
