  - {type: variant, offset: 498, length: 0, content: '', SBCK: 子胥大怒目若夜光聲若哮虎此越未戰而服天以賜吳其逆天乎臣唯君王急剬之吳不聽遂許之浙江是也陽城里者范蠡城也西至水路水門一陸門二北陽里城大夫種城也取土西山以濟之經百九十四步或為南安富陽里者外越賜義也處里門美以練塘田安城里高庫者句踐伐吳禽夫差以為勝兵築庫高閣之周二百三十步今安成里故禹宗廟在小城南門外大城内禹稷在廟西今南里獨山大􅃁者句踐自治以為􅃁徙瑯琊􅃁不成去縣九里麻林山一名多山句踐欲伐吳種麻以為弓絃使齊人守之越謂齊人多故曰麻林多以防吳以山下田封功臣去縣一十二里㑹稽山上城者句踐與吳戰大敗棲其中因以下為目魚池其利不租㑹稽山北城者子胥浮兵以守城是也若耶大􅃁者句踐所徙葬先君夫鐔􅃁也去縣二十五里葛山者句踐罷吳種葛使越女織治葛布獻於吳王夫差去縣七里姑中山者越銅官之山也越人謂之銅姑瀆長二百五十歩去縣二十五里富中大塘者句踐治以為義田為肥饒謂之富中去縣二十里二十二步犬山者句踐罷吳畜犬獵南山白鹿欲得獻吳神不可得故曰犬山其高為犬亭去縣二十五里白鹿山在犬山之南去縣二十九里雞山豕山者句踐以畜雞豕將伐呉以食士也雞山在錫山南去縣五十里豕山在民山西去縣六十三里洹江以來屬越疑豕山在餘暨界中練塘者句踐時采錫山為炭稱炭聚載從炭瀆至練塘各因事名之去縣五十里木客大􅃁者句踐父允常􅃁也初徙瑯琊使樓船卒二千八百人伐松栢以為桴故曰木客去縣十五里一曰勾踐伐善林文刻獻於吳故曰木客官瀆者句踐工官也去縣十四里苦竹城者句踐伐吳還封范蠡子也其僻居徑六十步因為民治田塘長千五百三十三步其􅃁名土山范蠡苦勤功篤故封其子於是去縣十八里北郭外路南溪北城者句踐築鼓鍾宫也去縣七里其邑為龔錢舟室者句踐船宫也去縣五十里民西大􅃁者句踐客秦伊善炤􅀛者􅃁也因名􅃁為秦伊山射浦者句踐教習兵處也今射浦去縣五里射卒陳音死葬民西故曰陳音山種山者句踐所葬大夫種也樓船卒二千人鈞足羡葬之三􅅾下種將死自策後有賢者百年而至置我三􅅾自章後世句踐葬之食傳三賢巫里句踐所徙巫為一里去縣二十五里其亭祠今為和公群社稷墟虚一作巫山者越􅸾神巫之官也死葬其上去縣十三里許六山者句踐鑄銅鑄銅不爍埋之東坂其上馬箠句踐遣使者取於南社徙種六山飾治為馬箠獻之吳去縣三十五里江東中巫葬者越神巫}
