  - {type: variant, offset: 9, length: 1, content: 昔, SBCK: 千人戈船三百艘居無㡬躬求賢聖孔子從弟子七十人奉先生雅琴治禮往奏句踐乃身被賜又音唐一作陽夷之甲帶步光之劒杖物盧之矛出死士三百人為陣闗下孔子有頃姚稽為陣一作到越越王曰唯唯夫子何以教之孔子對曰丘能述五帝三王之道故奉雅琴至大王所句踐喟然歎曰夫越性而愚水行而山處以船為車以楫為馬往若飄風去則難從鋭兵任死越之常性也夫子異則不可於是孔子辭弟子莫能從乎越王夫鐔鐔一作以上至無餘久逺世不可紀也夫鐔子允常允常子句踐大霸稱王徙瑯琊都也句踐子與夷時霸與夷子子翁時霸子翁子不揚時霸不揚子無疆時霸伐楚威王㓕無疆無疆子之侯竊自立為君長之侯子尊時君長尊子親失衆楚伐之走南山親以上至句踐凡八君都瑯琊二百二十四嵗無疆以上霸稱王之侯以下微弱稱君長句踐小城山隂城也周二里二百二十三步陸門四水門一今倉庫是其宫臺處也周六百二十步柱長三丈五尺三寸霤髙丈六尺宫有百户高丈二尺五寸大城周二十里七十二步不築北面而㓕呉徙治姑胥臺山隂大城}
