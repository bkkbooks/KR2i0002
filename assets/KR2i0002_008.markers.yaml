  - {type: variant, offset: 29, length: 4, content: 自菲薄飲, SBCK: 近大道居去縣五里樂野者越之戈獵處大樂故謂樂野其山上石室句踐所休謀也去縣七里中指臺馬丘周六百步今高平里丘東郭外南小城者句踐冰室去縣三里句踐之出入也齊於稷山徃從田里去從北郭門炤􅀛􅀛山更駕臺馳於離丘遊於美人宫興樂中宿過歷馬丘射於樂野之衢走犬若耶休謀石室}
