  - {type: variant, offset: 499, length: 0, content: '', krp: 杜子孫也死句踐於中江而葬之巫神欲使覆禍吳人船去縣三十里石塘者越所害軍船也塘廣六十五步長三百五十三步去縣四十里防塢者越所以遏吳軍也去縣四十里杭塢者句踐杭也二百石長貟卒七士人度之㑹夷去縣四十里塗山者禹所取妻之山也去縣五十里朱餘者越鹽官也越人謂鹽曰餘去縣三十五里句踐已㓕吳使吳人築吳塘東西千歩名辟首後因以為名曰塘獨婦山者句踐將伐吳徙寡婦致獨山上以為死士示得專一也去縣四十里後説之者葢句踐所以逰軍士也馬嘷者吳伐越道逄大風車敗馬失騎士堕死疋馬啼臯事見吳矣浙江南路西城者范蠡敦熟一作兵城也其陵固可守故謂之固陵所以然者以其大船軍所置也山隂古故陸道出東郭隨直瀆陽春亭山隂故水道出東郭從郡陽春亭去縣五十里語兒鄉故越界名曰就李吳疆越地以為戰地至於柴辟亭女陽亭者句踐入官於吳夫人從道産女此亭養於李鄉句踐勝吳更名女陽更就李為語兒鄉吳王夫差伐越有其邦句踐服為臣三年吳王復還封句踐於越東西百里北鄉臣事呉東為右西為左大越故界浙江至就李南姑末寫干覲鄉北有武原武原今海鹽姑末今大末寫干今屬豫章自無餘初封於越以來傳聞越王子孫在丹陽臯鄉更姓梅梅里是也自秦以來至秦元王不絶年元王立二十年平王立二十三年惠文王立二十七元武王立四年昭襄王亦立五十六年而滅周赧王周絶於此孝文王立一年莊襄王更號太上皇帝立三年秦始皇帝立三十七年號曰趙政政趙外孫胡亥立二年子嬰立六月秦元王至子嬰凡十王百七十嵗漢高帝㓕之治咸陽壹天下政使將魏舎内史教攻韓得韓王安政使將王賁攻魏得魏王歇政使將王渉攻趙得趙王尚政使將王賁攻楚得楚王成政使將史敖攻燕得燕王喜政使將王涉攻齊得齊王建政更號為秦始皇帝以其三十七年東遊之㑹稽道度牛渚奏東安東安今富春丹陽溧陽鄣故餘杭軻亭南東奏槿頭道度諸暨大越以正月甲戌到大越留舎都亭取錢塘浙江岑石石長丈四尺南北靣廣六尺西靣廣尺六寸刻丈六於越東山上其道九曲去縣二十一里是時徙大越民置餘杭伊攻故鄣因徙天下有}
