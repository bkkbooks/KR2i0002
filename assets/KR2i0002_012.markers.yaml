  - {type: 'tls:seg', offset: 28, content: '', id: KR2i0002_CHANT_012-1a.6}
  - {type: variant, offset: 29, length: 3, content: 革堅利, SBCK: 氣也為未可攻衰去乃可攻青氣在上}
  - {type: variant, offset: 29, length: 3, content: 革堅利, krp: 氣也為未可攻衰去乃可攻青氣在上}
