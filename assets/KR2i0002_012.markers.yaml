  - {type: variant, offset: 1147, length: 275, content: 吳王曰悲哉此公孫聖所言王且不得火食太宰嚭曰秦餘杭山西坂閒燕可以休息大王亟飡而去尚有十數里耳吳王曰吾嘗戮公孫聖於斯山子試為寡人前呼之即尚在耶當有聲響太宰嚭即上山三呼聖三應吳王大怖足行屬腐面如死灰色曰公孫聖令寡人得邦誠世世相事言未畢越王追至兵三圍吳大夫種處中范蠡數吳王曰王有過者五寧知之乎殺忠臣伍子胥公孫聖胥為人先知忠信中斷之入江聖正言直諫身死無功此非大過者二乎夫齊無罪空復伐之使鬼神不血食社稷廢蕪父子離散兄弟異居此非大過者三乎夫越王句踐雖東僻亦得繫於天皇之位無罪而王恒使其芻莝秩馬比於奴虜此非大過者四乎太宰嚭讒諛佞諂斷絕王世聽而用之此非大過者五乎吳王曰, SBCK: 周故治雒}
