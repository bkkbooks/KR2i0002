  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 越絶卷第十二越絕内經九術第十四昔者越王句踐問大夫種曰吾欲伐吳奈何能有功乎大夫種對曰伐吳有九術王曰何謂九術對曰一曰尊天地事􅀑神二曰重財幣帛一作以遺其君三曰貴糴粟槖以空其邦四曰遺之好美以爲勞其志五曰遺之巧匠使起宫室高臺盡其財疲其力六曰遺其䛕臣使之易伐七曰疆其諫臣使之自殺八曰邦家富而僃器九曰堅厲甲兵以承其􅁦故曰九者勿患戒口勿傳以取天下不難况於吳乎越王曰善於是作為䇿楯嬰以白璧鏤以黄金􅀋龍蛇而行者乃使大夫種獻之於吳曰東海役臣孤句踐使者臣種敢修下吏問於左右頼有天下之力竊為小殿有餘財再拜獻之大王吳王大恱申胥諫曰不可王勿受昔桀起靈門紂起鹿臺隂陽不和五榖不時天與之災邦國空虚遂以之亡大王受之是後必有災吳王不聽遂受之而起姑胥臺三年聚材五年乃成高見二百里行路之人道死尸哭越乃飾美女西施鄭旦使大夫種獻之於吳王曰昔者越王句踐竊有天之遺西施鄭旦越邦洿下貧窮不敢當使下臣種再拜獻之大王吳王大恱申胥諫曰不可王勿受臣聞五己令人目不明五音令人耳不聰桀易湯義㓕紂易周文而亡大王受之後必有殃胥聞越王句踐晝書不倦晦誦竟旦聚死臣數萬是人不死必得其願胥聞越王句踐服誠行仁􅃪諫進賢士是人不死必得其名胥聞越王句踐冬披毛裘夏披絺綌是人不死必為利害胥聞賢士邦之寳也美女邦之咎也夏亡於末喜殷亡於妲巳周亡於褒姒吳王不聽遂受其女以申胥爲不忠而殺之越乃興師伐吳大敗之於秦餘杭山㓕吳禽夫差而戮太宰嚭與其妻子}
