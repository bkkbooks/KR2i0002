  - {type: variant, offset: 314, length: 650, content: 對曰臣智淺能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子王孫聖為人幼而好學長而憙遊博聞彊識通於方來之事可占大王所夢臣請召之吳王曰諾王孫駱移記曰今日壬午左校司馬王孫駱受教告東掖門亭長公孫聖吳王晝臥覺窹而心中惆悵也如有悔記到車馳詣姑胥之臺聖得記發而讀之伏地而泣有頃不起其妻大君從旁接而起之曰何若子性之大也希見人主卒得急記流涕不止公孫聖仰天嘆曰嗚呼悲哉此固非子之所能知也今日壬午時加南方命屬蒼天不可逃亡伏地而泣者不能自惜但吳王諛心而言師道不明正言直諫身死無功大君曰汝彊食自愛慎勿相忘伏地而書既成篇即與妻把臂而決涕泣如雨上車不顧遂至姑胥之臺謁見吳王吳王勞曰越公弟子公孫聖也寡人晝臥姑胥之臺夢入章明之宮入門見兩䥶炊而不蒸見兩黑犬嘷以北嘷以南見兩鏵倚吾宮堂見流水湯湯越吾宮牆見前園橫索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人心所從公孫聖伏地有頃而起仰天嘆曰悲哉夫好船者溺好騎者墮君子各以所好為禍諛讒申者師道不明正言切諫身死無功伏地而泣者非自惜因悲大王夫章者戰不勝走傽傽也明者去昭昭就冥冥也見兩䥶炊而不蒸者王且不得火食也見兩黑犬嘷以北嘷以南者大王身死魂魄惑也見兩鏵倚吾宮堂者越人入吳邦伐宗廟掘社稷也見流水湯湯越吾宮牆者大王宮堂虛也前園橫索生樹桐者桐不為器用但為甬當與人俱葬也後房鍛者鼓小震者大息也王毋自行使臣下可矣太宰嚭王孫駱惶怖解冠幘肉袒而謝吳王忿聖言不祥乃使其身自受其殃王乃使力士石番以鐵杖擊聖中斷之為兩頭聖仰天嘆曰蒼天知冤乎直言正諫身死無功令吾家無葬我提我山中後世為聲響吳王使人提, WYG: ''}
