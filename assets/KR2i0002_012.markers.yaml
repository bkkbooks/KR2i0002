  - {type: variant, offset: 21, length: 7, content: 民殷眾禾稼登熟, SBCK: 誅乃身軍上有青氣盛明從闕其本廣末鋭而來者此逆}
  - {type: variant, offset: 21, length: 7, content: 民殷眾禾稼登熟, krp: 誅乃身軍上有青氣盛明從闕其本廣末鋭而來者此逆}
  - {type: substitution, offset: 23, original: 眾, replacement: 衆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19653}}
