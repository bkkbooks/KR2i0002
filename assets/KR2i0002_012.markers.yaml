  - {type: 'tls:seg', offset: 12, content: '', id: KR2i0002_CHANT_012-1a.2}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 百里行路之人道死尸哭越乃飾美女西施鄭旦使大夫種獻之於吳王曰}
  - {type: punctuation, offset: 14, content: ，, id: KR2i0002_CHANT_012-bkkpn1}
  - {type: 'tls:seg', offset: 14, content: '', id: KR2i0002_CHANT_012-1a.3}
  - {type: variant, offset: 14, length: 4, content: 吳王夫差, SBCK: 攻}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 越王句踐竊有天之遺西施鄭旦越邦洿下貧窮不敢當使下臣種載拜獻之大王}
  - {type: variant, offset: 14, length: 4, content: 吳王夫差, krp: 攻}
  - {type: variant, offset: 16, length: 26, content: 夫差之時其民殷眾禾稼登熟兵革堅利其民習於鬭戰闔廬剬子, WYG: 大悦申}
  - {type: variant, offset: 19, length: 1, content: 時, SBCK: 不勝軍上有赤色氣者徑抵天軍有應於天攻者}
  - {type: variant, offset: 19, length: 1, content: 時, krp: 不勝軍上有赤色氣者徑抵天軍有應於天攻者}
