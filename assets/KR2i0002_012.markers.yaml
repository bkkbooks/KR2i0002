  - {type: variant, offset: 43, length: 4, content: 之教行有, SBCK: 相氣取敵大數其法如是軍無氣筭於廟堂以知疆弱一五九西向吉東向敗亡無東二六十南向吉北向敗亡無北三七十一東向吉西向敗亡無西四八十二北向吉南向敗亡無南此其用兵月}
