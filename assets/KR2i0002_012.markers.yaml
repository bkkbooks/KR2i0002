  - {type: 'tls:seg', offset: 32, content: '', id: KR2i0002_CHANT_012-1a.7}
  - {type: variant, offset: 33, length: 8, content: 民習於鬭戰闔廬剬, SBCK: 謀未定青氣在右將弱兵多青氣在後將勇榖少先大後小青氣在左將少卒多兵少軍罷青氣在前將㬥其軍必來赤氣在軍上將謀未定其氣本廣末鋭而來者為逆兵氣衰去乃可攻赤氣在右將軍勇而兵少卒疆必以殺降赤氣在後將弱卒疆敵少攻之殺將其軍可降赤氣在右將勇敵多兵卒疆赤氣在前將勇兵少榖多卒少謀不來黄氣在軍上將謀未定其本廣末鋭而來者為逆兵氣衰去乃可攻黄氣在右將智而明兵多卒疆榖足而不可降黄氣在後將智而勇卒疆兵少榖少黄氣在左將弱卒少兵少榖亡攻之必傷黄氣在前將勇智卒多疆榖足而有多為焉一作不可攻也白氣在軍上將賢智而明卒威勇而疆其氣本廣末鋭而來者為逆兵氣衰去乃可攻白氣在右將勇而兵疆兵多榖亡白氣在後將仁而明卒少兵多榖少軍傷白氣在左將勇而疆卒多榖少可降白氣在前將弱卒亡榖少攻之可降黑氣在軍上將謀未定其氣本廣末鋭而來者為逆兵去乃可攻黒氣在右將弱卒少兵亡榖盡軍傷可不攻自降黒氣在後將勇卒疆兵少榖亡攻之殺將軍亡黒氣在左將智而勇卒少兵少攻之殺將其軍自降黒氣在前將智而明卒少榖盡可不攻自降故明將知氣變之形氣在軍上其謀未定其在右而低者欲為右伏兵之謀其氣在前而低者欲為前伏陣也其氣在後而低者欲為走兵陣也其氣陽者欲為去兵其氣在左而低者欲為左陣其氣間其軍欲有入邑右}
