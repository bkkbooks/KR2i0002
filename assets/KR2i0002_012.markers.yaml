  - {type: variant, offset: 1595, length: 1, content: 世, WYG: 謂也韓故治今京兆郡角亢也鄭故治角亢也燕故治今上漁陽右北平遼東莫郡尾箕也越故治今大越山陰南斗也呉故治西江都牛湏女也齊故治臨菑今濟北平原北海郡菑川遼東城陽虚危也衛故治濮陽今廣陽韓郡營室璧也魯故治太山東温周固水今魏東奎婁也梁故治今濟陰山陽濟北東郡畢也晉故治今代郡常山中山河間廣平郡觜也秦故治雍今内史也巴郡漢中隴西定襄太原安邑東井也韓故治雒今河南郡栁七星張也楚故治郢今南郡南陽汝南淮陽六安九江廬江豫章長沙翼軫也趙故治邯鄲今遼東隴西北地上郡鴈門北郡清河參也越絶書卷十二}
