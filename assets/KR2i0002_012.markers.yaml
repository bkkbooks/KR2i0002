  - {type: variant, offset: 196, length: 191, content: 見兩䥶炊而不蒸者大王聖德氣有餘也見兩黑犬嘷以北嘷以南者四夷已服朝諸侯也兩鏵倚吾宮堂者夾田夫也見流水湯湯越吾宮牆獻物已至則有餘也見前園橫索生樹桐者樂府吹巧也見後房鍛者扶挾鼓小震者宮女鼓樂也吳王大悅而賜太宰嚭雜繒四十疋王心不已召王孫駱而告之對曰臣智淺能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子王孫聖為人幼而好學長而憙遊博聞彊識通於方來之事可占大王所夢臣請召之吳王曰諾王孫駱移記曰, SBCK: 晉故治}
