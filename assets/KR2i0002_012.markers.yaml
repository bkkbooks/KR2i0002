  - {type: variant, offset: 997, length: 586, content: 前再拜曰逆言已滅讒諛已亡因酌行觴時可以行矣吳王曰諾王孫駱為左校司馬太宰嚭為右校司馬王從騎三千旌旗羽蓋自處中軍伐齊大剋師兵三月不去過伐晉晉知其兵革之罷倦糧食盡索興師擊之大敗吳師涉江流血浮尸者不可勝數吳王不忍率其餘兵相將至秦餘杭之山饑餓足行乏糧視瞻不明據地飲水持籠稻而餐之顧謂左右曰此何名群臣對曰是籠稻也吳王曰悲哉此公孫聖所言王且不得火食太宰嚭曰秦餘杭山西坂閒燕可以休息大王亟飡而去尚有十數里耳吳王曰吾嘗戮公孫聖於斯山子試為寡人前呼之即尚在耶當有聲響太宰嚭即上山三呼聖三應吳王大怖足行屬腐面如死灰色曰公孫聖令寡人得邦誠世世相事言未畢越王追至兵三圍吳大夫種處中范蠡數吳王曰王有過者五寧知之乎殺忠臣伍子胥公孫聖胥為人先知忠信中斷之入江聖正言直諫身死無功此非大過者二乎夫齊無罪空復伐之使鬼神不血食社稷廢蕪父子離散兄弟異居此非大過者三乎夫越王句踐雖東僻亦得繫於天皇之位無罪而王恒使其芻莝秩馬比於奴虜此非大過者四乎太宰嚭讒諛佞諂斷絕王世聽而用之此非大過者五乎吳王曰今日聞命矣越王撫步光之劍杖屈盧之矛瞋目謂范蠡曰子何不早圖之乎范蠡曰臣不敢殺主臣存主若亡今日遜敬天報微功越王謂吳王曰世無千歲之人死一耳范蠡左手持鼓右手操枹而鼓之曰上天蒼蒼若存若亡何須軍士斷子之頸挫子之骸不亦繆乎吳王曰聞命矣以三寸之帛冥吾兩目使死者有知吾慚見伍子胥公孫聖以為無知吾恥生越王則解綬以冥其目遂伏劍而死越王殺太宰嚭戮, WYG: 與}
