  - {type: variant, offset: 1586, length: 0, content: '', WYG: 外傳記軍氣夫聖人行兵上與天合德下與地合明中與人合心義合乃動見可乃取小人則不然以彊厭弱取利於危不知逆順快心於非故聖人獨知氣變之情以明勝負之道凡氣有五色青黄赤白黑色因有五變人氣變軍上有氣五色相連與天相抵此天應不可攻攻之無後其氣盛者攻之不勝軍上有赤色氣者徑抵天軍有應於天攻者其誅乃身軍上有青氣盛明從闕其本廣末鋭而來者此逆兵氣也為未可攻衰去乃可攻青氣在上其謀未定青氣在右將弱兵多青氣在後將勇榖少先大後小青氣在左將少卒多兵少軍罷青氣在前將暴其軍必來赤氣在軍上將謀未定其氣本廣末鋭而來者為逆兵氣衰去乃可攻赤氣在右將軍勇而兵少卒彊必以殺降赤氣在後將弱卒彊敵少攻之殺將其軍可降赤氣在右將勇敵多兵卒彊赤氣在前將勇兵少榖多卒少謀不來黄氣在軍上將謀未定其本廣末鋭而來者為逆兵氣衰去乃可攻黄氣在右將智而明兵多卒彊榖足而不可降黄氣在後將智而勇卒彊兵少榖少黄氣在左將弱卒少兵少榖亡攻之必傷黄氣在前將勇智卒多彊榖足而有多為一作焉不可攻也白氣在軍上將賢智而明卒威勇而彊其氣本廣末鋭而來者為逆兵氣衰去乃可攻白氣在右將勇而兵彊兵多榖亡白氣在後將仁而明卒少兵多榖少軍傷白氣在左將勇而彊卒多榖少可降白氣在前將弱卒亡榖少攻之可降黑氣在軍上將謀未定其氣本廣末鋭而來者為逆兵去乃可攻黑氣在右將弱卒少兵亡榖盡軍傷可不攻自降黑氣在後將勇卒彊兵少榖亡攻之殺將軍亡黑氣在左將智而勇卒少兵少攻之殺將其軍自降黑氣在前將智而明卒少榖盡可不攻自降故明將知氣變之形氣在軍上其謀未定其在右而低者欲為右伏兵之謀其氣在前而低者欲為前伏陣也其氣在後而低者欲為走兵陣也其氣陽者欲為去兵其氣在左而低者欲為左陣其氣間其軍欲有入邑右子胥相氣取敵大數其法如是軍無氣算於廟堂以知彊弱一五九西向吉東向敗亡無東二六十南向吉北向敗亡無北三七十一東向吉西向敗亡無西四八十二北向吉南向敗亡無南此其用兵日月數吉凶所避也舉兵無擊太嵗上物夘也始出各利}
