  - {type: variant, offset: 981, length: 165, content: 風數至飛揚汝灰汝更能為聲哉太宰嚭前再拜曰逆言已滅讒諛已亡因酌行觴時可以行矣吳王曰諾王孫駱為左校司馬太宰嚭為右校司馬王從騎三千旌旗羽蓋自處中軍伐齊大剋師兵三月不去過伐晉晉知其兵革之罷倦糧食盡索興師擊之大敗吳師涉江流血浮尸者不可勝數吳王不忍率其餘兵相將至秦餘杭之山饑餓足行乏糧視瞻不明據地飲水持籠稻而餐之顧謂左右曰此何名群臣對曰是籠稻, SBCK: 井}
