  - {type: variant, offset: 1423, length: 173, content: 日聞命矣越王撫步光之劍杖屈盧之矛瞋目謂范蠡曰子何不早圖之乎范蠡曰臣不敢殺主臣存主若亡今日遜敬天報微功越王謂吳王曰世無千歲之人死一耳范蠡左手持鼓右手操枹而鼓之曰上天蒼蒼若存若亡何須軍士斷子之頸挫子之骸不亦繆乎吳王曰聞命矣以三寸之帛冥吾兩目使死者有知吾慚見伍子胥公孫聖以為無知吾恥生越王則解綬以冥其目遂伏劍而死越王殺太宰嚭戮其妻子以其不忠信斷絕吳之世, SBCK: 河南郡柳七星張也}
