  body:
  - {type: variant, offset: 1, length: 2, content: 絕外, WYG: 絶書卷十二漢袁康撰内經九術昔者越王句踐問大夫種曰吾欲伐吳奈何能有功乎大夫種對曰伐吳有九術王曰何謂九術對曰一曰尊天地事鬼神二曰重財幣一作帛以遺其君三曰貴糴粟槖以空其邦四曰遺之好美以為勞其志五曰遺之巧匠使起宫室髙臺盡其財疲其力六曰遺其諛臣使之易伐七曰彊其諫臣使之自殺八曰邦家富而備器九曰堅厲甲兵以承其弊故曰九者勿患戒口勿}
  - {type: page-break, offset: 1, content: '', id: KR2i0002_WYG_012-1b, image: WYG0463/WYG0463-0116b.png}
  - {type: substitution, offset: 1, original: 絕, replacement: 絶, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20837}}
  - {type: variant, offset: 4, length: 1, content: 記, WYG: 以取天下不難况於吳乎越王曰善於是作為策楯嬰以白璧鏤以黄金𩔖龍蛇而行者乃使大夫種獻之於吳曰東海役臣孤句踐使者臣種敢修下吏問於左右頼有天下之力竊為小殿有餘財載拜獻之大王}
  - {type: variant, offset: 5, length: 4, content: 吳王占夢, SBCK: 軍氣}
  - {type: variant, offset: 5, length: 4, content: 吳王占夢, krp: 軍氣}
  - {type: variant, offset: 7, length: 4, content: 占夢第十, WYG: 大悦申胥諫曰不可王勿受昔桀起靈門紂起鹿臺陰陽不和五榖不時天與之災邦家空虚遂以之亡大王受之是後必有災吳王不聽遂受之而起姑胥臺三年聚財五年乃成髙見}
  - {type: page-break, offset: 7, content: '', id: KR2i0002_WYG_012-2a, image: WYG0463/WYG0463-0116c.png}
  - {type: variant, offset: 11, length: 2, content: 二昔, SBCK: 五夫聖人行兵上與天合德下與地合明中與人合心義合乃動見可乃取小人則不然以疆厭弱取利於危不知逆順快心於非故聖人獨知氣變之情以明勝負之道凡氣有五色青黄赤白黒色因有五變人氣變軍上有氣五色相連與天相抵此天應不可攻攻之無後其氣盛}
  - {type: page-break, offset: 11, content: '', id: KR2i0002_SBCK_012-3b}
  - {type: variant, offset: 11, length: 2, content: 二昔, krp: 五夫聖人行兵上與天合德下與地合明中與人合心義合乃動見可乃取小人則不然以疆厭弱取利於危不知逆順快心於非故聖人獨知氣變之情以明勝負之道凡氣有五色青黄赤白黒色因有五變人氣變軍上有氣五色相連與天相抵此天應不可攻攻之無後其氣盛}
