  - {type: 'tls:seg', offset: 371, content: '', id: KR2i0002_CHANT_004-4a.8}
  - {type: variant, offset: 371, length: 0, content: '', SBCK: 則無價矣夫人主利源流非必身為之也視民所不足及其有餘為之命以利之而來諸侯守法度任賢使能償其成事傳其驗而已如此則邦富兵疆而不衰矣羣臣無空恭之禮淫泆之行務有於道術不習源流又不任賢使能諫者則誅則邦貧兵弱刑繁則羣臣多空恭之理淫佚之行矣夫諛者反有德忠者反有刑去刑就德人之情也邦貧兵弱致亂雖有聖臣亦不諫也務在諛主而已矣今夫萬民有明父母亦如邦有明主父母利源流明其法術以任賢子徼成其事而已則家富而不衰矣不能利源流又不任賢子賢子有諫者憎之如此者不習於道術也愈信其意而行其}
  - {type: page-break, offset: 371, content: '', id: KR2i0002_SBCK_004-5b}
  - {type: variant, offset: 371, length: 0, content: '', WYG: 則無價矣夫人主利源流非必身為之也視民所不足及其有餘為之命以利之而來諸侯守法度任賢使能償其成事傳其驗而已如此則邦富兵彊而不衰矣羣臣無空恭之禮淫佚之行務有於道術不習源流又不任賢使能諫者則誅則邦貧兵弱刑繁則羣臣多空恭之禮淫佚之行矣夫諛者反有德忠者反有刑去刑就德人之情也邦貧兵弱致亂雖有聖臣亦不諫也務在諛主而已矣今夫萬民有明父母亦如邦有明主父母利源流明其法術以任賢子徼成其事而已則家富而不衰矣不能利源流又不任賢子賢子有諫者憎之如此者不習於道術也愈信其意而行其}
