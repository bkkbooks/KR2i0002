  - {type: variant, offset: 7, length: 268, content: 吳何以稱人乎夷狄之也憂中邦柰何乎伍子胥父誅於楚子胥挾弓身干闔廬闔廬曰士之甚勇之甚將為之報仇子胥曰不可諸侯不為匹夫報仇且臣聞之事君猶事父也虧君之行報父之仇不可於是止蔡昭公南朝楚被羔裘囊瓦求之昭公不與即拘昭公於南郢三年然後歸之昭公去至河用事曰天下誰能伐楚乎寡人願為前列楚聞之使囊瓦興師伐蔡昭公聞子胥在吳請救蔡子胥於是報闔廬曰蔡公南朝被羔裘囊瓦求之蔡公不與拘蔡公三年然後歸之蔡公至河曰天下誰能伐楚者乎寡人願為前列楚聞之使囊瓦興師伐蔡蔡非有罪也楚為無道君若有憂中國之事意者時可矣闔廬於是使子胥興師救蔡而伐楚楚王已死子胥將卒六千人操鞭笞平王之墳曰, SBCK: 越絶卷第四越絶計倪内經第五}
