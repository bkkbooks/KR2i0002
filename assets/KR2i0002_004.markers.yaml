  - {type: variant, offset: 361, length: 0, content: '', SBCK: 止非不欲為也時返不知所在謀不成而息恐為天下咎以敵攻敵未知誰負大邦既已備小邑既已保五榖既已收野無積庾廪糧則不屬無所安取恐津梁之不通勞軍紆吾糧道吾聞先生明於時交察於道理恐動而無功故問其道計倪對曰是固不可興師者必有一字須先蓄積食錢布帛不先蓄積士卒數飢飢則易傷重遲不可戰戰則耳目不聰明耳不能聽視不能見什部之不能使退之不能解進之不能行飢饉不可以動神氣去而萬里伏弩而乳郅頭而皇皇疆弩不彀發不能當旁軍見弱走之如犬逐羊靡從部分伏地而死前頓後僵與人同時而戰獨獨字一無受天之殃未必天之罪也亦在其將王興師以年數恐一旦而亡失邦無明筋骨為野越王曰善請問其方吾聞先生明於治嵗萬物盡長欲聞其治術可以為教常子明以告我寡人弗敢忘計倪對曰人之生無㡬必先憂積蓄以備妖祥凡人生或老或弱或疆或怯不早備生不能相葬王其審之必先省賦歛勸農桑飢饉在問或水或塘因熟積以備四方師出無時未知所當應變而動隨物常羊卒然有師彼日以弱我日以疆得世之和擅世之陽王無忽忘慎無如㑹稽之飢不可再更王其審之嘗言息貨王不聽臣故退而不言處於吳楚越之間以魚三邦之利乃知天下之易反也}
