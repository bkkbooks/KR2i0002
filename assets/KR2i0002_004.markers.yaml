  - {type: variant, offset: 1746, length: 358, content: 道誅殺無刑賞賜不當文王以聖事紂天下皆盡誠知其賢聖從之此謂文王以務爭也紂以惡刑爭文王行至聖以仁義爭此之謂也武王以禮信文王死九年天下八百諸侯皆一旦會於孟津之上不言同辭不呼自來盡知武王忠信欲從武王與之伐紂當是時比干箕子微子尚在武王賢之未敢伐也還諸侯歸二年紂賊比干囚箕子微子去之刳妊婦殘朝涉武王見賢臣已亡乃朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封微子於宋此武王以禮信也周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足禾麥茂美使人以時說之以禮上順天地澤及夷狄於是管叔蔡叔不知周公而讒之成王周公乃辭位出巡狩於邊一年天暴風雨日夜不休五穀不生樹木盡偃成王大恐乃發金縢之櫃察周公之冊知周公乃有盛德王乃夜迎周公流涕而行周公反國天應之福五穀皆生樹木皆起天下皆實此周公之盛德也, SBCK: 貨越絶卷第四}
