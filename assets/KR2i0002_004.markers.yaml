  - {type: variant, offset: 365, length: 5, content: 貴持盈持盈, SBCK: 下以傳黄帝黄帝於是上事天下治地故少昊治西方蚩尤佐之使主金􅀇㝠目宿一作治北方白辨佐之主水太皥治東方袁何佐之使主木祝使融治南方僕程佐之使主火后土治中央后稷佐之使主土竝有五方以為綱紀是以易地而輔萬物之常王審用臣之議大則可以王小則可以霸於何有哉越王曰請問其要計倪對曰太隂二嵗處金則穰三嵗處水則毁三嵗處木則康三嵗處火則旱故散有時積糴有時領則決萬物不過三嵗而發矣以智論之以決斷之以道佐之斷長續短一嵗再倍其次一倍其次而反水則資車旱則資舟物之理也天下六嵗一穰六嵗一康凡十二嵗一飢是以民相離也故聖人早知天地之反為之預備故湯之時比七年旱而民不飢禹之時比九年水而民不流其主能通習源流以任賢使能則轉轂乎千里外貨可來也不習則百里之内不可致也人主所求其價十倍其所擇}
