  - {type: variant, offset: 1075, length: 540, content: 齊君小白反國用管仲九合諸侯一匡天下故為桓公此之謂也堯有不慈之名堯太子丹朱倨驕懷禽獸之心堯知不可用退丹朱而以天下傳舜此之謂堯有不慈之名舜有不孝之行舜親父假母母常殺舜舜去耕歷山三年大熟身自外養父母皆饑舜父頑母嚚兄狂弟敖舜求為變心易志舜為瞽瞍子也瞽瞍欲殺舜未嘗可得呼而使之未嘗不在側此舜有不孝之行舜用其仇而王天下者言舜父瞽瞍用其後妻常欲殺舜舜不為失孝行天下稱之堯聞其賢遂以天下傳之此為王天下仇者舜後母也桓公召其賊而霸諸侯者管仲臣於桓公兄公子糾糾與桓爭國管仲張弓射桓公中其帶鉤桓公受之赦其大罪立為齊相天下莫不向服慕義是謂召其賊霸諸侯也夏啟獻犧於益啟者禹之子益與禹臣於舜舜傳之禹薦益而封之百里禹崩啟立曉知王事達於君臣之義益死之後啟歲善犧牲以祠之經曰夏啟善犧於益此之謂也湯獻牛荊之伯之伯者荊州之君也湯行仁義敬鬼神天下皆一心歸之當是時荊伯未從也湯於是乃飾犧牛以事荊伯乃媿然曰失事聖人禮乃委其誠心此謂湯獻牛荊之伯也越王句踐反國六年皆得士民之眾而欲伐吳於是乃使之維甲維甲者治甲系斷修內矛赤雞稽繇者也越人謂人鎩也方舟航買儀塵者越人往如江也治須慮者越人謂船為須慮亟怒紛紛者怒貌也怒至士擊高文者躍勇士也習之於夷夷海也宿之於萊萊野也致之於單單者堵也舜之時鯀不從令堯遭帝嚳之後亂洪水滔天堯使鯀治之九年弗能治堯, SBCK: 上物賈}
