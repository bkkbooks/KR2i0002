  - {type: variant, offset: 565, length: 2, content: 施大, SBCK: 常數發無道故貧而命不長是聖人幷苞而陰行之以感愚夫衆人容容盡欲富貴莫知其鄉越王曰善請問其方計倪對曰從寅至未陽也太隂在陽嵗德在隂嵗美在是聖人動而應之制其收發常以太隂在隂而發隂且盡之嵗亟賣六畜貨財以益收五榖以應陽之至也陽且盡之嵗亟發糴以收田宅牛馬積歛貨財聚棺木以應陰之至也此皆十倍者也其次五倍夫有時而散是故聖人反其刑順其衡收聚}
