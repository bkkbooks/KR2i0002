  - {type: variant, offset: 570, length: 234, content: 功者也人道不逆四時者言王者以下至於庶人皆當和陰陽四時之變順之者有福逆之者有殃故曰人道不逆四時之謂也因惽視動者言存亡吉凶之應善惡之敘必有漸也天道未作不先為客者范蠡值吳伍子胥教化天下從之未有死亡之失故以天道未作不先為客言客者去其國入人國地兆未發不先動眾言王者以下至於庶人非暮春中夏之時不可以種五穀興土利國家不見死亡之失不可伐也故地兆未發不先動眾此之謂也吳人敗於就李吳之戰地敗者言越之伐吳未戰吳闔廬卒敗而去也卒者闔廬死也天子稱崩諸侯稱薨大夫稱卒士稱不祿闔廬諸侯也不稱薨而稱卒, SBCK: 貧乞}
