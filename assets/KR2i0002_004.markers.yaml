  - {type: variant, offset: 372, length: 0, content: '', SBCK: 後雖有敗}
  - {type: variant, offset: 372, length: 0, content: '', WYG: 後雖有敗}
  - {type: variant, offset: 372, length: 0, content: '', krp: 後雖有敗}
  - {type: variant, offset: 373, length: 1, content: 失, SBCK: 自過也夫父子之為親也非得不諫諫而不聽家貧致亂雖有聖子亦不治也務在於諛之而巳父子不和兄弟不調雖欲富也必貧而日衰越王曰善子何年少於物之長也計倪對曰人固不同惠種生聖癡種生狂桂實生桂桐實生桐先生者未必能知後生者未必不能明是故聖主置臣不以少長有道者進無道者退愚者日以退聖者日以長人主無私賞者有功越王曰善論事若是其審也物有妖祥乎計倪對曰有}
