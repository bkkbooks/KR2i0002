  - {type: variant, offset: 752, length: 388, content: 越勿毀親四鄰以仁救暴困齊威申晉邦以武救魯毋絕周室明諸侯以義如此則臣之所見溢乎負海必率九夷而朝即王業成矣且大吳畏小越如此臣請東見越王使之出銳師以從下吏是君實空越而名從諸侯以伐也吳王大悅乃使子貢之越子貢東見越王越王聞之除道郊迎至縣身御子貢至舍而問曰此乃僻陋之邦蠻夷之民也大夫何索居然而辱乃至於此子貢曰弔君故來越王句踐稽首再拜曰孤聞之禍與福為鄰今大夫弔孤孤之福也敢遂聞其說子貢曰臣今者見吳王告以救魯而伐齊其心申其志畏越曰嘗與越戰棲於會稽山上夫越君賢主也苦身勞力以夜接日內飾其政外事諸侯必將有報我之心子待我伐越而聽子且夫無報人之心而使人疑之者拙也有報人之心而使人知之者殆也事未發而先聞者危也三者舉事之大忌也越王句踐稽首再拜曰昔者孤不幸少失先人內不自量與吳人戰軍敗身辱遺先人恥遯逃出走上棲會稽山下守溟海唯魚鱉是見今大夫不辱而身見之又出玉聲以教孤孤賴先人之賜敢不奉教乎子貢曰臣聞之明主任人, SBCK: 亡}
