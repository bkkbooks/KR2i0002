  - {type: variant, offset: 1267, length: 436, content: 勝則君之福也彼戰而勝必以其餘兵臨晉臣請北見晉君令共攻之弱吳必矣其騎士銳兵弊乎齊重器羽旄盡乎晉則君制其敝此滅吳必矣越王句踐稽首再拜曰昔者吳王分其人民之眾以殘伐吳邦殺敗吾民圖吾百姓夷吾宗廟邦為空棘身為魚鱉餌今孤之怨吳王深於骨髓而孤之事吳王如子之畏父弟之敬兄此孤之外言也大夫有賜故孤敢以疑請遂言之孤身不安床席口不甘厚味目不視好色耳不聽鐘鼓者已三年矣焦唇乾嗌苦心勞力上事群臣下養百姓願一與吳交天下之兵於中原之野與吳王整襟交臂而奮吳越之士繼踵連死士民流離肝腦塗地此孤之大願也如此不可得也今內自量吾國不足以傷吳外事諸侯而不能也孤欲空邦家措策力變容貌易名姓執箕帚養牛馬以臣事之孤雖知要領不屬手足異處四支布陳為鄉邑笑孤之意出焉大夫有賜是存亡邦而興死人也孤賴先人之賜敢不待命乎子貢曰夫吳王之為人也貪功名而不知利害越王慥然避位曰在子子貢曰賜為君觀夫吳王之為人賢彊以恣下下不能逆數戰伐士卒不能忍太宰嚭為人智而愚彊而弱巧言利辭以內其身善為偽詐以事其君知前而不知後順君之過以安其私是殘國之吏滅君之臣, SBCK: 作}
