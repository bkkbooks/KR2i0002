  - {type: variant, offset: 1705, length: 466, content: 王大悅子貢去而行越王送之金百鎰寶劍一良馬二子貢不受遂行至吳報吳王曰臣敬以下吏之言告越王越王大恐乃懼曰昔孤不幸少失先人內不自量抵罪於縣軍敗身辱遯逃出走棲於會稽邦為空棘身為魚鱉餌賴大王之賜使得奉俎豆而修祭祀大王之賜死且不敢忘何謀之敢慮其志甚恐似將使使者來子貢至五日越使果至曰東海役臣孤句踐使使臣種敢修下吏問於左右昔孤不幸少失先人內不自量抵罪於縣軍敗身辱遯逃出走棲於會稽邦為空棘身為魚鱉餌賴大王之賜使得奉俎豆而修祭祀大王之賜死且不忘今竊聞大王將興大義誅彊救弱困暴齊而撫周室故使越賤臣種以先人之藏器甲二十領屈盧之矛步光之劍以賀軍吏大王將遂大義則弊邑雖小請悉擇四疆之中出卒三千以從下吏孤請自被堅執銳以前受矢石君臣死無所恨矣吳王大悅乃召子貢而告之曰越使果來請出卒三千其君又從之與寡人伐齊可乎子貢曰不可夫空人之邦悉人之眾又從其君不仁也君受其幣許其師而辭其君吳王許諾子貢因去之晉謂晉君曰臣聞之慮不先定不可以應卒兵不先辨不可以勝敵今齊吳將戰彼戰而不勝越亂之必矣與齊戰而勝則必以其兵臨晉晉君大恐曰為之柰何子貢曰修兵休卒以待吳晉君許諾子貢去而之魯吳王果興, SBCK: 絶卷第}
