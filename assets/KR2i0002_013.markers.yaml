  - {type: variant, offset: 621, length: 0, content: '', WYG: 以至聖之道以説寡人誠非吾所及也且吾聞之也父辱則子死君辱則臣死今寡人親已辱於吳矣欲行一切之變以復吳仇願子更為寡人圖之范子曰君辱則死固其義也立死下士人而求成邦者上聖之計也且夫廣天下尊萬乗之主使百姓安其居樂其業者唯兵兵之要在於人人之要在於榖故民衆則主安穀多則兵彊王而備}
  - {type: variant, offset: 623, length: 0, content: '', WYG: 者然後可以圖之也越王曰吾欲富邦彊兵地狹民少奈何為之范子曰夫陽動於上以成天文陰動於下以成地理審察開置之要可以為富凡欲先知天門開及地户閉其術天髙五寸減天寸六分以成地謹司八穀初見出於天者是謂天門開地户閉陽氣不得下入地户故氣轉動而上下陰陽俱絶八穀不成大貴必應其嵗而起此天變見符也謹司八榖初見入於地者是謂地户閉陰陽俱㑹八穀大成其嵗大賤來年大饑此地變見端也謹司八穀初見半於}
  - {type: page-break, offset: 623, content: '', id: KR2i0002_WYG_013-7b, image: WYG0463/WYG0463-0122b.png}
