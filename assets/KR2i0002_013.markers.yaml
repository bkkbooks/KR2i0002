  - {type: variant, offset: 34, length: 1, content: 召, SBCK: 曰寡人躬行節儉下士求賢不使名過實此寡人所能行也多貯榖富百姓此乃天時水旱寧在一人耶何以僃之范子曰百里之神千里之君湯執其中和舉伊尹收天下雄雋之士練卒兵率諸侯兵伐桀為天下除殘去賊萬民皆歌}
