  - {type: variant, offset: 1126, length: 0, content: '', SBCK: 不望其報不貪天下之財而天下共富之所以其智能自貴於人而天下共尊之故曰富貴者天下所置不可奪也今王利地貪財接兵血刃僵尸流血欲以顯於世不亦謬乎越王曰上不逮於神農下不及於堯舜今子以至聖之道以説寡人誠非吾所及也且吾聞之也父辱則子死君辱則臣死今寡人親巳辱於吳矣欲行一切之變以復吳仇願子更為寡人圖之范子曰君辱則死固其義也立死下士人而求成邦者且聖之計也且夫廣天下尊萬乘之主使百姓安其居樂其業者唯兵兵之要在於人人之要在於榖故民衆則主安穀多則兵疆王而僃此二者然後可以圖之也越王曰吾欲富邦疆兵地狹民少奈何為之范子曰夫陽動於上以成天文隂動於下以成地理審察開置之要可以為富凡欲先知天門開及地户閉其術天高五寸减天寸六分以成地謹司八穀初見出於天者是謂天門開地户閉陽氣不得下入地户故氣轉動而上下隂陽俱絶八穀不成大貴必應其嵗而起此天變見符也謹司八榖初見入於地者是謂地户閉隂陽俱㑹八穀大成其嵗大賤來年大饑此地變見端也謹司八穀初見半於人者糴平熟無災害故天倡而見符地應而見瑞聖人上知天下知地中知人此之謂天平地平以此為天圖越王既巳勝吳三日反邦未至息自雄問大夫種曰夫聖人之術何以加於此乎大夫種曰不然王德范子之所言故天地之符應邦以藏聖人之心矣然而范子豫見之策未肎為王言者也越王愀然而恐靣有憂色請於范子稱曰寡人用夫子之計幸得勝呉盡夫子之力也寡人聞夫子明於隂陽進退豫知未形推徃引前後知千歲可得聞乎寡人虛心垂意聽於下風范子曰夫隂陽進退前後幽㝠未見未形此特殺生之柄而王制於四海此邦之重寳也王而毋泄此事臣請為王言之越王曰夫子幸教寡人願與之自藏至死不敢忘范子曰隂陽進退者固天道自然不足怪也夫隂入淺者即嵗善陽入深者則嵗惡幽幽􅄀􅄀豫知未形故聖人見物不疑是謂知時固聖人所不傳也夫堯舜禹湯皆有豫見之勞雖有凶年而民不窮越王曰善以丹書帛置之枕中以為邦寳范子巳告越王立志入海此謂天地之圖也越絶卷第十三}
