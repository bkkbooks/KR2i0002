  - {type: variant, offset: 36, length: 0, content: '', krp: 歸之是所謂執其中和者越王曰善哉中和所致也寡人雖不及賢主聖王欲執其中和而行之今諸侯之地或多或少疆弱不相當兵革㬥起何以應之范子曰知保人之身者可以王天下不知保人之身失天下者也越王曰何謂保人之身范子曰天生萬物而教之而生人得榖卽不死榖能生人能殺人故謂人身越王曰善哉今寡人欲保榖為之奈何范子曰欲保必親於野覩諸所多少為僃越王曰所少可得為因其貴賤亦有應乎范子曰夫八榖貴賤之法必察天之二表即决矣越王曰請}
  - {type: variant, offset: 37, length: 0, content: '', SBCK: 三表范子曰水之勢勝金隂氣蓄積大盛水據金而死故金中有水如此者歲大敗八榖皆貴金之勢勝木陽氣蓄積大盛金據木而死故木中有火如此者嵗大美八榖皆賤金木水火更相勝此天之三表者也不可不察能知三表可為邦寳不知三表之君千里之神萬里之君故天下之君發號施令必順於四時四時不正則隂陽不調寒暑失常如此則嵗惡五榖不登聖主施令必審於四時此至禁也越王曰此寡人所能行也願欲知圖榖上下貴賤欲與他貨之内以自實為之奈何范子曰夫八榖之賤也如宿榖之登其明也諦審察隂陽消息觀市之反覆雌雄之相逐天道乃畢越王問范子曰何執而昌何行而亡范子曰執其中則昌行奢侈則亡越王曰寡人欲聞其説范子曰臣聞古之賢主聖君執中和而原其終始即位安而萬物定矣不執其中和不原其終始即尊位傾萬物散文武之業桀紂之跡可知矣古者天子及至諸侯自㓕至亡漸漬乎滋味之費沒溺於聲色之􅀋牽攣於珍怪貴重之器故其邦空虗困其士民以為湏􅁷之樂百姓皆有悲心瓦解而倍畔者桀紂是也身死邦亡為天下笑此謂行奢侈而亡也湯有七十里地務執三表可謂邦寳不知三表身死棄道越王問范子曰春肅夏寒秋榮冬泄人治使然乎將道也范子曰天道三千五百嵗一治一亂終而復始如環之無端此天之常道也四時易次寒暑失常治民然也故天生萬物之時聖人命}
