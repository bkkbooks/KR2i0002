  - {type: variant, offset: 612, length: 1, content: 吳, SBCK: 人失其魂魄者死得其魂魄者生物皆}
  - {type: variant, offset: 612, length: 0, content: '', WYG: 人失其魂魄者死得其魂魄者生物皆有之將人也范子曰人有之萬物亦然天地之間人最為貴物之生穀為貴以生人與魂魄無異可得豫知也越王曰其善惡可得聞乎范子曰欲知八穀之貴賤上下衰極必察其魂魄視其動靜觀其所舎萬不失一問曰何謂魂魄對曰魂者槖也魄者生氣之源也故神生者出入無門上下無根見所而功自存故名之曰神神主生氣之精魂主死氣之舎也魄者主賤魂者主貴故當安靜而不動魂者方盛夏而行故萬物得以自昌神者主氣之精主貴而雲行故方盛夏之時不行則神氣稿而不成物矣故死凌生者嵗大敗生凌死者嵗大美故觀其魂魄即知嵗之善惡矣越王問於范子曰寡人聞陰陽之治不同力而功成不同氣而物生可得而知乎願聞其説范子曰臣聞陰陽氣不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之下藏伏壯於内使陰陽得成功於外夏三月盛暑之時萬物遂長陰氣避之下藏伏壯於内然而萬物親而信之是所謂也陽者主生萬物方夏三月之時大熱不至則萬物不能成陰氣主殺方冬三月之時地不内藏則根荄不成即春無生故一時失度即四序為不行越王曰善寡人已聞陰陽之事榖之貴賤可得而知乎范子曰陽者主貴陰者主賤故當寒而不寒者榖為之暴貴當温而不温者榖為之暴賤譬猶形影聲響相聞豈得不復哉故曰秋冬貴陽氣施於陰陽極而復貴春夏賤陰氣施於陽陽極而不復越王曰善哉以丹書帛置之枕中以為國寶越五日困於}
