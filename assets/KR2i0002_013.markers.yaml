  - {type: variant, offset: 419, length: 189, content: 女死殺生以送之湛盧之劍去之如水行秦過楚楚王臥而窹得吳王湛盧之劍將首魁漂而存焉秦王聞而求之不得興師擊楚曰與我湛盧之劍還師去汝楚王不與時闔廬又以魚腸之劍刺吳王僚使披腸夷之甲三事闔廬使專諸為奏炙魚者引劍而刺之遂弒王僚此其小試於敵邦未見其大用於天下也今赤堇之山已合若耶之溪深而不測群神不下歐冶子即死雖復傾城量金珠玉竭河猶不能得此一物有市之鄉三駿馬千疋千戶之都二何足言哉楚王召風胡子而問之, SBCK: ''}
