  - {type: variant, offset: 613, length: 3, content: 有干將, WYG: 請於范子曰寡人守國無術負於萬物㡬亡邦危社稷為旁邦所議無定足而立欲捐軀出死以報吳仇為之奈何范子曰臣聞聖主為不可為之行不惡人之謗已為足舉之德不德人之稱已舜循之歴山而天下從風使舜釋其所循而求天下之利則恐不全其身昔者神農之治天下務利之而已矣不望其報不貪天下之財而天下共富之所以其智能自貴於人而天下共尊之故曰富貴者天下所置不可奪也今王利地貪財接兵血刃僵屍流血欲以顯於世不亦謬乎}
