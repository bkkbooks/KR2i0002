  - {type: variant, offset: 1124, length: 1, content: 命, SBCK: 隂陽之治不同力而功成不同氣而物生可得而知乎願聞其説范子曰臣聞隂陽氣不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之下藏伏壯於内使隂陽得成功於外夏三月盛暑之時萬物遂長隂氣避之下藏伏壯於内然而萬物親而信之是所謂也陽者主生萬物方夏三月之時大熱不至則萬物不能成隂氣主殺方冬三月之時地不内藏則根荄不成卽春無生故一時失度卽四序為不行越王曰善寡人已聞隂陽之事榖之貴賤可得而知乎范子曰陽者主貴隂者主賤故當寒而不寒者榖為之㬥貴當温而不温者榖為之㬥賤譬猶形影聲響相聞豈得不復哉故曰秋冬貴陽氣施於隂隂極而復貴春夏賤隂氣施於陽陽極而不復越王曰善哉以丹書帛置之枕中以為國寶越五日困於吳請於范子曰寡人守國無術負於萬物㡬亡邦危社稷為旁邦所議無定足而立欲捐軀出死以報吳仇為之奈何范子曰臣聞聖主為不可為之行不惡人之謗巳為足舉之德不德人之稱已舜循之歷山而天下從風使舜釋其所循而求天下之利則恐不全其身昔者神農之治天下務利之而已}
