  - {type: variant, offset: 680, length: 283, content: 吳見歐冶子干將使之作為鐵劍歐冶子干將鑿茨山洩其溪取鐵英作為鐵劍三枚一曰龍淵二曰泰阿三曰工布畢成風胡子奏之楚王楚王見此三劍之精神大悅見風胡子問之曰此三劍何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚王曰何謂龍淵泰阿工布風胡子對曰欲知龍淵觀其狀如登高山臨深淵欲知泰阿觀其釽巍巍翼翼如流水之波欲知工布觀其釽從文間起至脊而止如珠而不可衽文若流水而不絕晉鄭王聞而求之不得興師圍楚之城三年不解倉穀粟索庫無兵革左右群臣賢士莫能禁止於是楚王聞之引泰阿之劍登城而麾之三軍破敗士卒迷惑流血千里猛獸歐瞻江水折揚晉鄭之頭畢白楚王於是大悅曰此劍威耶寡人力耶風胡子對曰劍之威也因大王之神楚, WYG: 越}
