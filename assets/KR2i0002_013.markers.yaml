  - {type: variant, offset: 34, length: 1, content: 召, krp: 曰寡人躬行節儉下士求賢不使名過實此寡人所能行也多貯榖富百姓此乃天時水旱寧在一人耶何以僃之范子曰百里之神千里之君湯執其中和舉伊尹收天下雄雋之士練卒兵率諸侯兵伐桀為天下除殘去賊萬民皆歌}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 歸之是所謂執其中和者越王曰善哉中和所致也寡人雖不及賢主聖王欲執其中和而行之今諸侯之地或多或少疆弱不相當兵革㬥起何以應之范子曰知保人之身者可以王天下不知保人之身失天下者也越王曰何謂保人之身范子曰天生萬物而教之而生人得榖卽不死榖能生人能殺人故謂人身越王曰善哉今寡人欲保榖為之奈何范子曰欲保必親於野覩諸所多少為僃越王曰所少可得為因其貴賤亦有應乎范子曰夫八榖貴賤之法必察天之二表即决矣越王曰請}
  - {type: page-break, offset: 36, content: '', id: KR2i0002_SBCK_013-2b}
  - {type: page-break, offset: 36, content: '', id: KR2i0002_SBCK_013-3a}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 歸之是所謂執其中和者越王曰善哉中和所致也寡人雖不及賢主聖王欲執其中和而行之今諸侯之地或多或少彊弱不相當兵革暴起何以應之范子曰知保人之身者可以王天下不知保人之身失天下者也越王曰何謂保人之身范子曰天生萬物而教之而生人得榖即不死榖能生人能殺人故謂人身越王曰善哉今寡人欲保榖為之奈何范子曰欲保必親於野覩諸所多少為備越王曰所少可得為因其貴賤亦有應乎范子曰夫八榖貴賤之法必察天之三表即決矣越王曰請}
