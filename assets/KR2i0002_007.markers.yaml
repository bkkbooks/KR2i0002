  - {type: variant, offset: 154, length: 394, content: 厄會之際後王復空王曰何以言之子胥曰後必將失道王食禽肉坐而待死佞諂之臣將至不久安危之兆各有明紀虹蜺牽牛其異女黃氣在上青黑於下太歲八會壬子數九王相之氣自十一倍死由無氣如法而止太子無氣其異三世日月光明歷南斗吳越為鄰同俗并土西州大江東絕大海兩邦同城相亞門戶憂在於斯必將為咎越有神山難與為鄰願王定之毋洩臣言吳使子胥救蔡誅彊楚笞平王墓久而不去意欲報楚楚乃購之千金眾人莫能止之有野人謂子胥曰止吾是於斧掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還故無往不復何德不報漁者一言千金歸焉因是還去范蠡興師戰於就李闔廬見中於飛矢子胥還師中媿於吳被秦號年至夫差復霸諸侯興師伐越任用子胥雖夫差驕奢釋越之圍子胥諫而誅宰嚭諛心卒以亡吳夫差窮困請為匹夫范蠡不許滅於五湖子胥策於吳可謂明乎昔者吳王夫差興師伐越敗兵就李大風發狂日夜不止車敗馬失騎士墮死大船陵居小船沒水吳王曰寡人晝臥夢見井嬴溢大與越爭彗越將掃我軍其凶乎孰與師還, WYG: ''}
