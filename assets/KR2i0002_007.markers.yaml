  - {type: variant, offset: 1240, length: 1, content: 盡, WYG: 疑之者拙也有報人之心而使人知之者殆也事未發而聞者危也三者舉事之大忌越王句踐稽首載拜曰昔者孤不幸少失先人内不自量與吳人戰軍敗身辱遺先人恥遯逃出走上棲會稽山下守溟海唯魚鼈是見今大夫不辱而身見之又出玉聲}
