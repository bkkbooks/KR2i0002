  - {type: variant, offset: 1331, length: 2, content: 終日, SBCK: 於世故臨財分利則使仁涉危拒難則使勇用衆治民則使賢正天下定諸侯則使聖人臣竊練下吏之心兵疆}
  - {type: variant, offset: 1331, length: 2, content: 終日, krp: 於世故臨財分利則使仁涉危拒難則使勇用衆治民則使賢正天下定諸侯則使聖人臣竊練下吏之心兵疆}
  - {type: variant, offset: 1334, length: 2, content: 語疾, SBCK: 不幷弱勢在其上位而行惡令其下者其君㡬乎臣竊自練可以成功至王者其唯臣㡬乎今夫吳王有伐齊之志君無惜重器以喜其心毋惡卑辭以尊其禮則伐齊必矣彼戰而不勝則君之福也彼戰而勝必以其餘兵臨晉臣請北見晉君令共攻之弱吳必矣其騎士鋭兵弊乎齊重器羽旄盡乎晉則君制其敝此滅吳必矣越王句踐稽首再拜曰昔者吳王分其人民之衆以殘伐吾􅀖殺敗吾民圖吾百姓夷吾宗廟邦為空棘身為魚鼈餌今孤之怨吳王深於骨髓而孤之事吳王如子之畏父弟之敬兄此孤之外言也大夫有賜故孤敢以疑請遂言之孤身不安牀席口不甘厚味目不視好色耳不聽鐘鼓者已三年矣焦唇乾嗌苦心勞力上事羣臣下養百姓願一與吳交天下之兵於中原之野與呉王整襟交臂而奮吳越之士繼蹟連死士民流離肝腦塗地此孤之大願也如此不可得也今内自量吾國不足以傷吳外事諸侯不能也孤欲空邦家措策力變容貎易名姓執箕箒養牛馬以臣事之孤雖要領不屬手足異處四支布}
