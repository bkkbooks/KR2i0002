  - {type: variant, offset: 1270, length: 1, content: 縣, SBCK: 辭蠡曰吳越二邦同氣共俗地户之位非吳則越乃入越越王常與言盡日大夫石買居國有權辯口進曰􅃷女不貞􅃷士不信客歷諸侯渡河津無因自致殆非真賢夫和氏之璧求者不爭賈騏驥之材不難阻險之路之邦歷諸侯無所售道聽之徒唯大王察之於是范蠡退而不言遊於楚越之間大夫種進曰昔者市偷自衒於晉晉用之而勝楚伊尹負􅂦入殷遂佐湯取天下有智之士不在逺近取也謂之帝王求備者亡易曰有髙世之材必有負俗之累有至智之明者必破庶衆之議成大功者不拘於俗論大道者不合於衆唯大王察之於是石買益疏其後使將兵於外遂為軍士所殺是時句踐失衆棲於㑹稽之山更用種蠡之䇿得以存故虞舜曰以學乃時而行此猶良藥也王曰石買}
