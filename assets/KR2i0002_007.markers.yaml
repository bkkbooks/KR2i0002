  - {type: variant, offset: 1257, length: 8, content: 內視若盲反聽若聾, WYG: 成功至王者其唯臣㡬乎今夫吳王有伐齊之志君無惜重器以喜其心毋惡卑辭以尊其禮則伐齊必矣彼戰而不勝則君之福也彼戰而勝必以其餘兵臨晉臣請北見晉君令共攻之弱吳必矣其騎士鋭兵弊乎齊重器羽旄盡乎晉則君制其敝此滅吳必矣越王句踐稽首再拜曰昔者吳王分其人民之衆以殘伐吾邦殺敗吾民圖吾百姓夷吾宗廟邦為空棘身為魚鼈餌今孤之怨吳王深於骨髓而孤之事吳王如子之畏父弟之敬兄此孤之外言也}
