  - {type: variant, offset: 1215, length: 1, content: 始, WYG: 兵而伐魯魯君憂也孔子患之乃召門人弟子而謂之曰諸侯有相伐者尚恥之今魯父母之邦也丘墓存焉今齊將伐之可無一出乎顔淵辭出孔子止之子路辭出孔子止之子貢辭出孔子遣之子貢行之齊見陳成恒曰夫魯難伐之邦而伐之過矣陳成恒曰魯之難伐何也子貢曰其城薄以卑池狹而淺其君愚而不仁其大臣偽而無用其士民有惡聞甲兵之心此不可與戰君不如伐吳吳城髙以厚池廣以深甲堅以新士選以飽重器精弩在其中又使明大夫守此邦易也君不如伐吳成恒忿然作色曰子之所難人之所易也子之所易人之所難也而以教恒何也子貢對曰臣聞憂在内者攻彊憂在外者攻弱今君憂内臣聞君三封而三不成者大臣有不聽者也今君破魯以廣齊墮魯以尊臣而君之功不與焉是君上驕主心下恣羣臣而求成大事難矣且夫上驕則犯臣驕則爭是君上於主有郤下與大臣交爭也如此則君立於齊危於重卵矣臣故曰不如伐吳且夫吳明猛以毅而行其令百姓習於戰守將明於法齊之愚為禽必矣今君悉擇四疆之中出大臣以環之黔首外死大臣内空是君上無彊臣之敵下無黔首之士孤立制齊者君也陳恒曰善雖然吾兵已在魯之城下若去而之吳大臣將有疑我之心為之奈何子貢曰君按兵無伐臣請見吳王使之救魯而伐齊君因以兵迎之陳成恒許諾乃行子貢南見呉王謂呉王曰臣聞之王者不絶世而霸者不彊敵千鈞之重加銖而移今萬乗之齊私千乗之魯而與吳爭彊臣切為君恐且夫救魯顯名也而伐齊大利也義在存亡魯勇在害彊齊而威申晉邦者則王者不疑也吳王曰雖然我常與越戰棲之會稽夫越君賢主也苦身勞力以夜接日内飾其政外事諸侯必將有報我之心子待吾伐越而還子貢曰不可夫越之彊不下魯而吳之彊不過齊君以伐越而還即齊也亦私魯矣且夫伐小越而畏彊齊者不勇見小利而忘大害者不智兩者臣無為君取焉且臣聞之仁人不困厄以廣其德智者不棄時以舉其功王者不絶世以立其義今君存越勿毁親四鄰以仁救暴困齊威申晉邦以武救魯毋絶周室明諸侯以義如此則臣之所見溢乎負海必率九夷而朝即王業成矣且大吳畏小越如此臣請東見越王使之出鋭師以從下吏是君實空越而名從諸侯以伐也吳王大悦乃行子貢子貢東見越王越王聞之除道郊迎至縣身御子貢至舎而問曰此乃僻陋之邦蠻夷之民也大夫何索}
