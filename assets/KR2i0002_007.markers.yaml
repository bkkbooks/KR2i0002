  - {type: variant, offset: 1337, length: 1, content: 霸, SBCK: 爲鄉邑笑孤之意出焉大夫有賜是存亡邦而興死人也孤頼先人之賜敢不待命乎子貢曰夫呉}
  - {type: variant, offset: 1337, length: 1, content: 霸, krp: 爲鄉邑笑孤之意出焉大夫有賜是存亡邦而興死人也孤頼先人之賜敢不待命乎子貢曰夫呉}
  - {type: variant, offset: 1340, length: 1, content: 道, SBCK: 爲人也貪功名而不知利害越王慥然避位曰在子子貢曰賜爲君觀夫吳王之爲人賢疆以恣下下不能逆數戰伐士卒不能忍太宰嚭為人智而愚疆而弱巧言利辭以内其身善為偽詐以事其君知前而不知後順君之過以安其私是殘國之吏滅君之臣也越王大悦子貢去而行越王送之金百鎰寶劒一良馬二子貢不受遂行至吳報呉王曰敬以下吏之言告越王越王大恐乃懼曰昔孤不幸少失先人内不自量抵罪於縣軍敗身辱遯逃出走棲于會稽邦為空棘身為魚鼈餌頼大王之賜使得奉爼豆而修祭祀大王之賜死且不忘何謀敢慮其}
