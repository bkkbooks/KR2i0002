  - {type: variant, offset: 1330, length: 0, content: '', SBCK: 所難人之所易也子之所易人之所難也而以教恒何也子貢對曰臣聞憂在内者攻疆憂在外者攻弱今君憂内臣聞君三封而三不成者大臣有不聽者也今君破魯以廣齊墮魯以尊臣而君之功不與焉是君上驕主心下恣羣臣而求成大事難矣且夫上驕則犯臣驕則爭是君上於主有却下與大臣交爭也如此則君立於齊危於重卵矣臣故曰不如伐吳且夫吳明猛以毅而行其令百姓習於戰守將明於法齊之愚為禽必矣今君悉擇四疆之中出大臣以環之黔首外死大臣内空是君上無疆臣之敵下無黔首之士孤立制齊者君也陳恒曰善雖然吾兵已在魯之城下若去而之吳大臣將有疑我之心為之奈何子貢曰君按兵無伐臣請見吳王使之救魯而伐齊君因以兵迎之陳成恒許諾乃行子貢南見呉王謂呉王曰臣聞之王者不絶世而霸者不疆敵千鈞之重加銖而移今萬乗之齊私千乗之魯而與吳爭疆臣切為君恐且夫救魯顯名也而伐齊大利也義在存亡魯勇在害疆齊而威申晉邦者則王者不疑也吳王曰雖然我常與越戰棲之會稽夫越君賢主也苦身勞力以夜接日内飾其政外事諸侯必將有報我之心子待吾伐越而還子貢曰不可夫越之彊不下魯而吳之疆不過齊君以伐越而還即齊也亦私魯矣且夫伐小越而畏疆齊者不勇見小利而忘大害者不智兩者臣無為君取焉且臣聞之仁人不困厄以廣其德智者不棄時以舉其功王者不絶世以立其義今君存越勿毁親四鄰以仁救㬥困齊威申晉邦以武救魯毋絶周室明諸侯以義如此則臣之所見溢乎負海必率九夷而朝即王業成矣且大吳畏小越如此臣請東見越王使之出鋭師以從下吏是君實空越而名從諸侯以伐也吳王大悦乃行子貢子貢東見越王越王聞之除道郊迎至縣身御子貢至舎而問曰此乃僻陋之􅀖蠻夷之民也大夫何索居然而辱乃至於此子貢曰弔君故來越王句踐稽首再拜曰孤聞之禍與福為鄰今大夫弔孤孤之福也敢遂聞其説子貢曰臣今見吳王告以救魯而伐齊其心申其志畏越曰嘗與越戰棲於㑹稽山上夫越君賢主也苦身勞力以夜接日内飾其政外事諸侯必將有報我之心子待我伐越而聽子且夫無報人之心而使人疑之者拙也有報人之心而使人知之者殆也事未發而聞者危也三者舉事之大忌越王句踐稽首再拜曰昔者孤不幸少失先人内不自量與吳人戰軍敗身辱遺先人耻遯逃出走比棲會稽山下守溟海唯魚鼈是見今大夫不辱而身見之又出玉聲以教孤孤頼先人之賜敢不奉教乎子貢曰臣聞之明王任人不失其能直士舉賢不}
