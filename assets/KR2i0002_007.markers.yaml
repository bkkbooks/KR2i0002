  - {type: variant, offset: 11, length: 1201, content: 吳王闔廬始得子胥之時甘心以賢之以為上客曰聖人前知乎千歲後覩萬世深問其國世何昧昧得無衰極子其精焉寡人垂意聽子之言子胥唯唯不對王曰子其明之子胥曰對而不明恐獲其咎王曰願一言之以試直士夫仁者樂知者好誠秉禮者探幽索隱明告寡人子胥曰難乎言哉邦其不長王其圖之存無忘傾安無忘亡臣始入邦伏見衰亡之證當霸吳厄會之際後王復空王曰何以言之子胥曰後必將失道王食禽肉坐而待死佞諂之臣將至不久安危之兆各有明紀虹蜺牽牛其異女黃氣在上青黑於下太歲八會壬子數九王相之氣自十一倍死由無氣如法而止太子無氣其異三世日月光明歷南斗吳越為鄰同俗并土西州大江東絕大海兩邦同城相亞門戶憂在於斯必將為咎越有神山難與為鄰願王定之毋洩臣言吳使子胥救蔡誅彊楚笞平王墓久而不去意欲報楚楚乃購之千金眾人莫能止之有野人謂子胥曰止吾是於斧掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還故無往不復何德不報漁者一言千金歸焉因是還去范蠡興師戰於就李闔廬見中於飛矢子胥還師中媿於吳被秦號年至夫差復霸諸侯興師伐越任用子胥雖夫差驕奢釋越之圍子胥諫而誅宰嚭諛心卒以亡吳夫差窮困請為匹夫范蠡不許滅於五湖子胥策於吳可謂明乎昔者吳王夫差興師伐越敗兵就李大風發狂日夜不止車敗馬失騎士墮死大船陵居小船沒水吳王曰寡人晝臥夢見井嬴溢大與越爭彗越將掃我軍其凶乎孰與師還此時越軍大號夫差恐越軍入驚駭子胥曰王其勉之哉越師敗矣臣聞井者人所飲溢者食有餘越在南火吳在北水水制火王何疑乎風北來助吳也昔者武王伐紂時彗星出而興周武王問太公曰臣聞以彗鬭倒之則勝胥聞災異或吉或凶物有相勝此乃其證願大王急行是越將凶吳將昌也子胥至直不同邪曲捐軀切諫虧命為邦愛君如軀憂邦如家是非不諱直言不休庶幾正君反以見踈讒人間之身且以誅范蠡聞之以為不通知數不用知懼不去豈謂智與胥聞歎曰吾背楚荊挾弓以去義不止窮吾前獲功後遇戮非吾智衰先遇闔廬後遭夫差也胥聞事君猶事父也愛同也嚴等也太古以來未嘗見人君虧恩為臣報仇也臣獲大譽功名顯著胥知分數終於不去先君之功且猶難忘吾願腐髮弊齒何去之有蠡見其外不知吾內今雖屈冤猶止死焉子貢曰胥執忠信死貴於生蠡審凶吉去而有名種留封侯不知令終二賢比德種獨不榮范蠡智能同均於是之謂也伍子胥父子奢為楚王大臣為世子聘秦女夫有色王私悅之欲自御焉奢盡忠入諫守朝不休欲匡正之而王拒之諫策而問之以奢乃害於君絕世之臣聽讒邪之辭係而囚之待二子而死尚孝而入子胥勇而難欺累世忠信不遇其時奢諫於楚胥死於吳詩云讒人罔極交亂四國是之謂也太宰者官號嚭者名也伯州之孫伯州為楚臣以過誅嚭以困奔於吳是時吳王闔廬伐楚悉召楚仇而近之嚭為人覽聞辯見目達耳通諸事無所不知因其時自納於吳言伐楚之利闔廬用之伐楚令子胥孫武與嚭將師入郢有大功還吳王以嚭為太宰位高權盛專邦之枋未久闔廬卒嚭見夫差內無柱石之堅外無斷割之勢諛心自納操獨斷之利夫差終以從焉而忠臣籥口不得一言嚭知往而不知來夫差至死悔不早誅傳曰見清知濁見曲知直人君選士各象其德夫差淺短以是與嚭專權伍胥為之惑是之謂也, SBCK: ''}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 范蠡其始居楚曰范伯自謂衰賤未嘗世禄故自菲薄飲食則甘天下之無味居則安天下之賤位復被髪佯狂不與於世謂大夫種曰三王則三皇之苖裔也五伯乃五帝之末世也天運歴紀千嵗一至黄帝之元執辰破已霸王之氣見於地户子胥以是挾弓干}
