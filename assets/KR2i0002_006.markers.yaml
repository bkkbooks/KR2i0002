  - {type: variant, offset: 2054, length: 0, content: '', SBCK: 其始居楚也生於宛槖或伍户之虛其為結僮之時一癡一醒時人盡以為狂然獨有聖賢之明人莫可與語以内視若盲反聽若聾大夫種入其縣知有賢者未覩所在求邑中不得其邑人以為狂夫多賢士衆賤有君子汎求之焉得蠡而悦乃從官屬問治之術蠡修衣冠有頃而出進退揖讓君子之容終日而語疾陳霸王之道志合意同胡越相從俱見霸兆出於東南捐其官位相要而徃臣小有所虧大有所成捐止于吳或任子胥二人以為胥在無所聞其辭種}
