  - {type: variant, offset: 12, length: 3, content: 句踐與, krp: 定之毋洩臣言呉使子胥救蔡誅疆楚笞平王墓久而不去意欲報楚楚乃購之千金衆人莫能止之有野人謂子胥曰止吾是干斧掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還故無徃不復何德不報漁者一言千金歸焉因是還去范蠡興師戰於就李闔廬見中於飛矢子胥還師中媿於吳被秦號年至大差復霸諸侯興師伐越任用子胥雖夫差驕奢釋越之圍子胥諫而誅宰嚭諛心卒以亡吳夫差窮困請為匹夫范蠡不許滅於五湖子胥䇿於吳可謂明乎昔者}
  - {type: variant, offset: 19, length: 1502, content: 戰大敗保棲於會稽山上乃使大夫種求行成於吳吳許之越王去會稽入官於吳三年吳王歸之大夫種始謀曰昔者吳夫差不顧義而媿吾王種觀夫吳甚富而財有餘其刑繁法逆民習於戰守莫不知也其大臣好相傷莫能信也其德衰而民好負善且夫吳王又喜安佚而不聽諫細誣而寡智信讒諛而遠士數傷人而亟亡之少明而不信人希須臾之名而不顧後患君王盍少求卜焉越王曰善卜之道何若大夫種對曰君王卑身重禮以素忠為信以請糴於吳天若棄之吳必許諾於是乃卑身重禮以素忠為信以請於吳將與申胥進諫曰不可夫王與越也接地鄰境道徑通達仇讎敵戰之邦三江環之其民無所移非吳有越越必有吳且夫君王兼利而弗取輸之粟與財財去而凶來凶來而民怨其上是養寇而貧邦家也與之不為德不若止且越王有智臣范蠡勇而善謀將修士卒飾戰具以伺吾間也胥聞之夫越王之謀非有忠素請糴也將以此試我以此卜要君王以求益親安君王之志我君王不知省也而救之是越之福也吳王曰我卑服越有其社稷句踐既服為臣為我駕舍卻行馬前諸侯莫不聞知今以越之饑吾與之食我知句踐必不敢申胥曰越無罪吾君王急之不遂絕其命又聽其言此天之所反也忠諫者逆而諛諫者反親今狐雉之相戲也狐體卑而雉懼之夫獸虫尚以詐相就而況於人乎吳王曰越王句踐有急而寡人與之其德章而未靡句踐其敢與諸侯反我乎申胥曰臣聞聖人有急則不羞為人臣僕而志氣見人今越王為吾蒲伏約辭服為臣下其執禮過吾君不知省也而已故勝威之臣聞狼子有野心仇讎之人不可親也夫鼠忘壁壁不忘鼠今越人不忘吳矣胥聞之拂勝則社稷固諛勝則社稷危胥先王之老臣不忠不信則不得為先王之老臣君王胡不覽觀夫武王之伐紂也今不出數年鹿豕遊於姑胥之臺矣太宰嚭從旁對曰武王非紂臣耶率諸侯以殺其君雖勝可謂義乎申胥曰武王則已成名矣太宰嚭曰親僇主成名弗忍行申胥曰美惡相入或甚美以亡或甚惡以昌故在前世矣嚭何惑吾君王也太宰嚭曰申胥為人臣也辨其君何必翽翽乎申胥曰太宰嚭面諛以求親乘吾君王幣帛以求威諸侯以成富焉今我以忠辨吾君王譬浴嬰兒雖啼勿聽彼將有厚利嚭無乃諛吾君王之欲而不顧後患乎吳王曰嚭止子無乃向寡人之欲乎此非忠臣之道太宰嚭曰臣聞春日將至百草從時君王動大事群臣竭力以佐謀因遜遯之舍使人微告申胥於吳王曰申胥進諫外貌類親中情甚踈類有外心君王常親覩其言也胥則無父子之親君臣之施矣吳王曰夫申胥先王之忠臣天下之健士也胥殆不然乎哉子毋以事相差毋以私相傷以動寡人此非子所能行也太宰嚭對曰臣聞父子之親張尹別居贈臣妾馬牛其志加親若不與一錢其志斯䟽父子之親猶然而況於士乎且有知不竭是不忠竭而顧難是不勇下而令上是無法吳王乃聽太宰嚭之言果與粟申胥遜遯之舍歎曰於乎嗟君王不圖社稷之危而聽一日之說弗對以斥傷大臣而王用之不聽輔弼之臣而信讒諛容身之徒是命短矣以為不信胥願廓目于邦門以觀吳邦之大敗也越人之入我王親所禽哉太宰嚭之交逢同謂太宰嚭曰子難人申胥請為卜焉因往見申胥胥方與被離坐申胥謂逢同曰子事太宰嚭又不圖邦權而惑吾君王君王之不省也而聽眾彘之言君王忘邦嚭之罪也亡日不久也逢同出造太宰嚭曰今日為子卜於申胥胥誹謗其君不用胥則無後而君王覺而遇矣謂太宰嚭曰子勉事後矣吳王之情在子乎太宰嚭曰智之所生不在貴賤長少此相與之道逢同出見吳王慚然有憂色逢同垂泣不對吳王曰夫嚭我之忠臣子為寡人遊目長耳將誰怨乎逢同對曰臣有患也臣言而君行之則無後憂若君王弗行臣言而死矣王曰子言寡人聽之逢同曰今日往見申胥申胥與被離坐其謀慚然類欲有害我君王今申胥進諫類忠然中情至惡內其身而心野狼君王親之不親逐之不逐親之乎彼聖人也將更然有怨心不已逐之乎彼賢人也知能害我君王殺之為乎可殺之亦必有以也吳王曰今圖申胥將何以逢同對曰君王興兵伐齊申胥必諫曰不可王無聽而伐齊必大克乃可圖之於是吳王欲伐齊召申胥對曰臣老矣耳無聞目無見不可與謀吳王召太宰嚭而謀嚭曰善哉王, SBCK: ''}
