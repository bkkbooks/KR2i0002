  - {type: variant, offset: 2018, length: 0, content: '', krp: 欲自御焉奢盡忠入諫守朝不休欲匡正之而王拒之諫策而問之以奢乃害於君絶世之臣聽讒邪之辭係而囚之待二子而死尚孝而入子胥勇而難欺累世忠信不遇其時奢諫於楚胥死於吳詩云讒人㒺極交亂四國是之謂也太宰者官號嚭者名也伯州之孫伯州為楚臣以過誅嚭以困奔於吳是時吳王闔廬伐楚悉召楚仇而近之嚭為人覧聞辯見目達耳通諸事無所不知因其時自納於吳言伐楚之利闔廬用之伐楚令子胥孫武與嚭將師入郢有大功還吳王以嚭為太宰位髙權盛專邦之枋末入闔廬卒嚭見夫差内無柱石之堅外無斷割之勢諛心自納操獨}
