  - {type: variant, offset: 12, length: 3, content: 句踐與, SBCK: 定之毋洩臣言呉使子胥救蔡誅疆楚笞平王墓久而不去意欲報楚楚乃購之千金衆人莫能止之有野人謂子胥曰止吾是干斧掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還故無徃不復何德不報漁者一言千金歸焉因是還去范蠡興師戰於就李闔廬見中於飛矢子胥還師中媿於吳被秦號年至大差復霸諸侯興師伐越任用子胥雖夫差驕奢釋越之圍子胥諫而誅宰嚭諛心卒以亡吳夫差窮困請為匹夫范蠡不許滅於五湖子胥䇿於吳可謂明乎昔者}
  - {type: page-break, offset: 12, content: '', id: KR2i0002_SBCK_006-2b}
  - {type: variant, offset: 12, length: 3, content: 句踐與, WYG: 定之毋洩臣言呉使子胥救蔡誅彊楚笞平王墓久而不去意欲報楚楚乃購之千金衆人莫能止之有野人謂子胥曰止吾是于斧掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還故無往不復何德不報漁者一言千金歸焉因是還去范蠡興師戰於就李闔廬見中於飛矢子胥還師中媿於吳被秦號年至夫差復霸諸侯興師伐越任用子胥雖夫差驕奢釋越之圍子胥諫而誅宰嚭諛心卒以亡吳夫差窮困請為匹夫范蠡不許滅於五湖子胥䇿於吳可謂明乎昔者}
