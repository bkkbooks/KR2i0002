  - {type: variant, offset: 10, length: 0, content: '', SBCK: 吳王闔廬始得子胥之時甘心以賢之以為上客曰聖人前知乎千嵗後覩萬世深問其國世何昧昧得無衰極子其精焉寡人垂意聽子之言子胥唯唯不對王曰子其明之子胥曰對而不明恐獲其咎王曰願一言之以試直士夫仁者樂知者好誠秉禮者探幽索隱明告寡人子胥曰難乎言哉邦其不長王其圖之存無忘傾安無忘亡臣始入邦伏見衰亡之證當霸吳厄㑹之際後王復空王曰何以言之子胥曰後必將失道王食禽肉坐而待死佞諂之臣將至不久安危之兆各有明紀虹蜺牽牛其異女黄氣在上青黑于下大嵗八會壬子數九王相之氣自十一倍死由無氣如法而止太子無氣其異三世日月光明歴南斗吳}
