  - {type: variant, offset: 2010, length: 0, content: '', SBCK: 將凶呉將昌也子胥至直不同邪曲捐軀切諫虧命為􅀖愛君如軀憂邦如家是非不諱直言不休庶㡬正君反以見踈讒人間之身且以誅范蠡聞之以為不通知數不用知懼不去豈謂智與胥聞歎曰吾背楚荆挾弓以去義不止窮吾前獲功後遇戮非吾智衰先遇闔廬後遭夫差也胥聞事君猶事父也愛同也嚴等也太古以來未嘗見人君虧恩為臣報仇也臣獲大譽功名顯著胥知分數終於不去先君之功且猶}
