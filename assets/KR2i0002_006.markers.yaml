  - {type: variant, offset: 1538, length: 438, content: 王復召申胥而謀申胥曰臣老矣不能與謀吳王請申胥謀者三對曰臣聞愚夫之言聖主擇焉胥聞越王句踐罷吳之年宮有五竈食不重味省妻妾不別所愛妻操斗身操概自量而食適饑不費是人不死必為國害越王句踐食不殺而饜衣服純素不袀不玄帶劍以布是人不死必為大故越王句踐寢不安席食不求飽而善貴有道是人不死必為邦寶越王句踐衣弊而不衣新行慶賞不刑戮是人不死必成其名越在我猶心腹有積聚不發則無傷動作者有死亡欲釋齊以越為憂吳王不聽果興師伐齊大克還以申胥為不忠賜劍殺申胥髡被離申胥且死曰昔者桀殺關龍逢紂殺王子比干今吳殺臣參桀紂而顯吳邦之亡也王孫駱聞之旦即不朝王召駱而問之子何非寡人而旦不朝乎王孫駱對曰臣不敢有非臣恐耳吳王曰子何恐以吾殺胥為重乎王孫駱對曰君王氣高胥之位下而殺之不與群臣謀之臣是以恐矣王曰我非聽子殺胥胥乃圖謀寡人王孫駱曰臣聞君人者必有敢言之臣在上位者必有敢言之交如是即慮日益進而智益生矣胥先王之老臣不忠不信不得為先王臣矣王意欲殺太宰嚭王孫駱對曰不可王若殺之是殺二胥矣吳王近駱如故太宰嚭又曰圖越雖以我邦為事王無憂, SBCK: ''}
