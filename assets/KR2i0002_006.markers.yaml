  - {type: variant, offset: 2011, length: 2, content: 成矣, SBCK: 忘吾願腐髮􅁦齒何去之有蠡見其外不知吾内今雖屈寃猶止死焉子貢曰胥執忠信死貴於生蠡審凶吉去而有名種留封侯不知令終二賢比德種獨不榮范蠡智能同均於是之謂也伍子胥父子奢為楚}
