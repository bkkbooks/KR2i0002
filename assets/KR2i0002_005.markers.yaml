  - {type: variant, offset: 379, length: 1, content: 問, SBCK: 糴於吳天若棄之吳必許諾於是乃卑身重禮以素忠為信以請於吳將與申胥進諫曰不可夫王與越也接地鄰境道徑通達仇讎敵戰之邦三江環之}
  - {type: page-break, offset: 379, content: '', id: KR2i0002_SBCK_005-2a}
  - {type: variant, offset: 379, length: 1, content: 問, WYG: 糴於吳天若棄之吳必許諾於是乃卑身重禮以素忠為信以請於吳將與申胥進諫曰不可夫王與越也接地鄰境道徑通達仇讎敵戰之邦三江環之}
  - {type: variant, offset: 379, length: 1, content: 問, krp: 糴於吳天若棄之吳必許諾於是乃卑身重禮以素忠為信以請於吳將與申胥進諫曰不可夫王與越也接地鄰境道徑通達仇讎敵戰之邦三江環之}
  - {type: variant, offset: 381, length: 1, content: 方, SBCK: 民無所移非吳有越越必有吳且夫君王兼利而弗取輸之粟與財財去而凶來凶來而民怨其上是養冦而貧邦家也與之不為德不若止且越王有智臣曰范蠡勇而善謀將修士卒飾戰具間也胥聞之夫越王之謀非有忠素請糴也將以此試我以此卜要君王以求益親安君王之志我君王不知省也而救之是越之福也吳王曰我卑服越有其社稷句踐既服為臣為我駕舎却行馬前諸侯莫不聞知今以越之飢}
  - {type: page-break, offset: 381, content: '', id: KR2i0002_SBCK_005-2b}
  - {type: variant, offset: 381, length: 1, content: 方, WYG: 民無所移非吳有越越必有吳且夫君王兼利而弗取輸之粟與財財去而凶來凶來而民怨其上是養冦而貧邦家也與之不為德不若止且越王有智臣曰范蠡勇而善謀將修士卒飾戰具以伺}
  - {type: page-break, offset: 381, content: '', id: KR2i0002_WYG_005-2a, image: WYG0463/WYG0463-0093a.png}
  - {type: variant, offset: 381, length: 1, content: 方, krp: 民無所移非吳有越越必有吳且夫君王兼利而弗取輸之粟與財財去而凶來凶來而民怨其上是養冦而貧邦家也與之不為德不若止且越王有智臣曰范蠡勇而善謀將修士卒飾戰具間也胥聞之夫越王之謀非有忠素請糴也將以此試我以此卜要君王以求益親安君王之志我君王不知省也而救之是越之福也吳王曰我卑服越有其社稷句踐既服為臣為我駕舎却行馬前諸侯莫不聞知今以越之飢}
  - {type: punctuation, offset: 382, content: 。, id: KR2i0002_CHANT_005-bkkpn87}
  - {type: 'tls:seg', offset: 382, content: '', id: KR2i0002_CHANT_005-1a.81}
  - {type: variant, offset: 383, length: 0, content: '', SBCK: 與之食我知句踐必不敢申胥曰越無罪吾君王急之不遂絶其命又聽其言此天之所反也忠諫者逆而諛諫者反親今狐雉之戲也狐體卑而雉懼之夫獸虫尚以詐相就而况於人乎吳王曰越王句踐有急而寡人與之其德章而未靡句踐其敢與諸侯反我乎申胥曰臣}
  - {type: page-break, offset: 383, content: '', id: KR2i0002_SBCK_005-3a}
  - {type: variant, offset: 383, length: 0, content: '', WYG: 間也胥}
  - {type: variant, offset: 383, length: 0, content: '', krp: 與之食我知句踐必不敢申胥曰越無罪吾君王急之不遂絶其命又聽其言此天之所反也忠諫者逆而諛諫者反親今狐雉之戲也狐體卑而雉懼之夫獸虫尚以詐相就而况於人乎吳王曰越王句踐有急而寡人與之其德章而未靡句踐其敢與諸侯反我乎申胥曰臣}
  - {type: variant, offset: 384, length: 0, content: '', SBCK: 聖人有急則不羞為人臣僕而志氣見人今越王為吾蒲伏約納一作辭服為臣下其執禮過吾君不知省也而已故勝威之臣聞狼子野心仇讐之人不可親也夫䑕忘壁壁不忘鼠今越人不忘吳矣胥聞之拂弼音勝則社稷固諛勝則社稷危胥}
  - {type: variant, offset: 384, length: 0, content: '', WYG: 之夫越王之謀非有忠素請糴也將以此試我以此卜要君王以求益親安君王之志我君王不知省也而救之是越之福也吳王曰我卑服越有其社稷句踐既服為臣為我駕舎却行馬前諸侯莫不聞知今以越之饑吾與之食我知句踐必不敢申胥曰越無罪吾君王急之不遂絶其命又聽其言此天之所反也忠諫者逆而諛諫者反親今狐雉之戲也狐體卑而雉懼之夫獸蟲尚以詐相就而况於人乎吳王曰越王句踐有急而寡人與之其德章而未靡句踐其敢與諸侯反我乎申胥曰臣聞聖人有急則不羞為人臣僕而志氣見人今越王為吾蒲伏約一作納辭服為臣下其執禮過吾君不知省也而已故勝威之臣聞狼子野心仇讐之人不可親也夫䑕忘壁壁不忘鼠今越人不忘吳矣胥聞之拂音弼勝則社稷固諛勝則社稷危胥}
  - {type: page-break, offset: 384, content: '', id: KR2i0002_WYG_005-2b, image: WYG0463/WYG0463-0093b.png}
  - {type: page-break, offset: 384, content: '', id: KR2i0002_WYG_005-3a, image: WYG0463/WYG0463-0093c.png}
  - {type: variant, offset: 384, length: 0, content: '', krp: 聖人有急則不羞為人臣僕而志氣見人今越王為吾蒲伏約納一作辭服為臣下其執禮過吾君不知省也而已故勝威之臣聞狼子野心仇讐之人不可親也夫䑕忘壁壁不忘鼠今越人不忘吳矣胥聞之拂弼音勝則社稷固諛勝則社稷危胥}
  - {type: variant, offset: 385, length: 2, content: 生明, SBCK: 王之老臣不忠不信則不得為先王之老臣君王胡不覽觀夫武王之伐紂也今不出數年鹿豕遊}
  - {type: page-break, offset: 385, content: '', id: KR2i0002_SBCK_005-3b}
