  - {type: variant, offset: 530, length: 0, content: '', WYG: 句踐食不殺而饜衣服純素不袀不𤣥帶劒以布是人不死必為大故越王句踐寢不安席食不求飽而善貴有道是人不死必為邦寶越王句踐衣弊而不衣新行慶賞不刑戮是人不死必成}
  - {type: variant, offset: 530, length: 0, content: '', krp: 召太宰嚭而謀嚭曰善哉王興師伐齊也越在我猶疥癬是無能為也吳王復召申胥而謀申胥曰臣老矣不可與謀吳王請申胥謀者三對曰臣聞愚夫之言聖主擇焉胥聞越王句踐罷吳之年宫有五竈食不重味省妻妾不别所愛妻操斗身操概自量而食適飢不費是人不死必為國害越王句踐食不殺而饜衣服純素不袀不玄帶劒以布是人不死必為大故越王句踐寢不安席食不求飽而善貴有道是人不死必為邦寶越王句踐衣弊而不衣新行慶賞不刑戮是人不死必成}
