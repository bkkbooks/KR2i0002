  - {type: variant, offset: 747, length: 211, content: 陰三歲處金則穰三歲處水則毀三歲處木則康三歲處火則旱故散有時積糴有時領則決萬物不過三歲而發矣以智論之以決斷之以道佐之斷長續短一歲再倍其次一倍其次而反水則資車旱則資舟物之理也天下六歲一穰六歲一康凡十二歲一饑是以民相離也故聖人早知天地之反為之預備故湯之時比七年旱而民不饑禹之時比九年水而民不流其主能通習源流以任賢使能則轉轂乎千里外貨可來也不習則百里之內不可致也人主所求其價十倍其所擇者則無價矣夫人主利源流非必身為之也視民所不足及, SBCK: 宰嚭遂亡吳王率}
