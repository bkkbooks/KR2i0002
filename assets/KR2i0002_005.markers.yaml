  - {type: variant, offset: 405, length: 3, content: 明以告, SBCK: 難人申胥請為卜焉因徃見申胥胥方與被離坐申胥謂逢同曰子事太宰嚭又不圖邦權而惑吾君王君王之不省也而聽衆彘之言君王忘邦嚭之罪也亡日不久也逢同出造太宰嚭曰今日為子卜於申胥胥誹謗其君不用胥則無後而君王覺而遇矣謂太宰嚭曰子勉事作一多後矣吳王之情在子乎太宰嚭曰智之所生不在貴賤長少此相與之道逢同出見呉王慚然有憂色逄同垂泣不對吳王曰夫嚭}
