  - {type: variant, offset: 395, length: 0, content: '', SBCK: 而不顧後患乎吳王曰嚭止子無乃向寡人之欲乎此非忠臣之道太宰嚭曰臣}
  - {type: variant, offset: 395, length: 0, content: '', WYG: 而不顧後患乎吳王曰嚭止子無乃向寡人之欲乎此非忠臣之道太宰嚭曰臣}
  - {type: variant, offset: 395, length: 0, content: '', krp: 而不顧後患乎吳王曰嚭止子無乃向寡人之欲乎此非忠臣之道太宰嚭曰臣}
  - {type: variant, offset: 396, length: 0, content: '', SBCK: 春日將至百草從時君王動大事羣臣竭力以佐謀因遜遯之舎使人㣲告申胥於吳王曰申胥進諫外貎􅀋親中情甚踈􅀋有外心君王常親覩}
  - {type: variant, offset: 396, length: 0, content: '', WYG: 春日將至百草從時君王動大事羣臣竭力以佐謀因遜遯之舎使人㣲告申胥於吳王曰申胥進諫外貎𩔖親中情甚疎𩔖有外心君王常親覩}
  - {type: variant, offset: 396, length: 0, content: '', krp: 春日將至百草從時君王動大事羣臣竭力以佐謀因遜遯之舎使人㣲告申胥於吳王曰申胥進諫外貎類親中情甚踈類有外心君王常親覩}
  - {type: variant, offset: 397, length: 3, content: 治術可, SBCK: 言也胥則無父子之親君臣之施矣呉王曰夫申胥先王之忠臣天下之健士也胥殆不然乎哉子毋以事相差母以私相傷以動寡人此非子所能行也太宰嚭對曰臣聞父子之親張尹别居贈臣妾馬牛其志加親若不與一錢其志斯疏父子之親猶然而况於士乎且有知不竭是不忠竭而顧難是不勇下而令上是無法吳王乃聽太宰嚭之言果與粟申胥遜遯之舎歎曰於乎嗟君王不圖社稷之危而聽一日之説弗對以斥傷大臣而王用之不聽輔弼之臣而信讒諛容身之徒是命短矣}
