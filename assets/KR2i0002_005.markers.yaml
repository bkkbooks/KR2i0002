  - {type: variant, offset: 385, length: 2, content: 生明, krp: 王之老臣不忠不信則不得為先王之老臣君王胡不覽觀夫武王之伐紂也今不出數年鹿豕遊}
  - {type: variant, offset: 388, length: 6, content: 治歲萬物盡長, SBCK: 姑胥之臺矣太宰嚭從旁對曰武王非紂臣耶率諸侯以殺其君雖勝可謂義乎申胥曰武王則已成名矣太宰嚭曰親僇主成名弗忍行申胥曰美惡相入或甚美以亡或甚惡以昌故在前世矣嚭何惑吾君王也太宰嚭曰申胥為人臣也辨其君何必􅔘􅔘乎申胥曰太宰嚭面諛以求親乗吾君王幣帛以求威諸侯以成富焉今我以忠辨吾君王譬浴嬰兒雖啼勿聽彼將有厚利嚭無乃諛吾君王之}
