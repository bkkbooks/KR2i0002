  - {type: variant, offset: 996, length: 172, content: 衰矣群臣無恭之禮淫佚之行務有於道術不習源流又不任賢使能諫者則誅則邦貧兵弱刑繁則群臣多空恭之理淫佚之行矣夫諛者反有德忠者反有刑去刑就德人之情也邦貧兵弱致亂雖有聖臣亦不諫也務在諛主而已矣今夫萬民有明父母亦如邦有明主父母利源流明其法術以任賢子徼成其事而已則家富而不衰矣不能利源流又不任賢子賢子有諫者憎之如此者不習於道術也愈信其意而行其言後雖有敗不自過, SBCK: 受}
