  - {type: variant, offset: 1523, length: 399, content: 穀以應陽之至也陽且盡之歲亟發糴以收田宅牛馬積歛貨財聚棺木以應陰之至也此皆十倍者也其次五倍天有時而散是故聖人反其刑順其衡收聚而不散越王曰善今歲比熟尚有貧乞者何也計倪對曰是故不等猶同母之人異父之子動作不同術貧富故不等如此者積負於人不能救其前後志意侵下作務日給非有道術又無上賜貧乞故長久越王曰善大夫佚同若成嘗與孤議於會稽石室孤非其言也今大夫言獨與孤比請遂受教焉計倪曰糴石二十則傷農九十則病末農傷則草木不辟末病則貨不出故糴高不過八十下不過三十農末俱利矣故古之治邦者本之貨物官市開而至越王曰善計倪乃傳其教而圖之曰審金木水火別陰陽之明用此不患無功越王曰善從今以來傳之後世以為教乃著其法治牧江南七年而禽吳也甲貨之戶曰粢為上物賈七十乙貨之戶曰黍為中物石六十丙貨之戶曰赤豆為下物石五十丁貨之戶曰稻粟令為上種石四十戊貨之戶曰麥為中物石三十己貨之戶曰大豆為下物石二十庚貨之戶曰穬比疏食故無賈辛貨之戶曰菓比疏食無賈壬癸無貨, SBCK: ''}
