  - {type: variant, offset: 1317, length: 143, content: 審也物有妖祥乎計倪對曰有陰陽萬物各有紀綱日月星辰刑德變為吉凶金木水火土更勝月朔更建莫主其常順之有德逆之有殃是故聖人能明其刑而處其鄉從其德而避其衡凡舉百事必順天地四時參以陰陽用之不審舉事有殃人生不如臥之頃也欲變天地之常數發無道故貧而命不長是聖人并苞而陰行之以感愚夫眾人容容盡欲富貴莫知其鄉, SBCK: 妻子}
