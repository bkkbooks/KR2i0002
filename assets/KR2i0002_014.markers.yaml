  - {type: variant, offset: 371, length: 3, content: 敢當使, SBCK: 㓕服以忠告句踐非之見乎顔色范蠡因心知意策問其事卜省其辭吉耶凶耶兆言其災夫子見利與害去于五湖葢謂知其道貴微而賤獲易曰知㡬其神乎道以不害為左傳曰知始無終厥道必窮此之謂也子胥賜劒將自殺歎曰嗟乎衆曲矯直一人固不能獨立吾挾弓矢以逸鄭楚之間自以為可復吾見凌之仇乃先王之功想得報焉自致於此吾先得榮後僇者非智衰也先遇明後遭險君之易移也巳矣坐不遇時復何言哉此吾命也亡將安之莫如早死從吾先王于地}
