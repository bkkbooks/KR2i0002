  - {type: variant, offset: 355, length: 1, content: 竊, SBCK: 即得平吳春祭三江秋祭五湖因以其時為之立嗣垂之來世傳之萬載鄰邦樂德以來取足范蠡内視若盲反聽若聾度天闗涉天機後衽天人前帶神光當是時言之者闕其去甚微甚宻王巳失之矣然終難復見得於是度兵徐州致貢周室元王以之中興號為州伯以為專句踐之功非王室之力是時越行伯道沛歸於宋浮陵以付楚臨期開陽復之於魯中邦侵伐因斯衰止以其誠行於内威發於外越專其功故曰越絶是也故傳曰桓公迫於外子能以覺悟句踐報於㑹稽能因以伯堯舜雖聖不能任狼致治管仲能知人桓公能任賢蠡善慮患句踐能行焉臣主若斯其不伯得乎易曰君臣同心其利斷金此之謂也吳越之事煩而文不喻聖人畧焉賢者垂意深省厥辭觀斯智愚夫差狂惑賊殺子胥句踐至賢種􅂚為誅范蠡恐懼逃于五湖葢}
