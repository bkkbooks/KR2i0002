  - {type: variant, offset: 64, length: 133, content: 君三曰貴糴粟槀以空其邦四曰遺之好美以為勞其志五曰遺之巧匠使起宮室高臺以盡其財疲其力六曰遺其諛臣使之易伐七曰彊其諫臣使之自殺八曰邦家富而備利器九曰堅厲甲兵以承其弊故曰九者勿患戒口勿傳以取天下不難而況於吳乎越王曰善於是作為策楯嬰以白璧鏤以黃金類龍蛇而行者乃使大夫種獻之於, SBCK: 所惡且}
