  - {type: variant, offset: 9, length: 0, content: '', SBCK: 越絕外傳春申君第十七昔者楚考烈王相春申君吏李園園女弟女環謂園曰我聞王老無嗣可見我於春申君我欲假於春申君我得見於春申君徑得見於王矣園曰春申君貴人也千里之佐吾何託敢言女環曰卽不見我汝求謁於春申君才人告逺道客請歸待之彼必問汝汝家何等逺道客者因對曰園有女弟魯相聞之使使者來求之園才人使告園者彼必有問汝女弟何能對曰能鼓音讀書通一經故彼必見我園曰諾明日辭春申君才人有遠道客請歸待之春申君果問汝家何等遠道客對曰園有女弟魯相聞之使使求之春申君曰何能對曰能鼓音讀書通一經春申君曰可得見乎明日使待於離亭園曰諾既歸告女環曰吾辭於春申君許我明日夕待於離亭女環曰園宜先供待之春申君到園馳人呼女環到黄昏女環至大縱酒女環鼓琴曲未終春申君大恱留宿明日女環謂春申君曰妾聞王老無嗣屬􅀖於君君外淫不顧政事使王聞之君上負於王使妾兄下負於夫人為之奈何無泄此口君召而戒之春申君以告官屬莫有聞淫女也皆曰諾與女環通未終月女環謂春申君曰妾聞王老無嗣今懷君子一月矣可見妾於王幸産子男君卽王公也而何為佐乎君戒念之五日而道之邦中有好女中相可屬嗣者烈王曰諾卽召之烈王恱取之十月産子男十年烈王死幽王嗣立女環使園相春申君相之三年然後告園以吳封春申君使僃東􅁁園曰諾卽封春申君於吳幽王後懷王使張儀詐殺之懷王子頃襄王秦始皇帝使王翦㓕之越絕德序外􅀓記第十八}
