  - {type: variant, offset: 10, length: 1, content: 夫, SBCK: 故曰衆者傳目多者信德自此之時天下大服三皇以後以一治人至於三王爭心生兵革越作肉刑五胥因悉挾方氣歷天漢孔子感精知後有疆秦喪其世而漢興也賜權齊晉越入吳孔子推􅀋知後有蘇秦也權衡相動衡五相發道獲麟周盡證也故作春秋以繼周也此時天地㬥清日月一明弟子欣然相與太平孔子懷聖承􅁦無尺土所有一民所子睹麟乗涕傷民不得其所非}
