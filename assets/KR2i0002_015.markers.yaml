  - {type: variant, offset: 70, length: 2, content: 勝負, SBCK: 也智能生詐故次以吳人也善其務救蔡勇其伐荆其范蠡行為持危救傾也莫如循道順天富􅀖安民故次計倪富􅀖安民故於自守易以取故次請糴也一其愚故乖其政也問曰請粟者求其福禄必可獲故次以九術順天心終和親卽知其情策於廊廟以知疆弱時至伐必可克故次兵法兵凶器也動作不當天與其殃知此上事乃可用兵易}
