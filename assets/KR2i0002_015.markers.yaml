  - {type: variant, offset: 781, length: 0, content: '', WYG: 文繡聾者不可語以調聲瞽瞍不移商均不化湯繫夏臺文王拘於殷時人謂舜不孝堯不慈聖人不悦下愚而况乎子胥當困於楚劇於吳信不去耳何拘之有孔子貶之奈何}
  - {type: variant, offset: 782, length: 0, content: '', WYG: 報楚也稱子胥妻楚王母及乎夷狄貶之言吳人也問曰句踐何德也曰伯德賢君也傳曰危人自安君子弗為奪人自與伯夷不多行偽以勝滅人以伯其賢奈何曰是固伯道也祺道厭駮一善一惡當時無天子彊者為右使句踐無權滅邦久矣子胥信而得衆道范蠡善偽以勝當明王天下太平諸侯和親}
  - {type: page-break, offset: 782, content: '', id: KR2i0002_WYG_015-4a, image: WYG0463/WYG0463-0128a.png}
  - {type: variant, offset: 783, length: 0, content: '', WYG: 夷樂德欵塞貢珍屈膝請臣子胥何由乃困於楚范蠡不久乃為狂者句踐何當屬莝養馬遭逢變亂權以自存不亦賢乎行伯非賢晉文之能因}
  - {type: variant, offset: 784, length: 2, content: 制日, SBCK: 順宜隨而可之故空社易為福危民易為德}
