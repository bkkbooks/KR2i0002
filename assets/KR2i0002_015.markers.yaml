  - {type: variant, offset: 62, length: 1, content: 獨, SBCK: 沒而㣲言絶賜見春秋改文尚質譏二名興素王亦發憤記吳越章句其篇以喻後賢賜之説也魯安吳吳敗晉疆越霸世春秋二百餘年垂象後王賜傳吳越闕指於秦聖人發一隅辯士宣其辭聖文絶於彼辯士絶於此故題其文謂之越絶問曰越絶始於太伯終於陳恒何論語曰雖小道必有可觀者焉乃太伯審於始}
