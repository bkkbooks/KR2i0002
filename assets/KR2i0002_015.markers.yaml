  - {type: variant, offset: 824, length: 187, content: 故治今大越山陰南斗也吳故治西江都牛須女也齊故治臨菑今濟北平原北海郡菑川遼東城陽虛危也衛故治濮陽今廣陽韓郡營室壁也魯故治太山東溫周固水今魏東奎婁也梁故治今濟陰山陽濟北東郡畢也晉故治今代郡常山中山河間廣平郡觜也秦故治雍今內史也巴郡漢中隴西定襄太原安邑東井也周故治雒今河南郡柳七星張也楚故治郢今南郡南陽汝南淮陽六安九江廬江豫章長沙翼軫也趙故治邯鄲今遼東隴西北地上郡鴈門北郡清河參也, SBCK: 絶卷第十五終}
