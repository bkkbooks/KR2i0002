  - {type: variant, offset: 800, length: 1, content: 鄭, WYG: 不明甚矣問曰受恩死死之善也臣事君猶妻事夫何以去論語曰三日不朝孔子行行者去也傳曰孔子去魯燔爼無肉曾子去妻棃蒸不熟㣲子去比干死孔子并稱仁行雖有異其義同死與生敗與成其同奈何論語曰有殺身以成仁子胥重其信范蠡貴其義信從中出義從外出㣲子去者痛殷道也此干死者忠於紂也箕子亡者正其紀也皆忠信之至相為表裏耳問曰二子孰愈乎曰以為同耳然子胥無為能自免於無道之楚不亡舊功滅身為主合即能以霸不合可去則去可死則死范蠡遭世不明被髪佯狂無正不行無主不止色斯而舉不害於道億則屢中貨財殖聚作詐成伯不合乃去三遷避位名聞海内去越入齊老身西陶仲子由楚傷中而死二子行有始終子胥可謂兼人乎問曰子胥伐楚宫射其子不殺何也弗及耳楚世子奔逃雲夢之山子胥兵笞平王之墓昭王遣大夫申包胥入秦請救于斧漁子進諫子胥子胥適㑹秦救至因引兵還越見其榮於無道之楚興兵伐吳子胥以不得已迎之就李問曰笞墓何名乎子之復仇臣之討賊至誠感天矯枉過直乳狗哺虎不計禍福大道不誅誅首惡子胥笞墓不究也維子胥之述吳越也因事𩔖以曉後世著善為誠譏惡為誡句踐以來至乎更始之元五百餘年吳越相攻復見於今百嵗一賢猶為此肩記陳厥説略其有人以去為姓得衣乃成厥名有米覆之以庚禹來東征死葬其疆不直自斥託𩔖自明冩精露愚略以事𩔖俟告後人文屬辭定自于邦賢邦賢以口為姓承之以天楚相屈原與之同名明於古今德配顔淵時莫能與伏竄自容年加申酉懷道而終友臣不施猶夫子得麟覽覩厥意嗟歎其文於乎哀哉温}
