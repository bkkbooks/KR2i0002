  - {type: variant, offset: 776, length: 2, content: 始出, WYG: 乃勇子胥也臣不討賊子不復仇非臣子也故賢其寃於無道之楚困不死也善其以匹夫得一邦之衆並義復仇傾諸侯也非義不為非義不死也問曰子胥妻楚王母無罪而死於吳其行如是何義乎曰孔子固貶之矣賢其復仇惡其妻楚王母也然春秋之義量功掩過也賢之親親也子胥與吳何親乎曰子胥以困于闔廬闔廬勇之甚將為復仇名譽甚著詩云投我以桃報之以李夫差下愚不移終不可奈何言不用策不從昭然知吳將亡也受闔廬厚恩不忍去而自存欲著其諌之功也故先吳敗而殺也死人且不負而况面在乎昔者管仲生伯業興子胥死伯名成周公貴一槩不求備於一人及外篇}
