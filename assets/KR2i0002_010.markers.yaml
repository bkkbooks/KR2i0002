  - {type: variant, offset: 16, length: 0, content: '', WYG: 從旁接而起之曰何若子性之大也希見人主卒得急記流涕不止公孫聖仰天歎曰嗚呼悲哉此固非子胥所能知也今日壬午時加南方命屬蒼天不可逃亡伏地而泣者不能自惜但吳王諛心而言師道不明正言直諫身死}
  - {type: variant, offset: 17, length: 1, content: 餘, WYG: 功大君曰汝彊食自愛慎勿相忘伏地而書既成篇即與妻把臂而訣涕泣如雨上車不顧遂至姑胥之臺謁見吳王吳王勞曰越弟子公孫聖也寡人晝卧姑胥之臺夢入章明之宫入門見兩䥶炊而不蒸見兩黑犬嘷以北嘷以南見兩鏵倚吾宫堂見流水湯湯越吾宫牆見前園横索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人心所從公孫聖伏地有頃而起仰天歎曰悲哉夫好船者溺好騎者墮君子各以所好為禍諛讒申者師道不明正言切諫身死無功伏地而泣者非自惜因悲大王夫章者戰不勝走傽傽明者去昭昭就㝠㝠見兩䥶炊而不蒸者王且不得火食見兩黑犬嘷以北嘷以南者大王身死魂魄惑也見兩鏵倚吾宫堂者越人入呉邦伐宗廟掘社稷也見流水湯湯越吾宫牆者大王宫堂虛也前園横索生樹桐者桐不為器用但為俑當與人俱葬後房鍛者鼓小震者大息也王毋自行使臣下可矣太宰嚭王孫駱惶怖解冠幘肉袒而謝呉王忿聖言不祥}
