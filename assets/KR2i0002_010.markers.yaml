  - {type: variant, offset: 1293, length: 1295, content: 胥私喜越軍敗矣胥聞之狐之將殺噆脣吸齒今越句踐其已敗矣君王安意越易兼也使人入問之越師請降子胥不聽越棲於會稽之山吳退而圍之句踐喟然用種蠡計轉死為霸一人之身吉凶更至盛衰存亡在於用臣治道萬端要在得賢越棲於會稽日行成於吳吳引兵而去句踐將降西至浙江待詔入吳故有雞鳴墟其入辭曰亡臣孤句踐故將士眾入為臣虜民可得使地可得有吳王許之子胥大怒目若夜光聲若哮虎此越未戰而服天以賜吳其逆天乎臣唯君王急剬之吳王不聽遂許之浙江是也陽城里者范蠡城也西至水路水門一陸門二北陽里城大夫種城也取土西山以濟之徑百九十四步或為南安富陽里者外越賜義也處里門美以練塘田安城里高庫者句踐伐吳禽夫差以為勝兵築庫高閣之周二百三十步今安城里故禹宗廟在小城南門外大城內禹稷在廟西今南里獨山大冢者句踐自治以為冢徙瑯琊冢不成去縣九里麻林山一名多山句踐欲伐吳種麻以為弓絃使齊人守之越謂齊人多故曰麻林多以防吳以山下田封功臣去縣一十二里會稽山上城者句踐與吳戰大敗棲其中因以下為目魚池其利不租會稽山北城者子胥浮兵以守城是也若耶大冢者句踐所徙葬先君夫鐔冢也去縣二十五里葛山者句踐罷吳種葛使越女織治葛布獻於吳王夫差去縣七里姑中山者越銅官之山也越人謂之銅姑瀆長二百五十步去縣二十五里富中大塘者句踐治以為義田為肥饒故謂之富中去縣二十里二十二步犬山者句踐罷吳畜犬獵南山白鹿欲得獻吳神不可得故曰犬山其高為犬亭去縣二十五里白鹿山在犬山之南去縣二十九里雞山豕山者句踐以畜雞豕將伐吳以食士也雞山在錫山南去縣五十里豕山在民山西去縣六十三里洹江以來屬越疑豕山在餘暨界中練塘者句踐時采錫山為炭稱炭聚載從炭瀆至練塘各因事名之去縣五十里木客大冢者句踐父允常冢也初徙瑯琊使樓船卒二千八百人伐松柏以為桴故曰木客也去縣十五里一曰句踐伐善材文刻獻於吳故曰木客官瀆者句踐工官也去縣十四里苦竹城者句踐伐吳還封范蠡子也其僻居徑六十步因為民治田塘長千五百三十三步其冢名土山范蠡苦勤功篤故封其子於是去縣十八里北郭外路南溪北城者句踐築鼓鍾宮也去縣七里其邑為龔錢舟室者句踐船宮也去縣五十里民西大冢者句踐客秦伊善炤龜者冢也因名其冢為秦伊山射浦者句踐教習兵處也今射浦去縣五里射卒陳音死葬民西故曰陳音山種山者句踐所葬大夫種也樓船卒二千人鈞足羨葬之三蓬下種將死自策後有賢者百年而至置我三蓬自章後世句踐葬之食傳三賢巫里句踐所徙巫為一里去縣二十五里其亭祠今為和公郡社稷墟巫山者越𩴄神巫之官也死葬其上去縣十三里許六山者句踐鑄銅鑄銅不爍埋之東坂其上馬箠句踐遣使者取於南社徙種六山飾治為馬箠獻之吳去縣三十五里江東中巫葬者越神巫無杜子孫也死句踐於中江而葬之巫神欲使覆禍吳人船去縣三十里石塘者越所害軍船也塘廣六十五步長三百五十三步去縣四十里防塢者越所以遏吳軍也去縣四十里杭塢者句踐杭也二百石長員卒七士人度之會夷去縣四十里塗山者禹所取妻之山也去縣五十里朱餘者越鹽官也越人謂鹽曰餘去縣三十五里句踐已滅吳使吳人築吳塘東西千步名辟首後因以為名曰塘獨婦山者句踐將伐吳徙寡婦致獨山上以為死士示得專一也去縣四十里後說之者蓋句踐所以遊軍士也馬嘷者吳伐越道逢大風車敗馬失騎士墮死疋馬啼皋事見吳史浙江南路西城者范蠡敦兵城也其陵固可守故謂之固陵所以然者, WYG: ''}
