  - {type: variant, offset: 489, length: 789, content: 之常性也夫子異則不可於是孔子辭弟子莫能從乎越王夫鐔以上至無餘久遠世不可紀也夫鐔子允常允常子句踐大霸稱王徙瑯琊都也句踐子與夷時霸與夷子子翁時霸子翁子不揚時霸不揚子無疆時霸伐楚威王滅無疆無疆子之侯竊自立為君長之侯子尊時君長尊子親失眾楚伐之走南山親以上至句踐凡八君都瑯琊二百二十四歲無疆以上霸稱王之侯以下微弱稱君長句踐小城山陰城也周二里二百二十三步陸門四水門一今倉庫是其宮臺處也周六百二十步柱長三丈五尺三寸霤高丈六尺宮有百戶高丈二尺五寸大城周二十里七十二步不築北面而滅吳徙治姑胥臺山陰大城者范蠡所築治也今傳謂之蠡城陸門三水門三決西北亦有事到始建國時蠡城盡稷山者句踐齋戒臺也龜山者句踐起怪游臺也東南司馬門因以炤龜又仰望天氣觀天怪也高四十六丈五尺二寸周五百三十二步今東武里一曰怪山怪山者往古一夜自來民怪之故謂怪山駕臺周六百步今安城里離臺周五百六十步今淮陽里丘美人宮周五百九十步陸門二水門一今北壇利里丘土城句踐所習教美女西施鄭旦宮臺也女出於苧蘿山欲獻於吳自謂東垂僻陋恐女樸鄙故近大道居去縣五里樂野者越之弋獵處也大樂故謂之樂野其山上石室者句踐所休謀也去縣七里中宿臺馬丘周六百步今高平里丘東郭外南小城者句踐冰室去縣三里句踐之出入也齊於稷山往從田里去從北郭門炤龜龜山更駕臺馳於離丘遊於美人宮興樂中宿過歷馬丘射於樂野之衢走犬若耶休謀石室食於冰廚領功銓土已作昌土臺藏其形隱其情一曰冰室者所以備膳羞也浦陽者句踐軍敗失眾懣於此去縣五十里夫山者句踐絕糧困也其山上大冢句踐庶子冢也去縣十五里句踐與吳戰於浙江之上石買為將耆老壯長進諫曰夫石買人與為怨家與為仇貪而好利細人也無長策王而用之國必不遂王不聽遂遣之石買發行至浙江上斬殺無罪欲專威服軍中動搖將率獨專其權士眾恐懼人不自聊兵法曰視民如嬰兒故可與赴深溪士眾魚爛而買不知尚猶峻法隆刑子胥獨見可奪之證變為奇謀或北或南夜舉火擊鼓晝陳詐兵越師潰墜政令不行背叛乖離還報其王, WYG: ''}
