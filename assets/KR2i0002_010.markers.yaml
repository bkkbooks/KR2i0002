  - {type: variant, offset: 298, length: 2, content: 望南, WYG: 杭之山虎狼食其肉野火燒其骨東風至飛揚汝灰汝更能為聲哉太宰嚭前載拜曰逆言以滅讒諛以亡因酌行觴時可以行矣吳王曰諾王孫駱為左校司馬太宰嚭為右校司馬王從騎三}
