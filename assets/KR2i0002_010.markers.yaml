  - {type: variant, offset: 12, length: 1748, content: 越之先君無餘乃禹之世別封於越以守禹冢問天地之道萬物之紀莫失其本神農嘗百草水土甘苦黃帝造衣裳后稷產穡制器械人事備矣疇糞桑麻播種五穀必以手足大越海濱之民獨以鳥田小大有差進退有行莫將自使其故何也曰禹始也憂民救水到大越上茅山大會計爵有德封有功更名茅山曰會稽及其王也巡狩大越見耆老納詩書審銓衡平斗斛因病亡死葬會稽葦槨桐棺穿壙七尺上無漏泄下無積水壇高三尺土階三等延袤一畝尚以為居之者樂為之者苦無以報民功教民鳥田一盛一衰當禹之時舜死蒼梧象為民田也禹至此者亦有因矣亦覆釜也覆釜者州土也填德也禹美而告至焉禹知時晏歲暮年加申酉求書其下祠白馬禹井井者法也以為禹葬以法度不煩人眾無餘初封大越都秦餘望南千有餘歲而至句踐句踐徙治山北引屬東海內外越別封削焉句踐伐吳霸關東從瑯琊起觀臺臺周七里以望東海死士八千人戈船三百艘居無幾躬求賢聖孔子聞之從弟子七十人奉先王雅琴治禮往奏句踐乃身被賜夷之甲帶步光之劍杖物盧之矛出死士三百人為陣關下孔子有頃姚稽到越越王曰唯唯夫子何以教之孔子對曰丘能述五帝三王之道故奉雅琴至大王所句踐喟然嘆曰夫越性脆而愚水行而山處以船為車以楫為馬往若飄風去則難從悅兵任死越之常性也夫子異則不可於是孔子辭弟子莫能從乎越王夫鐔以上至無餘久遠世不可紀也夫鐔子允常允常子句踐大霸稱王徙瑯琊都也句踐子與夷時霸與夷子子翁時霸子翁子不揚時霸不揚子無疆時霸伐楚威王滅無疆無疆子之侯竊自立為君長之侯子尊時君長尊子親失眾楚伐之走南山親以上至句踐凡八君都瑯琊二百二十四歲無疆以上霸稱王之侯以下微弱稱君長句踐小城山陰城也周二里二百二十三步陸門四水門一今倉庫是其宮臺處也周六百二十步柱長三丈五尺三寸霤高丈六尺宮有百戶高丈二尺五寸大城周二十里七十二步不築北面而滅吳徙治姑胥臺山陰大城者范蠡所築治也今傳謂之蠡城陸門三水門三決西北亦有事到始建國時蠡城盡稷山者句踐齋戒臺也龜山者句踐起怪游臺也東南司馬門因以炤龜又仰望天氣觀天怪也高四十六丈五尺二寸周五百三十二步今東武里一曰怪山怪山者往古一夜自來民怪之故謂怪山駕臺周六百步今安城里離臺周五百六十步今淮陽里丘美人宮周五百九十步陸門二水門一今北壇利里丘土城句踐所習教美女西施鄭旦宮臺也女出於苧蘿山欲獻於吳自謂東垂僻陋恐女樸鄙故近大道居去縣五里樂野者越之弋獵處也大樂故謂之樂野其山上石室者句踐所休謀也去縣七里中宿臺馬丘周六百步今高平里丘東郭外南小城者句踐冰室去縣三里句踐之出入也齊於稷山往從田里去從北郭門炤龜龜山更駕臺馳於離丘遊於美人宮興樂中宿過歷馬丘射於樂野之衢走犬若耶休謀石室食於冰廚領功銓土已作昌土臺藏其形隱其情一曰冰室者所以備膳羞也浦陽者句踐軍敗失眾懣於此去縣五十里夫山者句踐絕糧困也其山上大冢句踐庶子冢也去縣十五里句踐與吳戰於浙江之上石買為將耆老壯長進諫曰夫石買人與為怨家與為仇貪而好利細人也無長策王而用之國必不遂王不聽遂遣之石買發行至浙江上斬殺無罪欲專威服軍中動搖將率獨專其權士眾恐懼人不自聊兵法曰視民如嬰兒故可與赴深溪士眾魚爛而買不知尚猶峻法隆刑子胥獨見可奪之證變為奇謀或北或南夜舉火擊鼓晝陳詐兵越師潰墜政令不行背叛乖離還報其王王殺買謝其師號聲聞吳吳王恐懼子胥私喜越軍敗矣胥聞之狐之將殺噆脣吸齒今越句踐其已敗矣君王安意越易兼也使人入問之越師請降子胥不聽越棲於會稽之山吳退而圍之句踐喟然用種蠡計轉死為霸一人之身吉凶更至盛衰存亡在於用臣治道萬端要在得賢越棲於會稽日行成於吳吳引兵而去句踐將降西至浙江待詔入吳故有雞鳴墟其入辭曰亡臣孤句踐故將士眾入為臣虜民可得使地可得有吳王許之子胥大怒目若夜光聲若哮虎此越未戰而服天以賜吳其逆天乎臣唯君王急剬之吳王不聽遂許之浙江是也陽城里者范蠡城也西至水路水門一陸門二北陽里城大夫種城也取土西山以濟之徑百九十四步或為南安富陽里者外越賜義也處里門美以練塘田安城里高庫者句踐伐吳禽夫差以為勝兵築庫高閣之周二百三十步今安城里故禹宗廟在小城南門外大城內禹稷在廟西今南里獨山大冢者句踐自治以為冢徙瑯琊冢不成去縣九里麻林山一名多山句踐欲伐吳種麻以為弓絃使齊人守之越謂齊人多故曰麻林多以防吳以山下田封功臣去縣一十二里會稽山上城者句踐與吳戰大敗棲其中因以下為目魚池其利不租會稽山北城者子胥浮兵以守城是也若耶大冢者句踐所徙葬先君夫鐔冢也去縣二十五里葛山者句踐罷吳種葛使越女織治葛布獻於, SBCK: ''}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 吳王夫差之時其民殷衆禾稼登熟兵革堅利其民習於鬬戰闔廬闕剬子胥之教行有日發有時道於姑胥之門晝卧姑胥之臺覺寤而起其心惆悵如有所悔即召太宰而占之曰向者晝卧夢入章明之宫入門見兩䥶炊而不蒸見兩黑犬嘷以北嘷以南見兩鏵倚吾宫堂見流水湯湯}
