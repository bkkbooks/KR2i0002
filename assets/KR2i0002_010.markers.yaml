  - {type: variant, offset: 1764, length: 0, content: '', SBCK: 之時其民殷衆禾稼登熟兵革堅利其民習於􅃲戰闔廬闕剬子胥之教行有日發有時道於姑胥之門晝卧姑胥之臺覺寤而起其心惆悵如有所悔即召太宰而占之曰向者晝卧夢入章明之宫入門見両䥶炊而不蒸見両黑犬嘷以北嘷以南見両鏵倚吾宫堂見流水湯湯越吾宫牆見前園横索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人之心所從太宰嚭對曰善哉大王興師伐齊夫章明者伐齊克天下顯明也見両䥶炊而不蒸者大王聖氣有餘也見両黑犬嘷以北嘷以南四夷巳服朝諸侯也両鏵倚吾宫堂夾田夫也見流水湯湯越吾宫牆獻物巳至則有餘也見前園横索生樹桐樂府吹巧也見後房鍛者扶挾鼓小震者宫女鼓樂也吳王大恱而賜太宰嚭雜繒四十疋王心不已召王孫駱而告之對曰臣智淺能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子王孫聖為人㓜而好學長而憙遊愽聞疆識通於方來之事可占大王所夢臣請召之吳王曰諾王孫駱移記曰今日壬午左校司馬王孫駱受教告東掖門亭長公孫聖吳王晝卧覺寤而心中惆悵也如有悔記到車馳詣姑胥之臺聖得記發而讀之伏地而泣有頃不起其妻大君從旁接而起之曰何若子性之大也希見人士卒得急記流涕不止公孫聖仰天歎曰嗚呼悲哉此固非子胥所能知也今日壬午時加南方命屬蒼天不可逃亡伏地而泣者不能自惜但吳王諛心而言師道不明正言直諫身死無功大君曰汝疆食自愛愼勿相忘伏地而書既成篇即與妻把臂而决涕泣如雨上車不顧遂至姑胥之臺謁見吳王吳王勞曰公弟子公孫聖也寡人晝卧姑胥之臺夢入章明之宫入門見両䥶炊而不蒸見両黒犬嘷以北嘷以南見両鏵􅀝吾宫堂見流水湯湯越吾宫牆見前園横索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人心所從公孫聖伏地有頃而起仰天歎曰悲哉夫好船者溺好騎者堕君子各以所好為禍諛讒申者師道不明正言切諫身死無功伏地而泣者非自惜因悲大王夫章者戰不勝走傽傽明者}
