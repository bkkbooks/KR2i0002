  - {type: variant, offset: 139, length: 148, content: 也巡狩大越見耆老納詩書審銓衡平斗斛因病亡死葬會稽葦槨桐棺穿壙七尺上無漏泄下無積水壇高三尺土階三等延袤一畝尚以為居之者樂為之者苦無以報民功教民鳥田一盛一衰當禹之時舜死蒼梧象為民田也禹至此者亦有因矣亦覆釜也覆釜者州土也填德也禹美而告至焉禹知時晏歲暮年加申酉求書其下祠白馬禹井井者法也以為禹葬以法度不煩, WYG: 使}
