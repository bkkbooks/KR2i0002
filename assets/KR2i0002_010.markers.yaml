  - {type: variant, offset: 13, length: 0, content: '', WYG: 吾宫牆見前園横索生樹桐見後房鍛者扶挾鼓小震子為寡人精占}
  - {type: variant, offset: 14, length: 1, content: 先, WYG: 吉則言吉凶則言凶無諛寡人之心所從太宰嚭對曰善哉大王興師伐齊夫章明者伐齊克天下顯明也見兩䥶炊而不蒸者大王聖氣有餘也見兩黑犬嘷以北嘷以南四夷已服朝諸侯也兩鏵倚吾宫堂夾田夫也見流水湯湯越吾宫牆獻物已至則有餘也見前園横索生樹桐樂府吹巧也見後房鍛者扶挾鼓小震者宫女鼓樂也吳王大悦而賜太宰嚭雜繒四十疋王心不已召王孫駱而告之對曰臣智淺能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子公孫聖為人㓜而好學長而憙遊博聞彊識通於方來之事可占大王所夢臣請召之吳王曰諾王孫駱移記曰今日壬午左校司馬王孫駱受教告東掖門亭長公孫聖吳王晝卧覺寤而心中惆悵也如有悔記到車馳詣姑胥之臺聖得記發而讀之伏地而泣有頃不起其妻大}
