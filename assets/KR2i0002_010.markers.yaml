  - {type: variant, offset: 317, length: 3, content: 海內外, WYG: 僻亦得繫於天皇之位無罪而王恒使其芻莖秩馬比於奴虜此非大過者四乎太宰嚭讒諛佞諂斷絶王世聽而用之此非大過者五乎吳王曰今日聞命矣}
