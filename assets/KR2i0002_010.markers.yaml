  - {type: variant, offset: 301, length: 0, content: '', WYG: 旌旗羽葢自處中軍伐齊大尅師兵三月不去過伐晉晉知其兵革之罷倦糧食盡索興師擊之大敗吳師涉江流血浮尸者不可勝數吳王不忍率其餘兵相將至秦餘杭之山饑餓足行乏糧視瞻不明據地飲水持籠稻而餐之顧謂左右曰此何名羣臣對曰是籠稻也吳王曰悲哉此公孫聖所言王且不得火食太宰嚭曰秦餘杭山西坂間燕可以休息大王亟飡而去尚}
  - {type: page-break, offset: 301, content: '', id: KR2i0002_WYG_010-4b, image: WYG0463/WYG0463-0113b.png}
  - {type: variant, offset: 302, length: 3, content: 餘歲而, WYG: 十數里耳吳王曰吾甞戮公孫聖於斯山子試為寡人前呼之即尚在耶當有聲響太宰嚭即上山三呼聖三應吳王大怖足行屬腐面如死灰色曰公孫聖令寡人得邦誠世世相事言未畢越王追}
  - {type: variant, offset: 306, length: 0, content: '', WYG: 兵三圍吳大夫種處中范蠡數吳王曰王有過者五寧知之乎殺忠臣伍子胥公孫聖胥為人先知忠信中斷之入江聖正言直諫身死無功此非大過者二乎夫齊無罪空復伐之使鬼神不血食社稷廢蕪父子離散兄弟異居此非大過者三乎夫越王}
