  - {type: variant, offset: 2628, length: 549, content: 里語兒鄉故越界名曰就李吳疆越地以為戰地至於柴辟亭女陽亭者句踐入官於吳夫人從道產女此亭養於李鄉句踐勝吳更名女陽更就李為語兒鄉吳王夫差伐越有其邦句踐服為臣三年吳王復還封句踐於越東西百里北鄉臣事吳東為右西為左大越故界浙江至就李南姑末寫干覲鄉北有武原武原今海鹽姑末今大末寫干今屬豫章自無餘初封於越以來傳聞越王子孫在丹陽皋鄉更姓梅梅里是也自秦以來至秦元王不絕年元王立二十年平王立二十三年惠文王立二十七年武王立四年昭襄王亦立五十六年而滅周赧王周絕於此孝文王立一年莊襄王更號太上皇帝立三年秦始皇帝立三十七年號曰趙政政趙外孫胡亥立二年子嬰立六月秦元王至子嬰凡十王百七十歲漢高帝滅之治咸陽壹天下政使將魏舍內史教攻韓得韓王安政使將王賁攻魏得魏王歇政使將王涉攻趙得趙王尚政使將王賁攻楚得楚王成政使將史敖攻燕得燕王喜政使將王涉攻齊得齊王建政更號為秦始皇帝以其三十七年東遊之會稽道度牛渚奏東安東安今富春丹陽溧陽鄣故餘杭軻亭南東奏槿頭道度諸暨大越以正月甲戍到大越留舍都亭取錢塘浙江岑石石長丈四尺南北面廣六尺西面廣尺六寸刻文立於越棟山上其道九曲去縣二十一里是時徙大越民置餘杭伊攻故鄣因徙天下有罪適吏民置海南故大越處以備東海外越乃更名大越曰山陰已去奏諸暨錢塘因奏吳上姑蘇臺則治射防於宅亭賈亭北年至靈不射去奏曲河句容度牛渚西到咸陽崩, SBCK: ''}
