  - {type: variant, offset: 119, length: 8, content: 夫官位財幣金賞者, SBCK: 欲知龍淵觀其狀如登高山臨深淵欲知泰阿觀其鈲巍巍翼翼如流水之波欲知工布鈲從文起至脊而止如珠不可衽文若流水不絶晉鄭王聞而求之不得興師圍楚之城三年不解倉榖粟索庫無兵革左右群臣賢士莫能禁止於是楚王聞之引泰阿之劒登城而麾之三軍破敗士卒迷惑流血千里猛獸歐瞻江水折揚晉鄭之頭畢白楚王於是大恱曰此劒威耶寡人力耶風胡子對曰劒之威也因大}
