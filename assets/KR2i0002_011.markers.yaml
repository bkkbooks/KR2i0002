  - {type: variant, offset: 421, length: 780, content: 乎仲二乎仲斯可致王但霸何足道桓稱仲父文稱太公計此二人曾無跬步之勞大呼之功乃忘弓矢之怨授以上卿傳曰直能三公今置臣而不尊使賢而不用譬如門戶像設倚而相欺蓋智士所恥賢者所羞君王察之越王曰誠者不能匿其辭大夫既在何須言哉計倪對曰臣聞智者不妄言以成其勞賢者始於難動終於有成傳曰易之謙遜對過問抑威權勢利器不可示人言賞罰由君此之謂也故賢君用臣略貴於絕施之職而成其功遠使以難以效其誠內告以匿以知其信與之論事以觀其智飲之以酒以觀其亂指之以使以察其能示之以色以別其態選士以備不肖者無所置越王大媿乃壞池填塹開倉穀貸貧乏乃使群臣身問疾病躬視死喪不厄窮僻尊有德與民同苦樂激河泉井示不獨食行之六年士民一心不謀同辭不呼自來皆欲伐吳遂有大功而霸諸侯孔子曰寬則得眾此之謂也夫有勇見於外必有仁於內子胥戰於就李闔廬傷焉軍敗而還是時死傷者不可稱數所以然者罷頓不得已子胥內憂為人臣上不能令主下令百姓被兵刃之咎自責內傷莫能知者故身操死持傷及被兵者莫不悉於子胥之手垂涕啼哭欲伐而死三年自咎不親妻子饑不飽食寒不重綵結心於越欲復其仇師事越公錄其述印天之兆牽牛南斗赫赫斯怒與天俱起發令告民歸如父母當胥之言唯恐為後師眾同心得天之中越乃興師與戰西江二國爭彊未知存亡子胥知時變為詐兵分為兩翼夜火相望句踐大恐振旅服降進兵圍越會稽填山子胥微策可謂神守戰數年句踐行成子胥爭諫以是不容宰嚭許之引兵而還夫差聽嚭不殺仇人興師十萬與不敵同聖人譏之是以春秋不差其文故傳曰子胥賢者尚有就李之恥此之謂也哀哉夫差不信伍子胥而任太宰嚭乃此禍晉之驪姬亡周之褒姒盡妖妍於圖畫極凶悖於人理傾城傾國思昭示於後王麗質冶容宜求監於前史古人云苦藥利病苦言利行伏念居安思危日謹一日易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡而不失其正者其唯聖人乎由此而言進有退之義存有亡之幾得有喪之理愛之如父母仰之如日月敬之如神明畏之如雷霆此其可以卜祚遐長而禍亂不作也, SBCK: ''}
