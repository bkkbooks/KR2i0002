  - {type: variant, offset: 108, length: 2, content: 臣也, SBCK: 人作鐵劒歐冶子干將鑿茨山洩其溪取鐡英作為鐡劒三枚一曰龍淵二曰泰阿三曰工布市一作畢成風胡子奏之楚王楚王見此三劒之精神大恱風胡子問之曰此三劒何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚}
