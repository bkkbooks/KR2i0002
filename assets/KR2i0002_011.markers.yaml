  - {type: variant, offset: 112, length: 255, content: 何謂也計倪對曰夫官位財幣金賞者王之所輕也操鋒履刃艾命投死者是士之所重也王愛所輕責士所重豈不艱哉王自揖進計倪而問焉計倪對曰夫仁義者治之門也士民者君之根本也闓門固根莫如正身正身之道謹選左右左右選則孔主日益上不選則孔主日益下二者貴質浸之漸也願君王公選於眾精鍊左右非君子至誠之士無與居家使邪僻之氣無漸以生仁義之行有階人知其能官知其治爵賞刑罰一由君出則臣下不敢毀譽以言無功者不敢干治故明主用人不由所從不問其先說取一焉是故周文齊桓躬於任賢太公管仲明於知人今則不然臣故曰殆哉越王勃然曰孤聞齊威淫泆九合諸侯一匡天下蓋管仲之力也, WYG: ''}
