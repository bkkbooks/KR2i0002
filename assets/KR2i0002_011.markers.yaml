  - {type: punctuation, offset: 20, content: ，, id: KR2i0002_CHANT_011-bkkpn2}
  - {type: 'tls:seg', offset: 20, content: '', id: KR2i0002_CHANT_011-1a.4}
  - {type: variant, offset: 20, length: 2, content: 遠媿, WYG: 王闔廬之時得其勝邪魚腸湛盧闔廬無道子女死殺生以送之湛盧之劍去之如水行秦過楚楚王卧而寤得吳王湛盧之劍將首魁漂而存焉秦王聞而求不得興師擊楚曰與我湛盧之劍還師去汝楚王不與時闔廬又以魚腸之劍刺吳王僚使披腸夷之甲三事闔廬使專諸為秦炙魚者引劍而刺之遂弑王僚此其小試}
  - {type: page-break, offset: 20, content: '', id: KR2i0002_WYG_011-2b, image: WYG0463/WYG0463-0114d.png}
  - {type: variant, offset: 23, length: 2, content: 諸侯, WYG: 敵邦未見其大用於天下也今赤董之山已合若耶溪深而不測羣神不下歐冶子即死雖復傾城量金珠玉竭河猶不能得此一物有市之鄉二駿馬千匹千戸之都二何足言哉楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二子甲世而生天下未嘗有精誠上通天下為烈士寡人願齎邦之重寶皆以奉子因吳王請此二人作鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使人作鐵劍歐冶子干將鑿茨山洩其溪取鐵英作為鐵劍三枚一曰龍淵二曰泰阿三曰工布一作市畢成風胡子奏之楚王楚王見此三劍之精神大悦風胡子問之曰此三劍何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚王曰何為龍淵泰阿工布風胡子對曰欲知龍淵觀其狀如登髙山臨深淵欲知泰阿觀其鈲巍巍翼翼如流水之波欲知工布鈲從文起至脊而止如珠不可袵文若流水不絶晉鄭王聞而求之不得興師圍楚之城三年不解倉榖粟索庫無}
  - {type: page-break, offset: 23, content: '', id: KR2i0002_WYG_011-3a, image: WYG0463/WYG0463-0115a.png}
  - {type: page-break, offset: 23, content: '', id: KR2i0002_WYG_011-3b, image: WYG0463/WYG0463-0115b.png}
