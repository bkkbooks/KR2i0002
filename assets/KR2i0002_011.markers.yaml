  - {type: variant, offset: 18, length: 15, content: 彊吳遠媿於諸侯兵革散空國且滅亡, SBCK: 天下客有能相劒者名薛燭王召而問之曰吾有寳劒五請以示之薛燭對曰愚理不足以言大王請不得已}
  - {type: variant, offset: 18, length: 1, content: 彊, WYG: 天下客有能相劍者名薛燭王召而問之曰吾有寶劍五請以示之薛燭對曰愚理不足以言大王請不得已乃召掌者王使取毫曺薛燭對曰毫曺非寶劍也夫寶劍五色並見莫能相勝豪曺已擅名矣非寶劍也王曰取巨闕薛燭曰非寶劍也寳劍者金鍚和銅而不離今巨闕已離矣非寶劍也王曰然巨闕初成之時吾坐於露壇之上宫人有四駕白鹿而過者車奔鹿驚吾引劍而指之四駕上飛揚不知其絶也穿銅釡絶鐵䥶胥中決如粢米故曰巨闕王取純鈎薛燭聞之忽如敗有頃懼如悟下階而深惟簡衣而坐望之手振拂揚其華捽如芙蓉始出觀其鈲爛如列星之行觀其光渾渾如水之溢於塘觀其斷巖巖如瑣石觀其才焕焕如冰釋此所謂純鈎耶王曰是也客有直之者有市之鄉二駿馬千匹千戸之都二可乎薛燭對曰不可當造此劍之時赤董之山破而出錫若耶之溪涸而出銅雨師掃灑雷公擊槖蛟龍捧鑪天帝裝炭太一下觀天精下之歐冶乃因天之精神悉其伎巧造為大刑三小刑二一曰湛盧二曰純鈎三曰勝邪四曰魚腸五曰巨闕}
