  - {type: variant, offset: 0, length: 0, content: '', WYG: 姓名其云以去為姓得衣乃成是袁字也厥名有米覆之以庚是康字也禹來東征死葬其疆是㑹稽人也又云文詞屬定自於邦賢以口為姓承之以天是呉字也又云楚相屈原與之同名是平字也然則此書為㑹稽袁康所作同郡呉平所定也王充論衡按書篇曰東畨鄒伯竒臨淮袁太伯袁文術㑹稽呉君高周長生之輩位雖不至公卿誠能知之囊橐文雅之英雄也觀伯竒之元思太伯之易童句案童疑作章文術之咸銘君高之}
