  - {type: variant, offset: 1, length: 1, content: 絕, WYG: 紐録長生之洞厯劉子政揚子雲不能過也所謂呉君高殆即平字所謂越紐録殆即此書歟楊慎丹鉛録胡侍珍珠船田藝衡留青日札皆有是説核其文義一一脗合隋唐志皆云子貢作非其實矣其文縱横曼衍與呉越春秋相𩔖而博麗奥衍則過之中如計倪内經軍氣之𩔖多雜術數家言皆漢人専門之學非後來所能依托也此本與呉越春秋皆大徳丙午紹興路所刋卷末一跋諸本所無惟申明復仇之義不著姓名詳其詞意或南宋人所題耶鄭明選秕言引文選七命註引越絶書大翼一艘十丈中翼九丈六尺小翼九丈又引王鏊震澤長語引越絶書風起震方云云謂今本皆無此語疑更有全書惜未之見案崇文總目稱越絶書舊有内記八外𫝊十七今文題闕舛裁二十篇是此書在北宋之初已佚五篇選註所引葢佚篇之文王鏊所稱亦他書所引佚篇之文以為此本之外更有全書則明選誤矣别有續越絶書二卷上卷曰内𫝊本事呉内𫝊徳序記子游内經外𫝊越絶後語西施鄭旦外𫝊下卷曰越外𫝊雜事别𫝊變越上别𫝊變越下經内雅琴考序𫝊後記朱彛尊友善考謂為錢􅠒偽撰詭云得之石匣中􅠒與彛尊友善所言當實今未見𫝊本其偽妄亦不待辨以其續此書而作又即托於撰此書之人恐其幸而或𫝊久且亂真又恐其或不能𫝊而好異者耳聞其説且疑此書之真有續編故附訂其偽於此釋來者之惑焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書越絶書漢袁康撰}
