  - {type: variant, offset: 40, length: 2, content: 奔鄭, SBCK: 城周九里二百七十步小城東西從武里面從小城北邑中徑從閶門到婁門九里七十二步陸道廣二十三步平門到蛇門十里七十五步陸道廣三十三步水道廣二十八步吳古故陸道出胥明奏出土山度灌邑奏髙頸過猶山奏大湖隨北顧以西度陽下溪過歴山陽龍尾西大決通安湖吳古故水道出平門上郭池入瀆出巢湖上歷地過梅亭入楊湖出漁浦入大江奏廣陵吳古故從由拳辟塞度㑹夷奏山陰辟塞者吳備候塞也居東城者闔廬所遊城也去縣二十里柴碎亭到語兒就李吳侵以為戰地百尺瀆奏江吳以達糧千里廬虚者闔廬以鑄千將劒歐治僮女三百人去縣二里南達江閶門外髙頸山東桓石人古者名石公去縣二十里閶門外郭中􅃁者闔廬冰室也闔廬􅃁在閶門外名虎丘下池廣六十步水深丈五尺銅槨三重墳池六尺玉鳬之流扁諸之劒三千方圓之口三千時耗魚腸之劒在焉千萬人築治之取土臨湖口築三日而白虎居上故號爲虎丘虎丘北莫格􅃁古賢者避世􅃁去縣二十里被奏􅃁鄧大􅃁是也去縣四十里闔廬子女􅃁在閶門外道北下方池廣四十八步水深二丈五尺池廣六十步水深丈五寸􅎬出廟路以南通姑胥門并周六里舞鶴吳市殺生以送死餘杭城者襄}
