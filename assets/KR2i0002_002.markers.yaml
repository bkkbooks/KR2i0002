  - {type: variant, offset: 37, length: 0, content: '', WYG: 郭周六十八里六十步呉小城周十二里其下廣二丈七尺髙四丈七尺門三皆有樓其二増水門二其一有樓一増柴路東宫周一里二百七十步路西宫在長秋周一里二十六步秦始皇帝十一年守宫者照燕失火燒之}
