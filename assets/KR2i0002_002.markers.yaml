  - {type: variant, offset: 982, length: 0, content: '', SBCK: 丈漢髙帝封有功劉賈為荆王幷有吳賈築呉市西城名曰定錯城屬小城北到平門丁將軍築治之十一年淮南王反殺劉賈後十年髙皇帝更封兄子濞為吳王治廣陵幷有吳立二十一年東渡之吳十日還去立三十二年反西到陳留縣還奔丹陽從東歐越王弟夷烏將軍殺濞東歐王為彭澤王夷烏將軍今為平都王濞父字為仲匠近一作門外信士里東廣平地者吳王濞時宗廟也太公髙祖在西孝文在東去縣}
