  - {type: variant, offset: 100, length: 292, content: 邦君王必早閉而晏開胥將使邊境有大憂於是王即使使者召子尚於吳曰子父有罪子入則免之不入則殺之子胥聞之使人告子尚於吳吾聞荊平王召子子必毋入胥聞之入者窮出者報仇入者皆死是不智也死而不報父之讎是非勇也子尚對曰入則免父之死不入則不仁愛身之死絕父之望賢士不為也意不同謀不合子其居尚請入荊平王復使使者召子胥於鄭曰子入則免父死不入則殺之子胥介冑彀弓出見使者謝曰介冑之士固不拜矣請有道於使者王以奢為無罪赦而蓄之其子又何適乎使者還報荊平王王知子胥不入也殺子奢而并殺子尚子胥聞之即從橫嶺上大山北望齊晉謂其舍人曰去此邦堂堂被山帶河其民重移於是乃南奔吳至江上見漁者曰來渡我漁者知其非常人也欲往渡之恐人知之即歌而往, SBCK: ''}
