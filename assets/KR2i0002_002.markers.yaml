  - {type: variant, offset: 43, length: 3, content: 召奢而, krp: 時神女所葬也神多靈巫門外糜湖西城越宋王城也時與揺城王周宋君戰於語招殺周宋君母頭騎歸至武里死亡葬武里南城午日死也巫門外冡者闔廬冰室也巫門外大冡吳王客齊孫武冡也去縣十里善為兵法地門外塘波洋中世子塘者故曰王世子造以為田塘去縣二十五里洋中塘去縣二十六里蛇門外大丘吳王不審名冡也去縣十五里築塘北山者吳王不審名冡也去縣二十里近門外欐溪櫝中連鄉大丘者吳故神巫所葬也去縣十五里婁門外馬亭溪上復城者故越王餘復君所治也去縣八十里是時烈王歸於越所載襄王之後不可繼述其事書之馬亭溪婁門外鴻城者故越王城也去縣百五十里婁門外雞陂墟故吳王所畜雞使李保養之去縣二十里胥門外有九曲路闔廬造以遊姑胥之臺以望太湖中闚百姓去縣三十里齊門闔廬伐齊大克取齊王女為質子為造齊門置於水海虚其臺在車道左水海右去縣七十里齊女思其國死葬虞西山吳北野禺櫟東所舎大疁者吳王田也去縣八十里吳西野鹿陂者呉王田也今分為耦瀆胥卑虚去縣二十里吳北野胥主疁者呉王女胥主田也去縣八十里麋湖城者闔廬所置䴢也去縣五十里欐溪城者闔廬所置船宫也闔廬所造婁門外力士者闔廬所造以備外越巫欐城者闔廬所置諸侯逺客離城也去縣十五里由鍾窮隆山者古赤松子所取赤石脂也去縣二十里子胥死民思祭之莋碓山故為鶴阜山禹遊天下引湖中柯山置之鶴阜更名莋碓放山者在莋碓山南以取長之人一作莋碓山下故有鄉名莋邑吳王惡其名内郭中名通陵鄉莋碓山南有大石古者名為墜星去縣二十里撫侯山者故闔廬治以諸侯冡次去縣二十里吳東米一作徐亭東西南北通溪者越荆王所置與麋湖相通也馬安溪上干城者越干王之城也去縣七十里巫門外寃山大冡故越王王史冡也去縣二十里揺城者吳王子居焉後越揺王居之稻田三百頃在邑東南肥饒水絶去縣五十里胥女大冡吳王不審名冡也去縣四十五里蒲姑大冡呉王不審名冡也去縣三十里古城者吳王闔廬所置羙人離城也去縣七十里通江南陵揺越所鑿以伐上舎君去縣五十里婁東十里坑者古名長人坑從海上來去縣十里海鹽縣始為武原鄉婁北武城闔廬所以候外越也去縣三十里今為鄉也宿甲者吳宿兵候外越也去縣百里其東大冡揺王冡也烏程餘杭黝歙無湖石城縣以南皆故大越徙民也秦始皇帝刻石徙之烏傷縣常山古人所採藥也髙且神齊鄉周十里二百一十步其城六里三十步牆髙丈二尺百七十步竹門三其二有屋虞山者巫咸所出也虞故神出奇怪去縣百五里母陵道陽朔三年太守周君造陵道語昭郭周十里百一十步牆髙丈二尺陵門四皆有君水門二無錫城周二里十九步髙二丈七尺門一樓四其郭周十一里百二十八步牆一丈七尺門皆有屋無錫歴山春申君時盛祠以牛立無錫塘去吳百二十里無錫湖者春申君治以為陂鑿語昭瀆以東到大田田名胥卑鑿胥卑下以南注大湖以寫西野去縣三十五里無錫西龍尾陵道者春申君初封呉所造也屬於無錫縣以奏吳北野胥主疁曲阿故為雲陽縣毗陵故為延陵吳季子所居毗陵縣南城故古淹君地也東南大冡淹君子女冡也去縣十八里吳所葬毗陵上湖中冡者延陵季子冡也去縣七十里上湖通上洲季子冡古名延陵墟蒸山南面夏駕大冡者越王不審名冡去縣三十五里秦餘杭山者越王棲吳夫差山也去縣五十里山有湖水近太湖夫差冡在猶髙西卑猶位越王候干戈人二累土以葬之近太湖去縣十七里三臺者太宰嚭逢同妻子死所在也去縣十七里太湖周三萬六千頃其千頃烏程也去縣五十里無錫湖周萬五千頃其一千三頃毗陵上湖也去縣五十里一名射貴湖尸湖周二千二百頃去縣百七十里小湖周千三百二十頃去縣百里耆湖周六萬五千頃去縣百二十里乗湖周五百頃去縣五里猶湖周三百二十頃去縣十七里語昭湖周二百八十頃去縣五十里作湖周百八十頃聚魚多物去縣五十五里昆湖周七十六頃一畞去縣一百七十五里一名隱湖湖王湖當}
