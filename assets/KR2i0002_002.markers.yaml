  - {type: variant, offset: 982, length: 0, content: '', krp: 丈漢髙帝封有功劉賈為荆王幷有吳賈築呉市西城名曰定錯城屬小城北到平門丁將軍築治之十一年淮南王反殺劉賈後十年髙皇帝更封兄子濞為吳王治廣陵幷有吳立二十一年東渡之吳十日還去立三十二年反西到陳留縣還奔丹陽從東歐越王弟夷烏將軍殺濞東歐王為彭澤王夷烏將軍今為平都王濞父字為仲匠近一作門外信士里東廣平地者吳王濞時宗廟也太公髙祖在西孝文在東去縣}
  - {type: variant, offset: 983, length: 122, content: 勝荊平王已死子胥將卒六千操鞭捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今此報子也後子昭王臣司馬子期令尹子西歸相與計謀子胥不死又不入荊邦猶未得安為之柰何莫若求之而與之同邦乎昭王乃使使者報子胥於吳曰昔者吾先人殺子之父而非其罪也寡人尚少未有所識也今子, SBCK: 里永光四年孝元帝時貢}
