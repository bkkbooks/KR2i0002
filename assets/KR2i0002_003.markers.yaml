  - {type: variant, offset: 1584, length: 0, content: '', SBCK: 禹崩啓立曉知王事達於君臣之義益死之後啓嵗善犧牲以祠之經曰夏啓善犧於益此之謂也湯獻牛荆之伯之伯者荆州之君也湯行仁義敬鬼神天下皆一心歸之當是時荆伯未從也湯於是乃飾犧牛以事荆伯乃媿然曰失事聖人禮乃委}
