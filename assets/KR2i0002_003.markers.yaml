  - {type: variant, offset: 6, length: 3, content: 地傳第, WYG: 何以稱人乎夷狄之也憂中邦奈何乎伍子胥父誅於楚子胥挾弓身干闔廬闔廬曰士之甚勇之甚將為之報仇子胥曰不可諸侯不為匹夫報仇臣聞事君猶事父也虧君之行報父之仇不可於是止蔡昭公南朝楚被羔裘囊瓦求之昭公不與即拘昭公南郢}
