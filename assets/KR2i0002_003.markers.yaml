  - {type: variant, offset: 1069, length: 419, content: 齊大克取齊王女為質子為造齊門置於水海虛其臺在車道左水海右去縣七十里齊女思其國死葬虞西山吳北野禺櫟東所舍大疁者吳王田也去縣八十里吳西野鹿陂者吳王田也今分為耦瀆胥卑虛去縣二十里吳北野胥主疁者吳王女胥主田也去縣八十里麋湖城者闔廬所置麋也去縣五十里欐溪城者闔廬所置船宮也闔廬所造婁門外力士者闔廬所造以備外越巫欐城者闔廬所置諸侯遠客離城也去縣十五里由鍾窮隆山者古赤松子所取赤石脂也去縣二十里子胥死民思祭之莋碓山故為鶴阜山禹遊天下引湖中柯山置之鶴阜更名莋碓放山者在莋碓山南以取長之莋碓山下故有鄉名莋邑吳王惡其名內郭中名通陵鄉莋碓山南有大石古者名為墜星去縣二十里撫侯山者故闔廬治以諸侯冢次去縣二十里吳東徐亭東西南北通溪者越荊王所置與糜湖相通也馬安溪上干城者越干王之城也去縣七十里巫門外冤山大冢故越王王史冢也去縣二十里搖城者吳王子居焉後越搖王居之稻田三百頃在邑東南肥饒水絕去縣五十里胥女大冢吳王不審名冢也去縣四十五里蒲姑大冢吳王不審名冢也去縣三十里石城者, SBCK: ''}
