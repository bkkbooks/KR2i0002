  - {type: variant, offset: 1555, length: 0, content: '', SBCK: 卒敗而去也卒者闔廬死也天子稱崩諸侯稱薨大夫稱卒士稱不禄闔廬諸侯也不稱薨而稱卒者何也當此之時上無明天子下無賢方伯諸侯力政疆者為君南夷與北狄交爭中國不絶如綫矣臣弑君子弑父天下莫能禁止於是孔子作春秋方據魯以王故諸侯死皆稱卒不稱薨避魯之諡也晉公子重耳之時天子㣲弱諸侯力政疆者為君文公為}
