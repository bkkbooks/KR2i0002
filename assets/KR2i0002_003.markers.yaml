  - {type: variant, offset: 3225, length: 3, content: 二十八, SBCK: 王見賢臣已亡乃朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封微子於宋此武王以禮信也周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足禾麥茂美使人以時説之以禮上順天地澤及夷狄於是管叔蔡叔不知周公而讒之成王周公乃辭位出廵狩於邊一}
