  - {type: variant, offset: 75, length: 993, content: 滅之闔廬宮在高平里射臺二一在華池昌里一在安陽里南城宮在長樂里東到春申君府秋冬治城中春夏治姑胥之臺旦食於紐山晝遊於胥母射於鷗陂馳於遊臺興樂石城走犬長洲吳王大霸楚昭王孔子時也吳大城周四十七里二百一十步二尺陸門八其二有樓水門八南面十里四十二步五尺西面七里百一十二步三尺北面八里二百二十六步三尺東面十一里七十九步一尺闔廬所造也吳郭周六十八里六十步吳小城周十二里其下廣二丈七尺高四丈七尺門三皆有樓其二增水門二其一有樓一增柴路東宮周一里二百七十步路西宮在長秋周一里二百二十六步秦始皇帝十一年守宮者照燕失火燒之伍子胥城周九里二百七十步小城東西從武里面從小城北邑中徑從閶門到婁門九里七十二步陸道廣二十三步平門到蛇門十里七十五步陸道廣三十三步水道廣二十八步吳古故陸道出胥門奏出土山度灌邑奏高頸過猶山奏太湖隨北顧以西度陽下溪過歷山陽龍尾西大決通安湖吳古故水道出平門上郭池入瀆出巢湖上歷地過梅亭入楊湖出漁浦入大江奏廣陵吳古故從由拳辟塞度會夷奏山陰辟塞者吳備候塞也居東城者闔廬所遊城也去縣二十里柴辟亭到語兒就李吳侵以為戰地百尺瀆奏江吳以達糧千里廬虛者闔廬以鑄干將劍處歐冶僮女三百人去縣二里南達江閶門外高頸山東桓石人古者名石公去縣二十里閶門外郭中冢者闔廬冰室也闔廬冢在吳縣閶門外名曰虎丘下池廣六十步水深丈五尺銅槨三重澒池六尺玉鳧之流扁諸之劍三千方圓之口三千時耗魚腸之劍在焉十萬人築治之取土臨湖口葬之三日而白虎居其上故號為虎丘虎丘北莫格冢古賢者避世冢去縣三十里被奏冢鄧大冢是也去縣四十里闔廬子女冢在閶門外道北下方池廣四十八步水深二丈五尺池廣六十步水深丈五寸隧出廟路以南通姑胥門并周六里舞鶴吳市殺生以送死餘杭城者襄王時神女所葬也神多靈巫門外麋湖西城越麋王城也時搖越王與麋君戰於語招殺麋君毋頭騎歸至武里死亡葬武里南城午日死也巫門外冢者闔廬冰室也巫門外大冢吳王客齊孫武冢也去縣十里善為兵法虵門外塘波洋中世子塘者故曰王世子造以為田塘去縣二十五里洋中塘去縣二十六里蛇門外大丘吳王不審名冢也去縣十五里築塘北山者吳王不審名冢也去縣二十里匠門外欐溪櫝中連鄉大丘者吳故神巫所葬也去縣十五里婁門外馬亭溪上復城者故越王餘復君所治也去縣八十里是時烈王歸於越所載襄王之後不可繼述其事書之馬亭溪婁門外鴻城者故越王城也去縣百五十里婁門外雞陂墟故吳王所蓄雞處也使李保養之去縣二十里胥門外有九曲路闔廬造以遊姑胥之臺以望太湖中闚百姓去縣三十里齊門闔廬, SBCK: 欲}
