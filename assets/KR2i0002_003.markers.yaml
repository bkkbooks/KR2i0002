  - {type: variant, offset: 1592, length: 1580, content: 烏程餘杭黝歙無湖石城縣以南皆故大越徙民也秦始皇帝刻石徙之烏傷縣常山古人所採藥也高且神齊鄉周十里二百一十步其城六里三十步牆高丈二尺百七十步竹格門三其二有屋虞山者巫咸所出也虞故神出奇怪去縣百五里母陵道陽朔三年太守周君造陵道語昭郭周十里百一十步牆高丈二尺陵門四皆有屋水門二無錫城周二里十九步高二丈七尺門一樓四其郭周十一里百二十八步牆一丈七尺門皆有屋無錫歷山春申君時盛祠以牛立無錫塘去吳百二十里無錫湖者春申君治以為陂鑿語昭瀆以東到大田田名胥卑鑿胥卑下以南注大湖以寫西野去縣三十五里無錫西龍尾陵道者春申君初封吳所造也屬於無錫縣以奏吳北野胥主疁曲阿故為雲陽縣毗陵故為延陵吳季子所居毗陵縣南城故古淹君地也東南大冢淹君子女冢也去縣十八里吳所葬毗陵上湖中冢者延陵季子冢也去縣七十里上湖通上洲季子冢古名延陵墟蒸山南面夏駕大冢者越王不審名冢去縣三十五里秦餘杭山者越王棲吳夫差山也去縣五十里山有湖水近太湖夫差冢在猶亭西卑猶位越王使干戈人一累土以葬之近太湖去縣十七里三臺者太宰嚭逢同妻子死所在也去縣十七里太湖周三萬六千頃其千頃烏程也去縣五十里無錫湖周萬五千頃其一千三頃毗陵上湖也去縣五十里一名射貴湖尸湖周二千二百頃去縣百七十里小湖周千三百二十頃去縣百里耆湖周六萬五千頃去縣百二十里乘湖周五百頃去縣五里猶湖周三百二十頃去縣十七里語昭湖周二百八十頃去縣五十里作湖周百八十頃聚魚多物去縣五十五里昆湖周七十六頃一畝去縣一百七十五里一名隱湖湖王湖當問之丹湖當問之吳王故祠江漢於棠浦東江南為方牆以利朝夕水古太伯君吳到闔廬時絕胥女南小蜀山春申君客衛公子冢也去縣三十五里白石山故為胥女山春申君初封吳過更名為白石去縣四十里今太守舍者春申君所造後殿屋以為桃夏宮今宮者春申君子假君宮也前殿屋蓋地東西十七丈五尺南北十五丈七尺堂高四丈十霤高丈八尺殿屋蓋地東西十五丈南北十丈二尺七寸戶霤高丈二尺庫東鄉屋南北四十丈八尺上下戶各二南鄉屋東西六十四丈四尺上戶四下戶三西鄉屋南北四十二丈九尺上戶三下戶二凡百四十九丈一尺檐高五丈二尺霤高二丈九尺周一里二百四十一步春申君所造吳兩倉春申君所造西倉名曰均輸東倉周一里八步後燒更始五年太守李君治東倉為屬縣屋不成吳市者春申君所造闕兩城以為市在湖里吳諸里大閈春申君所造吳獄庭周三里春申君時造土山者春申君時治以為貴人冢次去縣十六里楚門春申君所造楚人從之故為楚門路丘大冢春申君客冢不立以道終之去縣十里春申君楚考烈王相也烈王死幽王立封春申君於吳三年幽王徵春申君為楚令尹春申君自使其子為假君治吳十一年幽王徵假君與春申君并殺之二君治吳凡十四年後十六年秦始皇并楚百越叛去更名大越為山陰也春申君姓黃名歇巫門外罘罳者春申君去吳假君所思處也去縣二十三里壽春東鳧陵亢者古諸侯王所葬也楚威王與越王無彊並威王後烈王子幽王後懷王也懷王子頃襄王也秦始皇滅之秦始皇造道陵南可通陵道到由拳塞同起馬塘湛以為陂治陵水道到錢唐越地通浙江秦始皇發會稽適戍卒治通陵高以南陵道縣相屬秦始皇帝三十七年壞諸侯郡縣城太守府大殿者秦始皇刻石所起也到更始元年太守許時燒六年十二月乙卯鑿官池東西十五丈七尺南北三十丈漢高帝封有功劉賈為荊王并有吳賈築吳市西城名曰定錯城屬小城北到平門丁將軍築治之十一年淮南王反殺劉賈後十年高皇帝更封兄子濞為吳王治廣陵并有吳立二十一年東渡之吳十日遂去立四十二年反西到陳留縣還奔丹陽從東歐越王弟夷烏將軍殺濞東歐王為彭澤王夷烏將軍今為平都王濞父字為仲匠門外信士里東廣平地者吳王濞時宗廟也太公高祖在西孝文在東去縣五里永光四年孝元帝時貢大夫請罷之桑里東今舍西者故吳所畜牛羊豕雞也名為牛宮今以為園漢文帝前九年會稽并故鄣郡太守治故鄣都尉治山陰前十六年太守治吳郡都尉治錢唐漢孝景帝五年五月會稽屬漢屬漢者始并事也漢孝武帝元封元年陽都侯歸義置由鍾由鍾初立去縣五十里漢孝武元封二年故鄣以為丹陽郡天漢五年四月錢唐浙江岑石不見到七年岑石復見, SBCK: ''}
