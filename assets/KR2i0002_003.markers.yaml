  - {type: variant, offset: 3189, length: 2, content: 并越, SBCK: 道興躍革亂補弊移風易俗改制作新海内畢貢天下承風湯以文聖此之謂也文王以務爭者紂為天下殘賊奢佚不顧邦政文王百里見紂無道誅殺無刑賞賜不當文王以聖事紂天下皆盡誠知其賢聖從之此謂文王以務爭也紂以惡刑爭文王行至聖以仁義爭此之謂也武王以禮信文王死九年天下八百諸侯皆一旦㑹}
