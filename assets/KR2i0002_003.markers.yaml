  - {type: variant, offset: 3176, length: 7, content: 徙瑯邪凡二百四, SBCK: 反國六年皆得士民之衆而欲伐吳於是乃使之維甲維甲者治甲系斷修作一循内矛赤雞稽繇者也越人謂人鎩也方舟航買儀塵者越人往如江也治須慮者越人謂船為須慮亟怒紛紛者怒貌也怒至士擊髙文者躍勇士也習之於夷夷海也宿之於萊萊野也致之於單單者堵也舜之時鯀不從令堯遭帝嚳之後亂洪水滔天堯使鯀治之九年弗能治堯七}
