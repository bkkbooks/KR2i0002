  - {type: variant, offset: 1556, length: 0, content: '', SBCK: 侵㬥失邦奔于翟三月得反國政敬賢明法率諸侯朝天子於是諸侯皆從天子乃尊此所謂晉公子重耳反國定天下齊公子小白亦反齊國而匡天下者齊大夫無知弑其君諸兒其子二人出奔公子紏奔魯魯者公子紏母之邦小白奔莒莒者小白母之􅀖也齊大臣鮑叔牙為報仇殺無知故興師之魯聘公子紏}
  - {type: page-break, offset: 1556, content: '', id: KR2i0002_SBCK_003-4b}
  - {type: variant, offset: 1556, length: 0, content: '', WYG: 侵暴失邦奔于翟三月得反國政敬賢明法率諸侯朝天子於是諸侯皆從天子乃尊此所謂晉公子重耳反國定天下齊公子小白亦反齊國而匡天下者齊大夫無知弑其君諸兒其子二人出奔公子糾奔魯魯者公子糾母之邦小白奔莒莒者小白母之邦也齊大臣鮑叔牙為報仇殺無知故興師之魯聘公子糾}
  - {type: page-break, offset: 1556, content: '', id: KR2i0002_WYG_003-4a, image: WYG0463/WYG0463-0087a.png}
  - {type: variant, offset: 1556, length: 0, content: '', krp: 侵㬥失邦奔于翟三月得反國政敬賢明法率諸侯朝天子於是諸侯皆從天子乃尊此所謂晉公子重耳反國定天下齊公子小白亦反齊國而匡天下者齊大夫無知弑其君諸兒其子二人出奔公子紏奔魯魯者公子紏母之邦小白奔莒莒者小白母之邦也齊大臣鮑叔牙為報仇殺無知故興師之魯聘公子紏}
  - {type: variant, offset: 1557, length: 1, content: 候, SBCK: 為君魯莊公不與莊公魯君也曰使齊以國事魯君與汝君不以國事魯我不與汝君於是鮑叔牙還師之莒取小白立爲齊君小白反國用管仲九合諸侯一匡天下故爲桓公此之謂也堯有不慈之名堯太子丹朱倨驕懷禽獸之心堯知不可用退丹朱而以天下傳舜此之謂堯有不慈之名舜有不孝之行舜親父假母母常殺舜舜去耕歴山三年大熟身自}
