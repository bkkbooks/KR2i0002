  - {type: variant, offset: 1492, length: 0, content: '', SBCK: 范蠡諫曰不可臣聞之天貴持􅄹持􅄹者言不失陰陽日月星辰之綱紀地貴定傾定傾者言地之長生丘陵平均無不得宜故曰地貴定傾人貴節事節事者言王者以下公卿大夫當調陰陽和順天下事來應之物來知之天下莫不盡其忠信從其政教謂之節事節事者至事之要也天道􅄹而不溢盛而不驕者言天生萬物以養天下蠉飛蠕動各得其性春生夏長秋收冬藏不失其常故曰天道􅄹而不溢盛而不驕者也地道施而不德勞而不矜其功者也言地生長五榖持養萬物功盈德博是}
