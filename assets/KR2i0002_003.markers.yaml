  - {type: variant, offset: 10, length: 0, content: '', SBCK: 年然後歸之昭公去至河用事曰天下誰能伐楚乎寡人願為前列楚聞之使囊瓦興師伐蔡昭公聞子胥在吳請救蔡子胥於是報闔廬曰蔡公南朝被羔裘囊瓦求之蔡公不與拘蔡公三年然後歸之蔡公至河曰天下誰能伐楚者乎寡人願為前列楚聞之使囊瓦興師伐蔡蔡非有罪楚為無道君若有憂中國之事意者時可矣闔廬於是使子胥興師救蔡而伐楚楚王已死子胥將卒六千人操鞭笞平王之墳曰}
