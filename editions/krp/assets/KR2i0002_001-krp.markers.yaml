  - {type: variant, offset: 2306, length: 1, content: 外, WYG: 書卷一漢袁康撰荆平王内}
  - {type: variant, offset: 2308, length: 3, content: 本事第, WYG: 昔者荆平王有臣伍子奢奢得罪於王且殺之其二子出走伍子尚奔吳伍子胥奔鄭王召奢而問之曰若召子孰來也子奢對曰王問臣對而畏死不對不知子之心者尚為人也仁且智來之必入胥為人也勇且智來必不入胥且奔吳邦君王必早閉而晏開胥將使邊境有大憂於是王即使使者召子尚於吳曰子父有罪子入則免之不入則殺之子胥聞之使人告子尚於吳吾聞荆平王召子子必毋入胥聞之入者窮出者報仇入者皆死是不智也死而不報父之仇是非勇也子尚對曰入則免父之死不入則不仁愛身之死絶父之望賢士不為也意不同謀不合子其居尚請入荆平王復使使者召子胥於鄭曰子入則免父死不入則殺之子胥介胄彀弓出見使者謝曰介胄之士固不拜矣}
  - {type: page-break, offset: 2308, content: '', id: KR2i0002_WYG_001-1b, image: WYG0463/WYG0463-0077b.png}
  - {type: page-break, offset: 2308, content: '', id: KR2i0002_WYG_001-2a, image: WYG0463/WYG0463-0077c.png}
