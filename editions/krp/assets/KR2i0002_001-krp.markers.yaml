  - {type: variant, offset: 306, length: 193, content: 何適乎使者還報荆平王王知子胥不入也殺子奢而并殺子尚子胥聞之即從横領上大山北望齊晉謂其舎人曰去此邦堂堂被山帶河其民重移侈一作於是乃南奔吳至江上見漁者曰來渡我漁者知其非常人也欲徃渡之恐人知之歌而徃過之曰日昭昭侵以施與子期甫蘆之碕子胥即從漁者之蘆碕日入漁者復歌徃曰心中目施子可渡河何為不出船到即載入船而伏半江而仰謂漁者曰子之姓為誰還得報子之厚德漁者曰縱荆邦之賊者我也報荆邦之仇者子也兩而不仁何, WYG: 云楚}
