  - {type: line-break, offset: 492, content: '', id: KR2i0002_SBCK_001-2b07}
  - {type: variant, offset: 500, length: 571, content: 問姓名為子胥即解其劒以與漁者曰吾先人之劒直百金請以與子也漁者曰吾聞荆平王有令曰得伍子胥者購之千金今吾不欲得荆平王之千金何以百金之劒為漁者渡于于斧之津乃發其簞飯清其壺漿而食曰亟食而去毋令追者及子也子胥曰諾子胥食已而去顧謂漁者曰掩爾壺漿無令之露漁者曰諾子胥行即覆船挾匕首自刎而死江水之中明無洩也子胥遂行至溧陽界中見一女子擊絮於瀬水之中子胥曰豈可得託食乎女子曰諾即發簞飯清其壺漿而食之子胥食已而去謂女子曰掩爾壺漿母令之露女子曰諾子胥行五步還顧女子自縱於瀬水之中而死子胥遂行至吳徒跣被髪乞於吳市三日市正疑之而道於闔廬曰市中有非常人徒跣被髪乞於呉市三日矣闔廬曰吾聞荆平王殺其臣伍子奢而非其罪其子子胥勇且智彼必經諸侯之邦可以報其父仇者王即使召子胥入吳王下階迎而唁數之曰吾知子非恒人也何素窮如此子胥跪而垂泣曰胥父無罪而平王殺之而并其子尚子胥遯逃出走唯大王可以歸骸骨者惟大王哀之呉王曰諾上殿與語三日三夜語無復者王乃號令邦中無貴賤長少有不聽子胥之教者猶不聽寡人也罪至死不赦子胥居吳三年大得吳衆闔廬將為之報仇子胥曰不可臣聞諸侯不為匹夫興師於是止其後荆將伐蔡子胥言之闔廬即使子胥救蔡而伐荆十五戰十五勝荆平王已死子胥將卒六千操鞭捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今此報子也之一作後子昭王臣司馬子其令尹子西歸相與計謀子胥不死又不入荆邦猶未得安為之奈何莫若求之而, WYG: 屈原}
