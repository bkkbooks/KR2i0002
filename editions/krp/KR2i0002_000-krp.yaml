front:
  text: 刻越絶書序
  hash: sha256:f74473a1da170b157449863ae9f9df5f05f113143c3cf112140434b3a96a7844
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0002_SBCK_000-1a}
body:
  text: 明進士白馬今西蜀張焦越絶名實群籍辨者非一咸無核焉書盖古而末攷按載多呉越事崇文摠目謂端木賜作尤非其文辯而竒慱而機藏知周信重讐明勇與國策譎權傾押者異獨陳成子篇愚間列國操緃成敗固逰士譚也據春秌哀公使賜正呉尋盟以尊魯斯後人襲事騁辭且將嫁于善言子貢微信焉慱材如子長史記亦云然也不知伯術耻稱聖門兹書及秦漢陳氏謂戰國人所爲漢人從而附益似矣賜也乎哉舊本自宋嘉定間刻于吾蜀䕫門再刻㑹嵇乃久遠不眞甞思廣傳黎陽盧少楩岀孟汝再家藏舊本于予頗爲完善二子好古慱文推㑹斯志爰校刻焉交成厥羙云爾嘉靖三十三年夏六月朔日序越絶復仇之書也子胥夫差以父之仇句踐以身之仇而皆非其道焉夫君天也君有臣而君殺之尚可仇乎故子胥鞭平王之墓爲不義闔廬之死夫差使人謂己曰而忘越王之殺而父乎則對曰不敢忘三年乃報越故夫椒之敗釋越而不誅爲不孝㑹稽之棲苦身焦思甞膽而食卒以㓕吴不知越實得罪於吴而吴之赦已也故其郤公孫雄之請爲不仁春秋書子胥之事曰吴入郢狄吳而諱楚也於夫椒之戰則不書葢不足乎書也於黄池之㑹書於越入吴狄越而咎吴也春秋之末復仇之事莫大於斯三者越絶實僃之有國有家者可以鑒觀焉隋經籍志越絕紀十六卷崇文總目則十五卷注司馬遷史記者屢引以爲據予紹熈壬子逰呉中得許氏本訛舛特甚嘉定壬申令餘杭又得陳正卿本乙亥官中都借本秘閣以三本互相參攷擇其通者從之乃麤可讀然猶未也念前所見者皆騰寫失真不板行則其傳不廣傳不廣則各私其所藏莫克是正遂刻之夔門以俟來者嘉定庚辰七月望日東徐丁黼書越絕卷終
