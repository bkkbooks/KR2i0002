body:
  text: 越絶書卷十一漢袁康撰外傳記寶劍昔者越王句踐有寶劍五聞於天下客有能相劍者名薛燭王召而問之曰吾有寶劍五請以示之薛燭對曰愚理不足以言大王請不得已乃召掌者王使取毫曺薛燭對曰毫曺非寶劍也夫寶劍五色並見莫能相勝豪曺已擅名矣非寶劍也王曰取巨闕薛燭曰非寶劍也寳劍者金鍚和銅而不離今巨闕已離矣非寶劍也王曰然巨闕初成之時吾坐於露壇之上宫人有四駕白鹿而過者車奔鹿驚吾引劍而指之四駕上飛揚不知其絶也穿銅釡絶鐵䥶胥中決如粢米故曰巨闕王取純鈎薛燭聞之忽如敗有頃懼如悟下階而深惟簡衣而坐望之手振拂揚其華捽如芙蓉始出觀其鈲爛如列星之行觀其光渾渾如水之溢於塘觀其斷巖巖如瑣石觀其才焕焕如冰釋此所謂純鈎耶王曰是也客有直之者有市之鄉二駿馬千匹千戸之都二可乎薛燭對曰不可當造此劍之時赤董之山破而出錫若耶之溪涸而出銅雨師掃灑雷公擊槖蛟龍捧鑪天帝裝炭太一下觀天精下之歐冶乃因天之精神悉其伎巧造為大刑三小刑二一曰湛盧二曰純鈎三曰勝邪四曰魚腸五曰巨闕吳王闔廬之時得其勝邪魚腸湛盧闔廬無道子女死殺生以送之湛盧之劍去之如水行秦過楚楚王卧而寤得吳王湛盧之劍將首魁漂而存焉秦王聞而求不得興師擊楚曰與我湛盧之劍還師去汝楚王不與時闔廬又以魚腸之劍刺吳王僚使披腸夷之甲三事闔廬使專諸為秦炙魚者引劍而刺之遂弑王僚此其小試於敵邦未見其大用於天下也今赤董之山已合若耶溪深而不測羣神不下歐冶子即死雖復傾城量金珠玉竭河猶不能得此一物有市之鄉二駿馬千匹千戸之都二何足言哉楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二子甲世而生天下未嘗有精誠上通天下為烈士寡人願齎邦之重寶皆以奉子因吳王請此二人作鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使人作鐵劍歐冶子干將鑿茨山洩其溪取鐵英作為鐵劍三枚一曰龍淵二曰泰阿三曰工布一作市畢成風胡子奏之楚王楚王見此三劍之精神大悦風胡子問之曰此三劍何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚王曰何為龍淵泰阿工布風胡子對曰欲知龍淵觀其狀如登髙山臨深淵欲知泰阿觀其鈲巍巍翼翼如流水之波欲知工布鈲從文起至脊而止如珠不可袵文若流水不絶晉鄭王聞而求之不得興師圍楚之城三年不解倉榖粟索庫無兵革左右羣臣賢士莫能禁止於是楚王聞之引泰阿之劍登城而麾之三軍破敗士卒迷惑流血千里猛獸歐瞻江水折揚晉鄭之頭畢白楚王於是大悦曰此劍威耶寡人力耶風胡子對曰劍之威也因大王之神楚王曰夫劍鐵耳固能有精神若此乎風胡子對曰時各有使然軒轅神農赫胥之時以石為兵斷樹木為宫室死而龍臧夫神聖主使然至黄帝之時以玉為兵以伐樹木為宫室鑿地夫玉亦神物也又遇聖主使然死而龍臧禹穴之時以銅為兵以鑿伊闕通龍門決江𨗳河東注於東海天下通平治為宫室豈非聖主之力哉當此之時作鐵兵威服三軍天下聞之莫敢不服此亦鐵兵之神大王有聖德楚王曰寡人聞命矣越絶書卷十一
