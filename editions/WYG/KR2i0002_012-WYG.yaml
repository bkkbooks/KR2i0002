  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0002_WYG_012-1a, image: WYG0463/WYG0463-0116a.png}
body:
  text: 越絶書卷十二漢袁康撰内經九術昔者越王句踐問大夫種曰吾欲伐吳奈何能有功乎大夫種對曰伐吳有九術王曰何謂九術對曰一曰尊天地事鬼神二曰重財幣一作帛以遺其君三曰貴糴粟槖以空其邦四曰遺之好美以為勞其志五曰遺之巧匠使起宫室髙臺盡其財疲其力六曰遺其諛臣使之易伐七曰彊其諫臣使之自殺八曰邦家富而備器九曰堅厲甲兵以承其弊故曰九者勿患戒口勿傳以取天下不難况於吳乎越王曰善於是作為策楯嬰以白璧鏤以黄金𩔖龍蛇而行者乃使大夫種獻之於吳曰東海役臣孤句踐使者臣種敢修下吏問於左右頼有天下之力竊為小殿有餘財載拜獻之大王吳王大悦申胥諫曰不可王勿受昔桀起靈門紂起鹿臺陰陽不和五榖不時天與之災邦家空虚遂以之亡大王受之是後必有災吳王不聽遂受之而起姑胥臺三年聚財五年乃成髙見二百里行路之人道死尸哭越乃飾美女西施鄭旦使大夫種獻之於吳王曰昔者越王句踐竊有天之遺西施鄭旦越邦洿下貧窮不敢當使下臣種載拜獻之大王吳王大悦申胥諫曰不可王勿受臣聞五色令人目不明五音令人耳不聰桀易湯而滅紂易周文而亡大王受之後必有殃胥聞越王句踐晝書不倦晦誦竟旦聚死臣數萬是人不死必得其願胥聞越王句踐服誠行仁聽諫進賢士是人不死必得其名胥聞越王句踐冬披毛裘夏披絺綌是人不死必為利害胥聞賢士邦之寶也美女邦之咎也夏亡於妹喜殷亡於妲己周亡於褒姒吳王不聽遂受其女以申胥為不忠而殺之越乃興師伐吳大敗之於秦餘杭山滅吳禽夫差而戮太宰嚭與其妻子外傳記軍氣夫聖人行兵上與天合德下與地合明中與人合心義合乃動見可乃取小人則不然以彊厭弱取利於危不知逆順快心於非故聖人獨知氣變之情以明勝負之道凡氣有五色青黄赤白黑色因有五變人氣變軍上有氣五色相連與天相抵此天應不可攻攻之無後其氣盛者攻之不勝軍上有赤色氣者徑抵天軍有應於天攻者其誅乃身軍上有青氣盛明從闕其本廣末鋭而來者此逆兵氣也為未可攻衰去乃可攻青氣在上其謀未定青氣在右將弱兵多青氣在後將勇榖少先大後小青氣在左將少卒多兵少軍罷青氣在前將暴其軍必來赤氣在軍上將謀未定其氣本廣末鋭而來者為逆兵氣衰去乃可攻赤氣在右將軍勇而兵少卒彊必以殺降赤氣在後將弱卒彊敵少攻之殺將其軍可降赤氣在右將勇敵多兵卒彊赤氣在前將勇兵少榖多卒少謀不來黄氣在軍上將謀未定其本廣末鋭而來者為逆兵氣衰去乃可攻黄氣在右將智而明兵多卒彊榖足而不可降黄氣在後將智而勇卒彊兵少榖少黄氣在左將弱卒少兵少榖亡攻之必傷黄氣在前將勇智卒多彊榖足而有多為一作焉不可攻也白氣在軍上將賢智而明卒威勇而彊其氣本廣末鋭而來者為逆兵氣衰去乃可攻白氣在右將勇而兵彊兵多榖亡白氣在後將仁而明卒少兵多榖少軍傷白氣在左將勇而彊卒多榖少可降白氣在前將弱卒亡榖少攻之可降黑氣在軍上將謀未定其氣本廣末鋭而來者為逆兵去乃可攻黑氣在右將弱卒少兵亡榖盡軍傷可不攻自降黑氣在後將勇卒彊兵少榖亡攻之殺將軍亡黑氣在左將智而勇卒少兵少攻之殺將其軍自降黑氣在前將智而明卒少榖盡可不攻自降故明將知氣變之形氣在軍上其謀未定其在右而低者欲為右伏兵之謀其氣在前而低者欲為前伏陣也其氣在後而低者欲為走兵陣也其氣陽者欲為去兵其氣在左而低者欲為左陣其氣間其軍欲有入邑右子胥相氣取敵大數其法如是軍無氣算於廟堂以知彊弱一五九西向吉東向敗亡無東二六十南向吉北向敗亡無北三七十一東向吉西向敗亡無西四八十二北向吉南向敗亡無南此其用兵日月數吉凶所避也舉兵無擊太嵗上物夘也始出各利以其四時制日是之謂也韓故治今京兆郡角亢也鄭故治角亢也燕故治今上漁陽右北平遼東莫郡尾箕也越故治今大越山陰南斗也呉故治西江都牛湏女也齊故治臨菑今濟北平原北海郡菑川遼東城陽虚危也衛故治濮陽今廣陽韓郡營室璧也魯故治太山東温周固水今魏東奎婁也梁故治今濟陰山陽濟北東郡畢也晉故治今代郡常山中山河間廣平郡觜也秦故治雍今内史也巴郡漢中隴西定襄太原安邑東井也韓故治雒今河南郡栁七星張也楚故治郢今南郡南陽汝南淮陽六安九江廬江豫章長沙翼軫也趙故治邯鄲今遼東隴西北地上郡鴈門北郡清河參也越絶書卷十二
