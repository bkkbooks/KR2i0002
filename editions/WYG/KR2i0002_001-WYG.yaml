seq: 1
front:
  text: 姓名其云以去為姓得衣
  hash: sha256:07da2b130a55087ef19315f724a0452790b572dc0de7ca490dc934b3dc866ad2
body:
  text: 乃成是袁字也厥名有米覆之以庚是康字也禹來東征死葬其疆是㑹稽人也又云文詞屬定自於邦賢以口為姓承之以天是呉字也又云楚相屈原與之同名是平字也然則此書為㑹稽袁康所作同郡呉平所定也王充論衡按書篇曰東畨鄒伯竒臨淮袁太伯袁文術㑹稽呉君高周長生之輩位雖不至公卿誠能知之囊橐文雅之英雄也觀伯竒之元思太伯之易童句案童疑作章文術之咸銘君高之越紐録長生之洞厯劉子政揚子雲不能過也所謂呉君高殆即平字所謂越紐録殆即此書歟楊慎丹鉛録胡侍珍珠船田藝衡留青日札皆有是説核其文義一一脗合隋唐志皆云子貢作非其實矣其文縱横曼衍與呉越春秋相𩔖而博麗奥衍則過之中如計倪内經軍氣之𩔖多雜術數家言皆漢人専門之學非後來所能依托也此本與呉越春秋皆大徳丙午紹興路所刋卷末一跋諸本所無惟申明復仇之義不著姓名詳其詞意或南宋人所題耶鄭明選秕言引文選七命註引越絶書大翼一艘十丈中翼九丈六尺小翼九丈又引王鏊震澤長語引越絶書風起震方云云謂今本皆無此語疑更有全書惜未之見案崇文總目稱越絶書舊有内記八外𫝊十七今文題闕舛裁二十篇是此書在北宋之初已佚五篇選註所引葢佚篇之文王鏊所稱亦他書所引佚篇之文以為此本之外更有全書則明選誤矣别有續越絶書二卷上卷曰内𫝊本事呉内𫝊徳序記子游内經外𫝊越絶後語西施鄭旦外𫝊下卷曰越外𫝊雜事别𫝊變越上别𫝊變越下經内雅琴考序𫝊後記朱彛尊友善考謂為錢􅠒偽撰詭云得之石匣中􅠒與彛尊友善所言當實今未見𫝊本其偽妄亦不待辨以其續此書而作又即托於撰此書之人恐其幸而或𫝊久且亂真又恐其或不能𫝊而好異者耳聞其説且疑此書之真有續編故附訂其偽於此釋來者之惑焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書越絶書漢袁康撰外傳本事問曰何謂越絶越者國之氏也何以言之按春秋序齊魯皆以國為氏姓是以明之絶者絶也謂句踐時也當是之時齊將伐魯孔子恥之故子貢説齊以安魯子貢一出亂齊破呉興晉疆越其後賢者辯士見夫子作春秋而畧吳越又見子貢與聖人相去不逺脣之與齒表之與裏葢要其意覽史記而述其事也問曰何不稱越經書記而言絶乎曰不也絶者絶也句踐之時天子㣲弱諸侯皆叛於是句踐抑彊扶弱絶惡反之於善取舎以道沛歸於宋浮陵以付楚臨沂開陽復之於魯中國侵伐因斯衰止以其誠在於内威發於外越專其功故曰越故作此者貴其内能自約外能絶人也賢者所述不可斷絶故不為記明矣問曰桓公九合諸侯一匡天下任用賢者誅服彊楚何不言齊絶乎曰桓公中國兵彊霸世之後威凌諸侯服彊楚此正宜耳夫越王句踐東垂海濱夷狄文身躬而自苦任用賢臣轉死為生以敗為成越伐彊吳尊事周室行霸琅邪躬自省約率道諸侯貴其始微終能以霸故與越専其功而有之也問曰然越専其功而有之何不第一而卒本吳太伯為曰小越而大吳小越大吳奈何曰吳有子胥之教霸世甚久北陵齊楚諸侯莫敢叛者乗薛許邾婁莒旁轂趨走越王句踐屬芻莝養馬諸侯從之若果中之李反邦七年焦思苦身克已自責任用賢人越伐彊吳行霸諸侯故不使越第一者欲以貶大吳顯弱越之功也問曰吳亡而越興在天與在人乎皆人也夫差失道越亦賢矣濕易雨饑易助曰何以知獨在人乎子貢與夫子坐告夫子曰太宰死夫子曰不死也如是者再子貢再拜而問何以知之夫子曰天生宰嚭者欲以亡吳吳今未亡宰何病乎後人來言不死聖人不妄言是以明知越霸矣何以言之曰種見蠡之時相與謀道東南有霸兆不如往仕相要東游入越而止賢者不妄言以是知之焉問曰越絶誰所作吳越賢者所作也當此之時見夫子刪書作春秋定王制賢者嗟歎決意覽史記成就其事問曰作事欲以自著今但言賢者不言姓字何曰是人有大雅之才直道一國之事不見姓名小之辭也或以為子貢所作當挾四方不當獨在吳越其在吳越亦有因矣此時子貢為魯使或至齊或至吳其後道事以吳越為喻國人承述故直在呉越也當是之時有聖人教授六藝刪定五經七十二子養徒三千講習學問魯之闕門越絶小藝之文固不能布於四方焉有誦述先聖賢者所作未足自稱載列姓名直斥以身者也一説葢是子胥所作也夫人情泰而不作窮則怨恨怨恨則作猶詩人失職怨恨憂嗟作詩也子胥懷忠不忍君沈惑於讒社稷之傾絶命危邦不顧長生切切爭諫終不見聽憂至患致怨恨作文不侵不差抽引本末明已無過終不遺力誠能極智不足以身當之嫌於求譽是以不著姓名直斥以為身者也後人述而説之乃稍成中外篇焉問曰或經或傳或内或外何謂曰經者論其事傳者道其意外者非一人所作頗相覆載或非其事引𩔖以託意説之者見夫子刪詩書就經易亦知小藝之復重又各辯士所述不可斷絶小道不通偏有所期明說者不専故刪定復重以為中外篇一作焉欽定四庫全書越絶書卷一漢袁康撰荆平王内傳昔者荆平王有臣伍子奢奢得罪於王且殺之其二子出走伍子尚奔吳伍子胥奔鄭王召奢而問之曰若召子孰來也子奢對曰王問臣對而畏死不對不知子之心者尚為人也仁且智來之必入胥為人也勇且智來必不入胥且奔吳邦君王必早閉而晏開胥將使邊境有大憂於是王即使使者召子尚於吳曰子父有罪子入則免之不入則殺之子胥聞之使人告子尚於吳吾聞荆平王召子子必毋入胥聞之入者窮出者報仇入者皆死是不智也死而不報父之仇是非勇也子尚對曰入則免父之死不入則不仁愛身之死絶父之望賢士不為也意不同謀不合子其居尚請入荆平王復使使者召子胥於鄭曰子入則免父死不入則殺之子胥介胄彀弓出見使者謝曰介胄之士固不拜矣一作也請有道於使者王以奢為無罪赦而蓄之其子又何適乎使者還報荆平王王知子胥不入也殺子奢而并殺子尚子胥聞之即從横嶺上太山北望齊晉謂其舎人曰去此邦堂堂被山帶河其民重移一作侈於是乃南奔吳至江上見漁者曰來渡我漁者知其非常人也欲往渡之恐人知之歌而往過之曰日昭昭侵以施與子期甫蘆之碕子胥即從漁者之蘆碕日入漁者復歌往曰心中目施子可渡河何為不出船到即載入船而伏半江而仰謂漁者曰子之姓為誰還得報子之厚德漁者曰縱荆邦之賊者我也報荆邦之仇者子也兩而不仁何相問姓名為子胥即解其劒以與漁者曰吾先人之劒直百金請以與子也漁者曰吾聞荆平王有令曰得伍子胥者購之千金今吾不欲得荆平王之千金何以百金之劍為漁者渡於于斧之津乃發其簞飯清其壺漿而食曰亟食而去毋令追者及子也子胥曰諾子胥食已而去顧謂漁者曰掩爾壺漿無令之露漁者曰諾子胥行即覆船挾匕首自刎而死江水之中明無洩也子胥遂行至溧陽界中見一女子擊絮於瀬水之中子胥曰豈可得託食乎女子曰諾即發簞飯清其壺漿而食之子胥食已而去謂女子曰掩爾壺漿毋令之露女子曰諾子胥行五步還顧女子自縱於瀬水之中而死子胥遂行至吳徒跣被髪乞於吳市三日市正疑之而道於闔廬曰市中有非常人徒跣被髪乞於呉市三日矣闔廬曰吾聞荆平王殺其臣伍子奢而非其罪其子子胥勇且智彼必經諸侯之邦可以報其父仇者王即使召子胥入吳王下階迎而唁數之曰吾知子非恒人也何素窮如此子胥跪而垂泣曰胥父無罪而平王殺之而并其子尚子胥遯逃出走唯大王可以歸骸骨者惟大王哀之呉王曰諾上殿與語三日三夜語無復者王乃號令邦中無貴賤長少有不聽子胥之教者猶不聽寡人也罪至死不赦子胥居吳三年大得吳衆闔廬將為之報仇子胥曰不可臣聞諸侯不為匹夫興師於是止其後荆將伐蔡子胥言之闔廬即使子胥救蔡而伐荆十五戰十五勝荆平王已死子胥將卒六千操鞭捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今此報子也一作之後子昭王臣司馬子其令尹子西歸相與計謀子胥不死又不入荆邦猶未得安為之奈何莫若求之而與之同邦乎昭王乃使使者報子胥於吳曰昔者吾先人殺子之父而非其罪也寡人尚少未有所識也今子大夫報寡人也特甚然寡人亦不敢怨子今子大夫何不來歸子故墳墓丘冡為我邦雖小與子同有之民雖少與子同使之子胥曰以此為名名即章以此為利利即重矣前為父報仇後求其利賢者不為也父已死子食其禄非父之義也使者遂還乃報荆昭王曰子胥不入荆邦明矣越絶書卷一
