body:
  text: 越絕外傳記寶劍第十三昔者越王句踐有寶劍五聞於天下客有能相劍者名薛燭王召而問之曰吾有寶劍五請以示之薛燭對曰愚理不足以言大王請不得已乃召掌者王使取毫曹薛燭對曰豪曹非寶劍也夫寶劍五色並見莫能相勝豪曹已擅名矣非寶劍也王曰取巨闕薛燭曰非寶劍也寶劍者金錫和銅而不離今巨闕已離矣非寶劍也王曰然巨闕初成之時吾坐於露壇之上宮人有四駕白鹿而過者車奔馬驚吾引劍而指之四駕上飛揚不知其絕也穿銅釜絕鐵䥶胥中決如粢米故曰巨闕王取純鈞薛燭聞之忽如敗有頃懼如悟下階而深惟簡衣而坐望之手振拂揚其華捽如芙蓉始出觀其釽爛爛如列星之行觀其光渾渾如水之將溢於溏觀其斷巖巖如瑣石觀其文煥煥如冰之將釋此所謂純鈞耶王曰是也客有直之者有市之鄉三駿馬千疋千戶之都二可乎薛燭對曰不可當造此劍之時赤堇之山破而出錫若耶之溪涸而出銅雨師掃灑雷公擊橐蛟龍捧鑪天帝裝炭太一下觀天精下之歐冶乃因天之精神悉其伎巧造為大刑三小刑二一曰湛盧二曰純鈞三曰勝邪四曰魚腸五曰巨闕吳王闔廬之時得其勝邪魚腸湛盧闔廬無道子女死殺生以送之湛盧之劍去之如水行秦過楚楚王臥而窹得吳王湛盧之劍將首魁漂而存焉秦王聞而求之不得興師擊楚曰與我湛盧之劍還師去汝楚王不與時闔廬又以魚腸之劍刺吳王僚使披腸夷之甲三事闔廬使專諸為奏炙魚者引劍而刺之遂弒王僚此其小試於敵邦未見其大用於天下也今赤堇之山已合若耶之溪深而不測群神不下歐冶子即死雖復傾城量金珠玉竭河猶不能得此一物有市之鄉三駿馬千疋千戶之都二何足言哉楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二人甲世而生天下未嘗有精誠上通天下為烈士寡人願齎邦之重寶皆以奉子因吳王請此二人作為鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使之作為鐵劍歐冶子干將鑿茨山洩其溪取鐵英作為鐵劍三枚一曰龍淵二曰泰阿三曰工布畢成風胡子奏之楚王楚王見此三劍之精神大悅見風胡子問之曰此三劍何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚王曰何謂龍淵泰阿工布風胡子對曰欲知龍淵觀其狀如登高山臨深淵欲知泰阿觀其釽巍巍翼翼如流水之波欲知工布觀其釽從文間起至脊而止如珠而不可衽文若流水而不絕晉鄭王聞而求之不得興師圍楚之城三年不解倉穀粟索庫無兵革左右群臣賢士莫能禁止於是楚王聞之引泰阿之劍登城而麾之三軍破敗士卒迷惑流血千里猛獸歐瞻江水折揚晉鄭之頭畢白楚王於是大悅曰此劍威耶寡人力耶風胡子對曰劍之威也因大王之神楚王曰夫劍鐵耳固能有精神若此乎風胡子對曰時各有使然軒轅神農赫胥之時以石為兵斷樹木為宮室死而龍臧夫神聖主使然至黃帝之時以玉為兵以伐樹木為宮室鑿地夫玉亦神物也又遇聖主使然死而龍臧禹穴之時以銅為兵以鑿伊闕通龍門決江導河東注於東海天下通平治為宮室豈非聖主之力哉當此之時作鐵兵威服三軍天下聞之莫敢不服此亦鐵兵之神大王有聖德楚王曰寡人聞命矣
