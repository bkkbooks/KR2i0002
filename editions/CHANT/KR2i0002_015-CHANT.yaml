body:
  text: 越絕外傳記軍氣第十五夫聖人行兵上與天合德下與地合明中與人合心義合乃動見可乃取小人則不然以彊厭弱取利於危不知逆順快心於非故聖人獨知氣變之情以明勝負之道凡氣有五色青黃赤白黑色因有五變人氣變軍上有氣五色相連與天相抵此天應不可攻攻之無後其氣盛者攻之不勝軍上有赤色氣者徑抵天軍有應於天攻者其誅乃身軍上有青氣盛明從其本廣末銳而來者此逆兵氣也為未可攻衰去乃可攻青氣在軍上其謀未定青氣在右將弱兵多青氣在後將勇穀少先大後小青氣在左將少卒多兵少軍罷青氣在前將㬥其軍必來赤氣在軍上將謀未定其氣本廣末銳而來者為逆兵氣衰去乃可攻赤氣在右將軍勇而兵少卒彊必以殺降赤氣在後將弱卒彊敵少攻之殺將其軍可降赤氣在左將勇敵多兵卒彊赤氣在前將勇兵少穀多卒少謀不來黃氣在軍上將謀未定其本廣末銳而來者為逆兵氣衰去乃可攻黃氣在右將智而明兵多卒彊穀足而不可降黃氣在後將智而勇卒彊兵少穀少黃氣在左將弱卒少兵少穀亡攻之必傷黃氣在前將勇智卒多彊穀足而有多為不可攻也白氣在軍上將賢智而明卒威勇而彊其氣本廣末銳而來者為逆兵氣衰去乃可攻白氣在右將勇而卒彊兵多穀亡白氣在後將仁而明卒少兵多穀少軍傷白氣在左將勇而彊卒多穀少可降白氣在前將弱卒亡穀少攻之可降黑氣在軍上將謀未定其氣本廣末銳而來者為逆兵氣衰去乃可攻黑氣在右將弱卒少兵亡穀盡軍傷可不攻自降黑氣在後將勇卒彊兵少穀亡攻之殺將軍亡黑氣在左將智而勇卒少兵少攻之殺將其軍自降黑氣在前將智而明卒少穀盡可不攻自降故明將知氣變之形氣在軍上其謀未定其氣在右而低者欲為右伏兵之謀其氣在前而低者欲為前伏陣也其氣在後而低者欲為走兵陣也其氣陽者欲為去兵其氣在左而低者欲為左陣其氣間其軍欲有入邑右子胥相氣取敵大數其法如是軍無氣筭於廟堂以知彊弱一五九西向吉東向敗亡無東二六十南向吉北向敗亡無北三七十一東向吉西向敗亡無西四八十二北向吉南向敗亡無南此其用兵月日數吉凶所避也舉兵無擊大歲上物卯也始出各利以其四時制日是之謂也韓故治今京兆郡角亢也鄭故治角亢也燕故治今上漁陽右北平遼東莫郡尾箕也越故治今大越山陰南斗也吳故治西江都牛須女也齊故治臨菑今濟北平原北海郡菑川遼東城陽虛危也衛故治濮陽今廣陽韓郡營室壁也魯故治太山東溫周固水今魏東奎婁也梁故治今濟陰山陽濟北東郡畢也晉故治今代郡常山中山河間廣平郡觜也秦故治雍今內史也巴郡漢中隴西定襄太原安邑東井也周故治雒今河南郡柳七星張也楚故治郢今南郡南陽汝南淮陽六安九江廬江豫章長沙翼軫也趙故治邯鄲今遼東隴西北地上郡鴈門北郡清河參也
