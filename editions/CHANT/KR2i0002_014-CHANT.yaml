body:
  text: 越絕內經九術第十四昔者越王句踐問大夫種曰吾欲伐吳柰何能有功乎大夫種對曰伐吳有九術王曰何謂九術對曰一曰尊天地事鬼神二曰重財幣以遺其君三曰貴糴粟槀以空其邦四曰遺之好美以為勞其志五曰遺之巧匠使起宮室高臺以盡其財疲其力六曰遺其諛臣使之易伐七曰彊其諫臣使之自殺八曰邦家富而備利器九曰堅厲甲兵以承其弊故曰九者勿患戒口勿傳以取天下不難而況於吳乎越王曰善於是作為策楯嬰以白璧鏤以黃金類龍蛇而行者乃使大夫種獻之於吳王曰東海役臣孤句踐使者臣種敢修下吏問於左右賴有天下之力竊為小殿有餘財再拜獻之大王吳王大悅申胥諫曰不可王勿受也昔者桀起靈門紂起鹿臺陰陽不和五穀不熟寒暑不時天與之災邦國空虛遂以之亡大王受之是後必有災吳王不聽遂受之而起姑胥之臺三年聚材五年乃成高見二百里行路之人道死巷哭越王乃飾美女西施鄭旦使大夫種獻之於吳王曰昔者越王句踐竊有天之遺西施鄭旦越邦洿下貧窮不敢當使下臣種再拜獻之大王吳王大悅申胥諫曰不可王勿受也臣聞五色令人目不明五音令人耳不聰昔桀易湯而滅紂易周文王而亡大王受之後必有殃胥聞越王句踐晝書不倦晦誦竟夜且聚死臣數萬是人不死必得其願胥聞越王句踐服誠行仁聽諫進賢士是人不死必得其名胥聞越王句踐冬披毛裘夏披絺綌是人不死必為利害胥聞賢士邦之寶也美女邦之咎也夏亡於末喜殷亡於妲己周亡於褒姒吳王不聽遂受其女以申胥為不忠而殺之越乃興師伐吳大敗之於秦餘杭山滅吳禽夫差而戮太宰嚭與其妻子
