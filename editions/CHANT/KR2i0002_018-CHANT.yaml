seq: 18
body:
  text: 越絕德序外傳記第十八昔者越王句踐困於會稽歎曰我其不伯乎欲殺妻子角戰以死蠡對曰殆哉王失計也愛其所惡且吳王賢不離不肖不去若卑辭以地讓之天若棄彼彼必許句踐曉焉曰豈然哉遂聽能以勝越王句踐既得平吳春祭三江秋祭五湖因以其時為之立祠垂之來世傳之萬載鄰邦樂德以來取足范蠡內視若盲反聽若聾度天關涉天機後衽天人前帶神光當是時言之者其去甚微甚密王已失之矣然終難復見得於是度兵徐州致貢周室元王以之中興號為州伯以為專句踐之功非王室之力是時越行伯道沛歸於宋浮陵以付楚臨沂開陽復之於魯中邦侵伐因斯衰止以其誠在於內威發於外越專其功故曰越絕是也故傳曰桓公迫於外子能以覺悟句踐執於會稽能因以伯堯舜雖聖不能任狼致治管仲能知人桓公能任賢蠡善慮患句踐能行焉臣主若斯其不伯得乎易曰君臣同心其利斷金此之謂也吳越之事煩而文不喻聖人略焉賢者垂意深省厥辭觀斯智愚夫差狂惑賊殺子胥句踐至賢種曷為誅范蠡恐懼逃於五湖蓋有說乎夫吳知子胥賢猶昏然誅之傳曰人之將死惡聞酒肉之味邦之將亡惡聞忠臣之氣身死不為醫邦亡不為謀還自遺災蓋木土水火不同氣居此之謂也種立休功其後厥過自伐句踐知其仁也不知其信見種為吳通越稱君子不危窮不滅服以忠告句踐非之見乎顏色范蠡因心知意策問其事卜省其辭吉耶凶耶兆言其災夫子見利與害去於五湖蓋謂知其道貴微而賤獲易曰知幾其神乎道以不害為左傳曰知始無終厥道必窮此之謂也子胥賜劍將自殺歎曰嗟乎眾曲矯直一人固不能獨立吾挾弓矢以逸鄭楚之間自以為可復吾見凌之仇乃先王之功想得報焉自致於此吾先得榮後僇者非智衰也先遇明後遭險君之易移也已矣生不遇時復何言哉此吾命也亡將安之莫如早死從吾先王於地下蓋吾之志也吳王將殺子胥使馮同徵之胥見馮同知為吳王來也洩言曰王不親輔弼之臣而親眾豕之言是吾命短也高置吾頭必見越人入吳也我王親為禽哉捐我深江則亦已矣胥死之後吳王聞以為妖言甚咎子胥王使人捐於大江口勇士執之乃有遺響發憤馳騰氣若奔馬威凌萬物歸神大海彷彿之間音兆常在后世稱述蓋子胥水僊也子胥挾弓去楚唯夫子獨知其道事世有退至今實之實秘文之事深述厥兆徵為其戒齊人歸女其後亦重各受一篇文辭不既經傳外章輔發其類故聖人見微知著覩始知終由此觀之夫子不王可知也恭承嘉惠述暢往事夫子作經攬史記憤懣不泄兼道事後覽承傳說厥意以為周道不敝春秋不作蓋夫子作春秋記元於魯大義立微言屬五經六藝為之檢式垂意於越以觀枉直陳其本末抽其統紀章決句斷各有終始吳越之際夫差弊矣是之謂也故觀乎太伯能知聖賢之分觀乎荊平能知信勇之變觀乎吳越能知陰謀之慮觀乎計兒能知陰陽消息之度觀乎請糴能知人之使敵邦賢不肖觀乎九術能知取人之真轉禍之福觀乎兵法能知卻敵之路觀乎陳恒能知古今相取之術觀乎德敘能知忠直所死狂懜通拙經百八章上下相明齊桓興盛執操以同管仲達于霸紀范蠡審乎吉凶終始夫差不能邦之治察乎馮同宰嚭能知諂臣之所移哀彼離德信不用內痛子胥忠諫邪君反受其咎夫差誅子胥自此始亡之謂也
