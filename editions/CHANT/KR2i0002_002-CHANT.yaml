body:
  text: 越絕荊平王內傳第二昔者荊平王有臣伍子奢奢得罪於王且殺之其二子出走伍子尚奔吳伍子胥奔鄭王召奢而問之曰若召子孰來也子奢對曰王問臣對而畏死不對不知子之心者尚為人也仁且智來之必入胥為人也勇且智來必不入胥且奔吳邦君王必早閉而晏開胥將使邊境有大憂於是王即使使者召子尚於吳曰子父有罪子入則免之不入則殺之子胥聞之使人告子尚於吳吾聞荊平王召子子必毋入胥聞之入者窮出者報仇入者皆死是不智也死而不報父之讎是非勇也子尚對曰入則免父之死不入則不仁愛身之死絕父之望賢士不為也意不同謀不合子其居尚請入荊平王復使使者召子胥於鄭曰子入則免父死不入則殺之子胥介冑彀弓出見使者謝曰介冑之士固不拜矣請有道於使者王以奢為無罪赦而蓄之其子又何適乎使者還報荊平王王知子胥不入也殺子奢而并殺子尚子胥聞之即從橫嶺上大山北望齊晉謂其舍人曰去此邦堂堂被山帶河其民重移於是乃南奔吳至江上見漁者曰來渡我漁者知其非常人也欲往渡之恐人知之即歌而往過之曰日昭昭侵以施與子期甫蘆之碕子胥即從漁者之蘆碕日入漁者復歌往曰心中有悲日已施子可渡河何為不出船到即載入船而伏半江而仰謂漁者曰子之姓為誰還得報子之厚德漁者曰縱荊邦之賊者我也報荊邦之仇者子也兩而不仁何相問姓名為子胥即解其劍以與漁者曰吾先人之劍直百金請以與子也漁者曰吾聞荊平王有令曰得伍子胥者購之千金今吾不欲得荊平王之千金何以百金之劍為漁者渡于于斧之津乃發其簞飯清其壺漿而食之曰亟食而去毋令追者及子也子胥曰諾子胥食已而去顧謂漁者曰掩爾壺漿無令之露漁者曰諾子胥行即覆船挾匕首自刎而死江水之中明無洩也子胥遂行至溧陽界中見一女子擊絮於瀨水之中子胥曰豈可得託食乎女子曰諾即發簞飯清其壺漿而食之子胥食已而去謂女子曰掩爾壺漿毋令之露女子曰諾子胥行五步還顧女子自縱於瀨水之中而死子胥遂行至吳徒跣被髮乞於吳市三日市正疑之而道於闔廬曰市中人有非常人徒跣被髮乞於吳市三日矣闔廬曰吾聞荊平王殺其臣伍子奢而非其罪其子子胥勇且智彼必經諸侯之邦可以報其父仇者王即使召子胥入吳王下階迎而唁數之曰吾知子非恒人也何素窮如此子胥跪而垂泣曰胥父無罪而平王殺之而并其子尚子胥遯逃出走唯大王可以歸骸骨者惟大王哀之吳王曰諾上殿與語三日三夜語無復者王乃號令邦中無貴賤長少有不聽子胥之教者猶不聽寡人也罪至死不赦子胥居吳三年大得吳眾闔廬將為之報仇子胥曰不可臣聞諸侯不為匹夫興師於是止其後荊將伐蔡子胥言之闔廬即使子胥救蔡而伐荊十五戰十五勝荊平王已死子胥將卒六千操鞭捶笞平王之墓而數之曰昔者吾先人無罪而子殺之今此報子也後子昭王臣司馬子期令尹子西歸相與計謀子胥不死又不入荊邦猶未得安為之柰何莫若求之而與之同邦乎昭王乃使使者報子胥於吳曰昔者吾先人殺子之父而非其罪也寡人尚少未有所識也今子大夫報寡人也特甚然寡人亦不敢怨子今子大夫何不來歸子故墳墓丘冢為我邦雖小與子同有之民雖少與子同使之子胥曰以此為名名即章以此為利利即重矣前為父報仇後求其利賢者不為也父已死子食其祿非父之義也使者遂還乃報荊昭王曰子胥不入荊邦明矣
