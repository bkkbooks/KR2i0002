body:
  text: 越絕外傳記吳王占夢第十二昔者吳王夫差之時其民殷眾禾稼登熟兵革堅利其民習於鬭戰闔廬剬子胥之教行有日發有時道於姑胥之門晝臥姑胥之臺覺窹而起其心惆悵如有所悔即召太宰而占之曰向者晝臥夢入章明之宮入門見兩䥶炊而不蒸見兩黑犬嘷以北嘷以南見兩鏵倚吾宮堂見流水湯湯越吾宮牆見前園橫索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人之心所從太宰嚭對曰善哉大王之興師伐齊也夫章明者伐齊克天下顯明也見兩䥶炊而不蒸者大王聖德氣有餘也見兩黑犬嘷以北嘷以南者四夷已服朝諸侯也兩鏵倚吾宮堂者夾田夫也見流水湯湯越吾宮牆獻物已至則有餘也見前園橫索生樹桐者樂府吹巧也見後房鍛者扶挾鼓小震者宮女鼓樂也吳王大悅而賜太宰嚭雜繒四十疋王心不已召王孫駱而告之對曰臣智淺能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子王孫聖為人幼而好學長而憙遊博聞彊識通於方來之事可占大王所夢臣請召之吳王曰諾王孫駱移記曰今日壬午左校司馬王孫駱受教告東掖門亭長公孫聖吳王晝臥覺窹而心中惆悵也如有悔記到車馳詣姑胥之臺聖得記發而讀之伏地而泣有頃不起其妻大君從旁接而起之曰何若子性之大也希見人主卒得急記流涕不止公孫聖仰天嘆曰嗚呼悲哉此固非子之所能知也今日壬午時加南方命屬蒼天不可逃亡伏地而泣者不能自惜但吳王諛心而言師道不明正言直諫身死無功大君曰汝彊食自愛慎勿相忘伏地而書既成篇即與妻把臂而決涕泣如雨上車不顧遂至姑胥之臺謁見吳王吳王勞曰越公弟子公孫聖也寡人晝臥姑胥之臺夢入章明之宮入門見兩䥶炊而不蒸見兩黑犬嘷以北嘷以南見兩鏵倚吾宮堂見流水湯湯越吾宮牆見前園橫索生樹桐見後房鍛者扶挾鼓小震子為寡人精占之吉則言吉凶則言凶無諛寡人心所從公孫聖伏地有頃而起仰天嘆曰悲哉夫好船者溺好騎者墮君子各以所好為禍諛讒申者師道不明正言切諫身死無功伏地而泣者非自惜因悲大王夫章者戰不勝走傽傽也明者去昭昭就冥冥也見兩䥶炊而不蒸者王且不得火食也見兩黑犬嘷以北嘷以南者大王身死魂魄惑也見兩鏵倚吾宮堂者越人入吳邦伐宗廟掘社稷也見流水湯湯越吾宮牆者大王宮堂虛也前園橫索生樹桐者桐不為器用但為甬當與人俱葬也後房鍛者鼓小震者大息也王毋自行使臣下可矣太宰嚭王孫駱惶怖解冠幘肉袒而謝吳王忿聖言不祥乃使其身自受其殃王乃使力士石番以鐵杖擊聖中斷之為兩頭聖仰天嘆曰蒼天知冤乎直言正諫身死無功令吾家無葬我提我山中後世為聲響吳王使人提於秦餘杭之山虎狼食其肉野火燒其骨東風數至飛揚汝灰汝更能為聲哉太宰嚭前再拜曰逆言已滅讒諛已亡因酌行觴時可以行矣吳王曰諾王孫駱為左校司馬太宰嚭為右校司馬王從騎三千旌旗羽蓋自處中軍伐齊大剋師兵三月不去過伐晉晉知其兵革之罷倦糧食盡索興師擊之大敗吳師涉江流血浮尸者不可勝數吳王不忍率其餘兵相將至秦餘杭之山饑餓足行乏糧視瞻不明據地飲水持籠稻而餐之顧謂左右曰此何名群臣對曰是籠稻也吳王曰悲哉此公孫聖所言王且不得火食太宰嚭曰秦餘杭山西坂閒燕可以休息大王亟飡而去尚有十數里耳吳王曰吾嘗戮公孫聖於斯山子試為寡人前呼之即尚在耶當有聲響太宰嚭即上山三呼聖三應吳王大怖足行屬腐面如死灰色曰公孫聖令寡人得邦誠世世相事言未畢越王追至兵三圍吳大夫種處中范蠡數吳王曰王有過者五寧知之乎殺忠臣伍子胥公孫聖胥為人先知忠信中斷之入江聖正言直諫身死無功此非大過者二乎夫齊無罪空復伐之使鬼神不血食社稷廢蕪父子離散兄弟異居此非大過者三乎夫越王句踐雖東僻亦得繫於天皇之位無罪而王恒使其芻莝秩馬比於奴虜此非大過者四乎太宰嚭讒諛佞諂斷絕王世聽而用之此非大過者五乎吳王曰今日聞命矣越王撫步光之劍杖屈盧之矛瞋目謂范蠡曰子何不早圖之乎范蠡曰臣不敢殺主臣存主若亡今日遜敬天報微功越王謂吳王曰世無千歲之人死一耳范蠡左手持鼓右手操枹而鼓之曰上天蒼蒼若存若亡何須軍士斷子之頸挫子之骸不亦繆乎吳王曰聞命矣以三寸之帛冥吾兩目使死者有知吾慚見伍子胥公孫聖以為無知吾恥生越王則解綬以冥其目遂伏劍而死越王殺太宰嚭戮其妻子以其不忠信斷絕吳之世
