body:
  text: 越絶外傳記范伯第八昔者范蠡其始居楚曰范伯自謂衰賤未嘗世祿故自菲薄飲食則甘天下之無味居則安天下之賤位復被髮佯狂不與於世謂大夫種曰三王則三皇之苗裔也五伯乃五帝之末世也天運歷紀千歲一至黃帝之元執辰破巳霸王之氣見於地戶伍子胥以是挾弓矢干吳王於是要大夫種入吳此時馮同相與共戒之伍子胥在自與不能關其辭蠡曰吳越二邦同氣共俗地戶之位非吳則越乃入越越王常與言盡日方去大夫石買居國有權辨口進曰衒女不貞衒士不信客歷諸侯渡河津無因自致殆非真賢夫和氏之璧求者不爭賈騏驥之材不難阻險之路之邦歷諸侯無所售道聽之徒唯大王察之於是范蠡退而不言遊於楚越之間大夫種進曰昔者市偷自衒於晉晉用之而勝楚伊尹負鼎入殷遂佐湯取天下有智之士不在遠近取也謂之帝王求備者亡易曰有高世之材者必有負俗之纍有至智之明者必破庶衆之議成大功者不拘於俗論大道者不合於衆唯大王察之於是石買益疏其後使將兵於外遂為軍士所殺是時句踐失衆棲於會稽之山更用種蠡之策得以存故虞舜曰以學乃時而行此猶良藥也王曰石買知往而不知來其使寡人棄賢後遂師二人竟以禽吳子貢曰薦一言得及身任一賢得顯名傷賢喪邦蔽能有殃負德忘恩其反形傷壞人之善毋後世敗人之成天誅行故冤子胥僇死由重譖子胥於吳吳虛重之無罪而誅傳曰寧失千金毋失一人之心是之謂也
