body:
  text: 越絶外傳本事第一問曰何謂越絶越者國之氏也何以言之按春秋序齊魯皆以國為氏姓是以明之絶者絶也謂句踐時也當是之時齊將伐魯孔子恥之故子貢說齊以安魯子貢一出亂齊破吳興晉彊越其後賢者辨士見夫子作春秋而略吳越又見子貢與聖人相去不遠脣之與齒表之與裏蓋要其意覽史記而述其事也問曰何不稱越經書記而言絶乎曰不也絶者絶也句踐之時天子微弱諸侯皆叛於是句踐抑彊扶弱絶惡反之於善取舍以道沛歸於宋浮陵以付楚臨沂開陽復之於魯中國侵伐因斯衰止以其誠在於內威發於外越專其功故曰越絶故作此者貴其內能自約外能絶人也賢者所述不可斷絶故不為記明矣問曰桓公九合諸侯一匡天下任用賢者誅服彊楚何不言齊絶乎曰桓公中國兵彊霸世之後威凌諸侯服彊楚此正宜耳夫越王句踐東垂海濱夷狄文身躬而自苦任用賢臣轉死為生以敗為成越伐彊吳尊事周室行霸琅邪躬自省約率道諸侯貴其始微終能以霸故與越專其功而有之也問曰然越專其功而有之何不第一而卒本吳太伯為曰小越而大吳小越大吳奈何曰吳有子胥之教霸世甚久北陵齊楚諸侯莫敢叛者乘薛許邾婁莒旁轂趨走越王句踐屬芻莝養馬諸侯從之若果中之李反邦七年焦思苦身克己自責任用賢人越伐彊吳行霸諸侯故不使越第一者欲以貶大吳顯弱越之功也問曰吳亡而越興在天與在人乎皆人也夫差失道越亦賢矣濕易雨饑易助曰何以知獨在人乎子貢與夫子坐告夫子曰太宰死夫子曰不死也如是者再子貢再拜而問何以知之夫子曰天生宰嚭者欲以亡吳吳今未亡宰何病乎後人來言不死聖人不妄言是以明知越霸矣何以言之曰種見蠡之時相與謀道東南有霸兆不如往仕相要東游入越而止賢者不妄言以是知之焉問曰越絶誰所作吳越賢者所作也當此之時見夫子刪書作春秋定王制賢者嗟歎決意覽史記成就其事問曰作事欲以自著今但言賢者不言姓字何曰是人有大雅之才直道一國之事不見姓名小之辭也或以為子貢所作當挾四方不當獨在吳越其在吳越亦有因矣此時子貢為魯使或至齊或至吳其後道事以吳越為喻國人承述故直在吳越也當是之時有聖人教授六藝刪定五經七十二子養徒三千講習學問魯之闕門越絶小藝之文固不能布於四方焉有誦述先聖賢者所作未足自稱載列姓名直斥以身者也一說蓋是子胥所作也夫人情泰而不作窮則怨恨怨恨則作猶詩人失職怨恨憂嗟作詩也子胥懷忠不忍君沈惑於讒社稷之傾絶命危邦不顧長生切切爭諫終不見聽憂至患致怨恨作文不侵不差抽引本末明己無過終不遺力誠能極智不足以身當之嫌於求譽是以不著姓名直斥以身者也後人述而說之乃稍成中外篇焉問曰或經或傳或內或外何謂曰經者論其事傳者道其意外者非一人所作頗相覆載或非其事引類以託意說之者見夫子刪詩書就經易亦知小藝之復重又各辨士所述不可斷絶小道不通偏有所期明說者不專故刪定復重以為中外篇
