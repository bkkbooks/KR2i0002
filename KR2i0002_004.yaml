body:
  text: 越絕吳內傳第四吳何以稱人乎夷狄之也憂中邦柰何乎伍子胥父誅於楚子胥挾弓身干闔廬闔廬曰士之甚勇之甚將為之報仇子胥曰不可諸侯不為匹夫報仇且臣聞之事君猶事父也虧君之行報父之仇不可於是止蔡昭公南朝楚被羔裘囊瓦求之昭公不與即拘昭公於南郢三年然後歸之昭公去至河用事曰天下誰能伐楚乎寡人願為前列楚聞之使囊瓦興師伐蔡昭公聞子胥在吳請救蔡子胥於是報闔廬曰蔡公南朝被羔裘囊瓦求之蔡公不與拘蔡公三年然後歸之蔡公至河曰天下誰能伐楚者乎寡人願為前列楚聞之使囊瓦興師伐蔡蔡非有罪也楚為無道君若有憂中國之事意者時可矣闔廬於是使子胥興師救蔡而伐楚楚王已死子胥將卒六千人操鞭笞平王之墳曰昔者吾先君無罪而子殺之今此以報子也君舍君室大夫舍大夫室蓋有妻楚王母者囊瓦者何楚之相也郢者何楚王治處也吳師何以稱人吳者夷狄也而救中邦稱人賤之也越王句踐欲伐吳王闔廬范蠡諫曰不可臣聞之天貴持盈持盈者言不失陰陽日月星辰之綱紀地貴定傾定傾者言地之長生丘陵平均無不得宜故曰地貴定傾人貴節事節事者言王者已下公卿大夫當調陰陽和順天下事來應之物來知之天下莫不盡其忠信從其政教謂之節事節事者至事之要也天道盈而不溢盛而不驕者言天生萬物以養天下蠉飛蠕動各得其性春生夏長秋收冬藏不失其常故曰天道盈而不溢盛而不驕者也地道施而不德勞而不矜其功者也言地生長五穀持養萬物功盈德博是所施而不德勞而不矜其功者矣言天地之施大而不有功者也人道不逆四時者言王者以下至於庶人皆當和陰陽四時之變順之者有福逆之者有殃故曰人道不逆四時之謂也因惽視動者言存亡吉凶之應善惡之敘必有漸也天道未作不先為客者范蠡值吳伍子胥教化天下從之未有死亡之失故以天道未作不先為客言客者去其國入人國地兆未發不先動眾言王者以下至於庶人非暮春中夏之時不可以種五穀興土利國家不見死亡之失不可伐也故地兆未發不先動眾此之謂也吳人敗於就李吳之戰地敗者言越之伐吳未戰吳闔廬卒敗而去也卒者闔廬死也天子稱崩諸侯稱薨大夫稱卒士稱不祿闔廬諸侯也不稱薨而稱卒者何也當此之時上無明天子下無賢方伯諸侯力政彊者為君南夷與北狄交爭中國不絕如綫矣臣弒君子弒父天下莫能禁止於是孔子作春秋方據魯以王故諸侯死皆稱卒不稱薨避魯之謚也晉公子重耳之時天子微弱諸侯力政彊者為君文公為所侵暴失邦奔於翟三月得反國政敬賢明法率諸侯朝天子於是諸侯皆從天子乃尊此所謂晉公子重耳反國定天下齊公子小白亦反齊國而匡天下者齊大夫無知弒其君諸兒其子二人出奔公子糾奔魯魯者公子糾母之邦小白奔莒莒者小白母之邦也齊大臣鮑叔牙為報仇殺無知故興師之魯聘公子糾以為君魯莊公不與莊公魯君也曰使齊以國事魯我與汝君不以國事魯我不與汝君於是鮑叔牙還師之莒取小白立為齊君小白反國用管仲九合諸侯一匡天下故為桓公此之謂也堯有不慈之名堯太子丹朱倨驕懷禽獸之心堯知不可用退丹朱而以天下傳舜此之謂堯有不慈之名舜有不孝之行舜親父假母母常殺舜舜去耕歷山三年大熟身自外養父母皆饑舜父頑母嚚兄狂弟敖舜求為變心易志舜為瞽瞍子也瞽瞍欲殺舜未嘗可得呼而使之未嘗不在側此舜有不孝之行舜用其仇而王天下者言舜父瞽瞍用其後妻常欲殺舜舜不為失孝行天下稱之堯聞其賢遂以天下傳之此為王天下仇者舜後母也桓公召其賊而霸諸侯者管仲臣於桓公兄公子糾糾與桓爭國管仲張弓射桓公中其帶鉤桓公受之赦其大罪立為齊相天下莫不向服慕義是謂召其賊霸諸侯也夏啟獻犧於益啟者禹之子益與禹臣於舜舜傳之禹薦益而封之百里禹崩啟立曉知王事達於君臣之義益死之後啟歲善犧牲以祠之經曰夏啟善犧於益此之謂也湯獻牛荊之伯之伯者荊州之君也湯行仁義敬鬼神天下皆一心歸之當是時荊伯未從也湯於是乃飾犧牛以事荊伯乃媿然曰失事聖人禮乃委其誠心此謂湯獻牛荊之伯也越王句踐反國六年皆得士民之眾而欲伐吳於是乃使之維甲維甲者治甲系斷修內矛赤雞稽繇者也越人謂人鎩也方舟航買儀塵者越人往如江也治須慮者越人謂船為須慮亟怒紛紛者怒貌也怒至士擊高文者躍勇士也習之於夷夷海也宿之於萊萊野也致之於單單者堵也舜之時鯀不從令堯遭帝嚳之後亂洪水滔天堯使鯀治之九年弗能治堯七十年而得舜舜明知人情審於地形知鯀不能治數諫不去堯殛之羽山此之謂舜之時鯀不從令也殷湯遭夏桀無道殘賊天下於是湯用伊尹行至聖之心見桀無道虐行故伐夏放桀而王道興躍革亂補弊移風易俗改制作新海內畢貢天下承風湯以文聖此之謂也文王以務爭者紂為天下殘賊奢佚不顧邦政文王百里見紂無道誅殺無刑賞賜不當文王以聖事紂天下皆盡誠知其賢聖從之此謂文王以務爭也紂以惡刑爭文王行至聖以仁義爭此之謂也武王以禮信文王死九年天下八百諸侯皆一旦會於孟津之上不言同辭不呼自來盡知武王忠信欲從武王與之伐紂當是時比干箕子微子尚在武王賢之未敢伐也還諸侯歸二年紂賊比干囚箕子微子去之刳妊婦殘朝涉武王見賢臣已亡乃朝天下興師伐紂殺之武王未下車封比干之墓發太倉之粟以贍天下封微子於宋此武王以禮信也周公以盛德武王封周公使傅相成王成王少周公臣事之當是之時賞賜不加於無功刑罰不加於無罪天下家給人足禾麥茂美使人以時說之以禮上順天地澤及夷狄於是管叔蔡叔不知周公而讒之成王周公乃辭位出巡狩於邊一年天暴風雨日夜不休五穀不生樹木盡偃成王大恐乃發金縢之櫃察周公之冊知周公乃有盛德王乃夜迎周公流涕而行周公反國天應之福五穀皆生樹木皆起天下皆實此周公之盛德也
