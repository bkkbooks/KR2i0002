body:
  text: 越絶外傳記吳地傳第三昔者吳之先君太伯周之世武王封太伯於吳到夫差計二十六世且千歲闔廬之時大霸築吳越城城中有小城二徙治胥山後二世而至夫差立二十三年越王句踐滅之闔廬宮在高平里射臺二一在華池昌里一在安陽里南城宮在長樂里東到春申君府秋冬治城中春夏治姑胥之臺旦食於紐山晝遊於胥母射於鷗陂馳於遊臺興樂石城走犬長洲吳王大霸楚昭王孔子時也吳大城周四十七里二百一十步二尺陸門八其二有樓水門八南面十里四十二步五尺西面七里百一十二步三尺北面八里二百二十六步三尺東面十一里七十九步一尺闔廬所造也吳郭周六十八里六十步吳小城周十二里其下廣二丈七尺高四丈七尺門三皆有樓其二增水門二其一有樓一增柴路東宮周一里二百七十步路西宮在長秋周一里二百二十六步秦始皇帝十一年守宮者照燕失火燒之伍子胥城周九里二百七十步小城東西從武里面從小城北邑中徑從閶門到婁門九里七十二步陸道廣二十三步平門到蛇門十里七十五步陸道廣三十三步水道廣二十八步吳古故陸道出胥門奏出土山度灌邑奏高頸過猶山奏太湖隨北顧以西度陽下溪過歷山陽龍尾西大決通安湖吳古故水道出平門上郭池入瀆出巢湖上歷地過梅亭入楊湖出漁浦入大江奏廣陵吳古故從由拳辟塞度會夷奏山陰辟塞者吳備候塞也居東城者闔廬所遊城也去縣二十里柴辟亭到語兒就李吳侵以為戰地百尺瀆奏江吳以達糧千里廬虛者闔廬以鑄干將劍處歐冶僮女三百人去縣二里南達江閶門外高頸山東桓石人古者名石公去縣二十里閶門外郭中冢者闔廬冰室也闔廬冢在吳縣閶門外名曰虎丘下池廣六十步水深丈五尺銅槨三重澒池六尺玉鳧之流扁諸之劍三千方圓之口三千時耗魚腸之劍在焉十萬人築治之取土臨湖口葬之三日而白虎居其上故號為虎丘虎丘北莫格冢古賢者避世冢去縣三十里被奏冢鄧大冢是也去縣四十里闔廬子女冢在閶門外道北下方池廣四十八步水深二丈五尺池廣六十步水深丈五寸隧出廟路以南通姑胥門并周六里舞鶴吳市殺生以送死餘杭城者襄王時神女所葬也神多靈巫門外麋湖西城越麋王城也時搖越王與麋君戰於語招殺麋君毋頭騎歸至武里死亡葬武里南城午日死也巫門外冢者闔廬冰室也巫門外大冢吳王客齊孫武冢也去縣十里善為兵法蛇門外塘波洋中世子塘者故曰王世子造以為田塘去縣二十五里洋中塘去縣二十六里蛇門外大丘吳王不審名冢也去縣十五里築塘北山者吳王不審名冢也去縣二十里匠門外欐溪櫝中連鄉大丘者吳故神巫所葬也去縣十五里婁門外馬亭溪上復城者故越王餘復君所治也去縣八十里是時烈王歸於越所載襄王之後不可繼述其事書之馬亭溪婁門外鴻城者故越王城也去縣百五十里婁門外雞陂墟故吳王所蓄雞處也使李保養之去縣二十里胥門外有九曲路闔廬造以遊姑胥之臺以望太湖中窺百姓去縣三十里齊門闔廬伐齊大克取齊王女為質子為造齊門置於水海虛其臺在車道左水海右去縣七十里齊女思其國死葬虞西山吳北野禺櫟東所舍大疁者吳王田也去縣八十里吳西野鹿陂者吳王田也今分為耦瀆胥卑虛去縣二十里吳北野胥主疁者吳王女胥主田也去縣八十里麋湖城者闔廬所置麋也去縣五十里欐溪城者闔廬所置船宮也闔廬所造婁門外力士者闔廬所造以備外越巫欐城者闔廬所置諸侯遠客離城也去縣十五里由鍾窮隆山者古赤松子所取赤石脂也去縣二十里子胥死民思祭之莋碓山故為鶴阜山禹遊天下引湖中柯山置之鶴阜更名莋碓放山者在莋碓山南以取長之莋碓山下故有鄉名莋邑吳王惡其名內郭中名通陵鄉莋碓山南有大石古者名為墜星去縣二十里撫侯山者故闔廬治以諸侯冢次去縣二十里吳東徐亭東西南北通溪者越荊王所置與糜湖相通也馬安溪上干城者越干王之城也去縣七十里巫門外冤山大冢故越王王史冢也去縣二十里搖城者吳王子居焉後越搖王居之稻田三百頃在邑東南肥饒水絶去縣五十里胥女大冢吳王不審名冢也去縣四十五里蒲姑大冢吳王不審名冢也去縣三十里石城者吳王闔廬所置美人離城也去縣七十里通江南陵搖越所鑿以伐上舍君去縣五十里婁東十里坑者古名長人坑從海上來去縣十里海鹽縣始為武原鄉婁北武城闔廬所以候外越也去縣三十里今為鄉也宿甲者吳宿兵候外越也去縣百里其東大冢搖王冢也烏程餘杭黝歙無湖石城縣以南皆故大越徙民也秦始皇帝刻石徙之烏傷縣常山古人所採藥也高且神齊鄉周十里二百一十步其城六里三十步牆高丈二尺百七十步竹格門三其二有屋虞山者巫咸所出也虞故神出奇怪去縣百五里母陵道陽朔三年太守周君造陵道語昭郭周十里百一十步牆高丈二尺陵門四皆有屋水門二無錫城周二里十九步高二丈七尺門一樓四其郭周十一里百二十八步牆一丈七尺門皆有屋無錫歷山春申君時盛祠以牛立無錫塘去吳百二十里無錫湖者春申君治以為陂鑿語昭瀆以東到大田田名胥卑鑿胥卑下以南注大湖以寫西野去縣三十五里無錫西龍尾陵道者春申君初封吳所造也屬於無錫縣以奏吳北野胥主疁曲阿故為雲陽縣毗陵故為延陵吳季子所居毗陵縣南城故古淹君地也東南大冢淹君子女冢也去縣十八里吳所葬毗陵上湖中冢者延陵季子冢也去縣七十里上湖通上洲季子冢古名延陵墟蒸山南面夏駕大冢者越王不審名冢去縣三十五里秦餘杭山者越王棲吳夫差山也去縣五十里山有湖水近太湖夫差冢在猶亭西卑猶位越王使干戈人一纍土以葬之近太湖去縣十七里三臺者太宰嚭逢同妻子死所在也去縣十七里太湖周三萬六千頃其千頃烏程也去縣五十里無錫湖周萬五千頃其一千三頃毗陵上湖也去縣五十里一名射貴湖尸湖周二千二百頃去縣百七十里小湖周千三百二十頃去縣百里耆湖周六萬五千頃去縣百二十里乘湖周五百頃去縣五里猶湖周三百二十頃去縣十七里語昭湖周二百八十頃去縣五十里作湖周百八十頃聚魚多物去縣五十五里昆湖周七十六頃一畝去縣一百七十五里一名隱湖湖王湖當問之丹湖當問之吳王故祠江漢於棠浦東江南為方牆以利朝夕水古太伯君吳到闔廬時絶胥女南小蜀山春申君客衛公子冢也去縣三十五里白石山故為胥女山春申君初封吳過更名為白石去縣四十里今太守舍者春申君所造後殿屋以為桃夏宮今宮者春申君子假君宮也前殿屋蓋地東西十七丈五尺南北十五丈七尺堂高四丈十霤高丈八尺殿屋蓋地東西十五丈南北十丈二尺七寸戶霤高丈二尺庫東鄉屋南北四十丈八尺上下戶各二南鄉屋東西六十四丈四尺上戶四下戶三西鄉屋南北四十二丈九尺上戶三下戶二凡百四十九丈一尺檐高五丈二尺霤高二丈九尺周一里二百四十一步春申君所造吳兩倉春申君所造西倉名曰均輸東倉周一里八步後燒更始五年太守李君治東倉為屬縣屋不成吳市者春申君所造闕兩城以為市在湖里吳諸里大閈春申君所造吳獄庭周三里春申君時造土山者春申君時治以為貴人冢次去縣十六里楚門春申君所造楚人從之故為楚門路丘大冢春申君客冢不立以道終之去縣十里春申君楚考烈王相也烈王死幽王立封春申君於吳三年幽王徵春申君為楚令尹春申君自使其子為假君治吳十一年幽王徵假君與春申君并殺之二君治吳凡十四年後十六年秦始皇并楚百越叛去更名大越為山陰也春申君姓黃名歇巫門外罘罳者春申君去吳假君所思處也去縣二十三里壽春東鳧陵亢者古諸侯王所葬也楚威王與越王無彊並威王後烈王子幽王後懷王也懷王子頃襄王也秦始皇滅之秦始皇造道陵南可通陵道到由拳塞同起馬塘湛以為陂治陵水道到錢唐越地通浙江秦始皇發會稽適戍卒治通陵高以南陵道縣相屬秦始皇帝三十七年壞諸侯郡縣城太守府大殿者秦始皇刻石所起也到更始元年太守許時燒六年十二月乙卯鑿官池東西十五丈七尺南北三十丈漢高帝封有功劉賈為荊王并有吳賈築吳市西城名曰定錯城屬小城北到平門丁將軍築治之十一年淮南王反殺劉賈後十年高皇帝更封兄子濞為吳王治廣陵并有吳立二十一年東渡之吳十日遂去立四十二年反西到陳留縣還奔丹陽從東歐越王弟夷烏將軍殺濞東歐王為彭澤王夷烏將軍今為平都王濞父字為仲匠門外信士里東廣平地者吳王濞時宗廟也太公高祖在西孝文在東去縣五里永光四年孝元帝時貢大夫請罷之桑里東今舍西者故吳所畜牛羊豕雞也名為牛宮今以為園漢文帝前九年會稽并故鄣郡太守治故鄣都尉治山陰前十六年太守治吳郡都尉治錢唐漢孝景帝五年五月會稽屬漢屬漢者始并事也漢孝武帝元封元年陽都侯歸義置由鍾由鍾初立去縣五十里漢孝武元封二年故鄣以為丹陽郡天漢五年四月錢唐浙江岑石不見到七年岑石復見越王句踐徙琅邪凡二百四十年楚考烈王并越於琅邪後四十餘年秦并楚復四十年漢并秦到今二百四十二年句踐徙琅邪到建武二十八年凡五百六十七年
