body:
  text: 越絶內傳陳成恆第九昔者陳成恆相齊簡公欲為亂憚齊邦鮑晏故徙其兵而伐魯魯君憂也孔子患之乃召門人弟子而謂之曰諸侯有相伐者尚恥之今魯父母之邦也丘墓存焉今齊將伐之可無一出乎顏淵辭出孔子止之子路辭出孔子止之子貢辭出孔子遣之子貢行之齊見陳成恆曰夫魯難伐之邦而伐之過矣陳成恆曰魯之難伐何也子貢曰其城薄以卑其池狹而淺其君愚而不仁其大臣僞而無用其士民有惡聞甲兵之心此不可與戰君不如伐吳吳城高以厚池廣以深甲堅以新士選以飽重器精弩在其中又使明大夫守之此邦易也君不如伐吳成恆忿然作色曰子之所難人之所易也子之所易人之所難也而以教恆何也子貢對曰臣聞之憂在內者攻彊憂在外者攻弱今君憂在內臣聞君三封而三不成者大臣有不聽者也今君破魯以廣齊戰勝以驕主隳魯以尊臣而君之功不與焉是君上驕主心下恣群臣而求以成大事難矣且夫上驕則犯臣驕則爭是君上於主有卻下與大臣交爭也如此則君立於齊危於重卵矣臣故曰不如伐吳且夫吳王明猛以毅而行其令百姓習於戰守將明於法齊之愚為禽必矣今君悉擇四疆之中出大臣以環之黔首外死大臣內空是君上無彊臣之敵下無黔首之士孤立制齊者君也陳恆曰善雖然吾兵已在魯之城下矣若去而之吳大臣將有疑我之心為之奈何子貢曰君按兵無伐臣請見吳王使之救魯而伐齊君因以兵迎之陳成恆許諾乃行子貢南見吳王謂吳王曰臣聞之王者不絶世而霸者不彊敵千鈞之重加銖兩而移今以萬乘之齊私千乘之魯而與吳爭彊臣竊為君恐焉且夫救魯顯名也伐齊大利也義在存亡魯勇在害彊齊而威申晉邦者則王者不疑也吳王曰善雖然我常與越戰棲之會稽夫越君賢主也苦身勞力以夜接日內飾其政外事諸侯必將有報我之心子待吾伐越而還子貢曰不可夫越之彊不下魯而吳之彊不過齊君以伐越而還即齊亦已私魯矣且夫伐小越而畏彊齊者不勇見小利而忘大害者不智兩者臣無為君取焉且臣聞之仁人不困厄以廣其德智者不棄時以舉其功王者不絶世以立其義今君存越勿毀親四鄰以仁救暴困齊威申晉邦以武救魯毋絶周室明諸侯以義如此則臣之所見溢乎負海必率九夷而朝即王業成矣且大吳畏小越如此臣請東見越王使之出鋭師以從下吏是君實空越而名從諸侯以伐也吳王大悅乃使子貢之越子貢東見越王越王聞之除道郊迎至縣身御子貢至舍而問曰此乃僻陋之邦蠻夷之民也大夫何索居然而辱乃至於此子貢曰弔君故來越王句踐稽首再拜曰孤聞之禍與福為鄰今大夫弔孤孤之福也敢遂聞其說子貢曰臣今者見吳王告以救魯而伐齊其心申其志畏越曰嘗與越戰棲於會稽山上夫越君賢主也苦身勞力以夜接日內飾其政外事諸侯必將有報我之心子待我伐越而聽子且夫無報人之心而使人疑之者拙也有報人之心而使人知之者殆也事未發而先聞者危也三者舉事之大忌也越王句踐稽首再拜曰昔者孤不幸少失先人內不自量與吳人戰軍敗身辱遺先人恥遁逃出走上棲會稽山下守溟海唯魚鱉是見今大夫不辱而身見之又出玉聲以教孤孤賴先人之賜敢不奉教乎子貢曰臣聞之明主任人不失其能直士舉賢不容於世故臨財分利則使仁涉危拒難則使勇用衆治民則使賢正天下定諸侯則使聖人臣竊練下吏之心兵彊而不并弱勢在其上位而行惡令其下者其君幾乎難矣臣竊自練可以成功而至王者其唯臣幾乎今夫吳王有伐齊之志君無惜重器以喜其心毋惡卑辭以尊其禮則伐齊必矣彼戰而不勝則君之福也彼戰而勝必以其餘兵臨晉臣請北見晉君令共攻之弱吳必矣其騎士鋭兵弊乎齊重器羽旄盡乎晉則君制其敝此滅吳必矣越王句踐稽首再拜曰昔者吳王分其人民之衆以殘伐吳邦殺敗吾民圖吾百姓夷吾宗廟邦為空棘身為魚鱉餌今孤之怨吳王深於骨髓而孤之事吳王如子之畏父弟之敬兄此孤之外言也大夫有賜故孤敢以疑請遂言之孤身不安床席口不甘厚味目不視好色耳不聽鐘鼓者已三年矣焦唇乾嗌苦心勞力上事群臣下養百姓願一與吳交天下之兵於中原之野與吳王整襟交臂而奮吳越之士繼踵連死士民流離肝腦塗地此孤之大願也如此不可得也今內自量吾國不足以傷吳外事諸侯而不能也孤欲空邦家措策力變容貌易名姓執箕帚養牛馬以臣事之孤雖知要領不屬手足異處四支布陳為鄉邑笑孤之意出焉大夫有賜是存亡邦而興死人也孤賴先人之賜敢不待命乎子貢曰夫吳王之為人也貪功名而不知利害越王慥然避位曰在子子貢曰賜為君觀夫吳王之為人賢彊以恣下下不能逆數戰伐士卒不能忍太宰嚭為人智而愚彊而弱巧言利辭以內其身善為僞詐以事其君知前而不知後順君之過以安其私是殘國之吏滅君之臣也越王大悅子貢去而行越王送之金百鎰寶劍一良馬二子貢不受遂行至吳報吳王曰臣敬以下吏之言告越王越王大恐乃懼曰昔孤不幸少失先人內不自量抵罪於縣軍敗身辱遁逃出走棲於會稽邦為空棘身為魚鱉餌賴大王之賜使得奉俎豆而修祭祀大王之賜死且不敢忘何謀之敢慮其志甚恐似將使使者來子貢至五日越使果至曰東海役臣孤句踐使使臣種敢修下吏問於左右昔孤不幸少失先人內不自量抵罪於縣軍敗身辱遁逃出走棲於會稽邦為空棘身為魚鱉餌賴大王之賜使得奉俎豆而修祭祀大王之賜死且不忘今竊聞大王將興大義誅彊救弱困暴齊而撫周室故使越賤臣種以先人之藏器甲二十領屈盧之矛步光之劍以賀軍吏大王將遂大義則弊邑雖小請悉擇四疆之中出卒三千以從下吏孤請自被堅執鋭以前受矢石君臣死無所恨矣吳王大悅乃召子貢而告之曰越使果來請出卒三千其君又從之與寡人伐齊可乎子貢曰不可夫空人之邦悉人之衆又從其君不仁也君受其幣許其師而辭其君吳王許諾子貢因去之晉謂晉君曰臣聞之慮不先定不可以應卒兵不先辨不可以勝敵今齊吳將戰彼戰而不勝越亂之必矣與齊戰而勝則必以其兵臨晉晉君大恐曰為之奈何子貢曰修兵休卒以待吳晉君許諾子貢去而之魯吳王果興九郡之兵而與齊人戰於艾陵大敗齊師獲七將陳兵不歸果與晉人相遇黃池之上吳晉爭彊晉人擊之大敗吳師越王聞之涉江襲吳去邦七里而軍陳吳王聞之去晉從越越王迎之戰於五湖三戰不勝城門不守越遂圍王宮殺夫差而僇其相伐吳三年東鄉而霸故曰子貢一出存魯亂齊破吳彊晉霸越是也
